<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Holdwell · Mobile · §15 Sponsor onboarding</title>
<link rel="icon" href="../assets/gc-favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
 --p-10:#0B0F1C;--p-20:#161B2D;--p-30:#20273C;--p-40:#354872;--p-50:#4D608C;--p-60:#6B7DA6;--p-90:#DCE2F0;--p-95:#ECF0F9;--p-99:#FAFBFE;--p-100:#FFF;
 --s-10:#28215A;--s-20:#3E3478;--s-30:#534792;--s-40:#6B5DAC;--s-50:#8576C2;--s-70:#B5ACDF;--s-80:#CFC8EA;--s-90:#E8E4F4;
 --t-20:#1A6047;--t-30:#1F7058;--t-50:#399971;--t-60:#5BB088;--t-80:#ADDCC2;--t-90:#D5EDDF;
 --w-30:#6B4500;--w-60:#C28200;--w-80:#FAB44A;--w-90:#FFDFA8;
 --e-30:#7A1F1F;--e-50:#C73838;--e-80:#F4A4A4;--e-90:#FBD9D9;
 --n-50:#76798A;--n-80:#C5C8D2;--n-95:#F1F2F5;--nv-80:#C5C9DD;
}
[data-theme="dark"] { --bg-base: var(--p-30); --bg-surface: var(--p-20); --bg-surface-2: var(--p-10); --border: rgba(255,255,255,0.08); --text-primary: var(--n-95); --text-secondary: var(--nv-80); --text-muted: rgba(255,255,255,0.4); --accent: var(--s-70); --accent-strong: var(--s-50); --on-accent: #fff; --page-bg: #0a0e1a; --page-fg: var(--n-95); --page-fg-muted: var(--nv-80); --page-card-bg: var(--p-20); --page-divider: rgba(255,255,255,0.06); }
[data-theme="light"] { --bg-base: var(--p-99); --bg-surface: #fff; --bg-surface-2: var(--p-95); --border: rgba(22,27,45,0.08); --text-primary: var(--p-20); --text-secondary: var(--n-50); --text-muted: var(--n-50); --accent: var(--p-40); --accent-strong: var(--s-40); --on-accent: #fff; --page-bg: var(--p-95); --page-fg: var(--p-20); --page-fg-muted: var(--n-50); --page-card-bg: #fff; --page-divider: rgba(22,27,45,0.08); }
* { box-sizing: border-box; }
html, body { background: var(--page-bg); color: var(--page-fg); margin: 0; transition: background-color 220ms ease, color 220ms ease; }
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; min-height: 100vh; }
.proto-shell { display: grid; grid-template-columns: 280px 1fr; gap: 0; min-height: 100vh; }
@media (max-width: 960px) {.proto-shell { grid-template-columns: 1fr; } }
.proto-sidebar { background: var(--page-card-bg); border-right: 1px solid var(--page-divider); padding: 28px 22px; position: sticky; top: 0; height: 100vh; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }
@media (max-width: 960px) {.proto-sidebar { position: static; height: auto; max-height: 50vh; border-right: none; border-bottom: 1px solid var(--page-divider); } }
.proto-sidebar__brand { display: flex; align-items: center; gap: 10px; }
.proto-sidebar__mark { width: 36px; height: 36px; border-radius: 10px; background: var(--p-30); display: inline-flex; align-items: center; justify-content: center; }
.proto-sidebar__mark img { width: 70%; height: 70%; }
.proto-sidebar__name { font-weight: 700; font-size: 17px; letter-spacing: -0.01em; }
.proto-sidebar__pill { display: inline-flex; padding: 3px 9px; border-radius: 999px; background: linear-gradient(120deg, var(--s-50), var(--p-50), var(--t-50)); color: white; font-weight: 700; font-size: 9.5px; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.06em; text-transform: uppercase; }
.proto-sidebar__back { display: inline-flex; align-items: center; gap: 6px; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--page-fg-muted); text-decoration: none; }
.proto-section-title { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--page-fg-muted); margin: 12px 0 6px; }
.proto-scrubber { display: flex; flex-direction: column; gap: 2px; }
.proto-scrubber__item { display: grid; grid-template-columns: 44px 1fr; gap: 8px; align-items: center; padding: 7px 10px; border-radius: 8px; cursor: pointer; border: none; background: transparent; color: inherit; font-family: inherit; text-align: left; }
.proto-scrubber__item:hover { background: rgba(127,127,127,0.08); }
.proto-scrubber__item.is-active { background: var(--accent-strong); color: var(--on-accent); }
.proto-scrubber__item.is-active.proto-scrubber__id { color: rgba(255,255,255,0.85); }
.proto-scrubber__id { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 600; color: var(--page-fg-muted); letter-spacing: 0.06em; }
.proto-scrubber__name { font-size: 12.5px; font-weight: 500; }
.proto-sidebar__footer { margin-top: auto; padding-top: 16px; border-top: 1px solid var(--page-divider); font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--page-fg-muted); }
.proto-sidebar__footer a { color: var(--page-fg-muted); text-decoration: none; border-bottom: 1px dotted currentColor; }
.proto-theme-toggle { display: inline-flex; align-items: center; gap: 8px; padding: 7px 12px; border-radius: 8px; background: var(--bg-surface-2); border: 1px solid var(--border); color: var(--page-fg-muted); cursor: pointer; font-family: 'JetBrains Mono', monospace; font-size: 11px; align-self: flex-start; }
.proto-theme-toggle svg { width: 12px; height: 12px; }
[data-theme="dark"].proto-theme-toggle.icon-moon { display: none; }
[data-theme="light"].proto-theme-toggle.icon-sun { display: none; }
.proto-stage { display: flex; flex-direction: column; align-items: center; padding: 32px 24px 64px; gap: 22px; }
.proto-modebar { display: flex; align-items: center; gap: 10px; padding: 10px 16px; background: var(--page-card-bg); border: 1px solid var(--page-divider); border-radius: 12px; font-family: 'JetBrains Mono', monospace; font-size: 11.5px; color: var(--page-fg-muted); flex-wrap: wrap; justify-content: center; }
.proto-modebar__pill { display: inline-flex; padding: 3px 9px; border-radius: 999px; background: var(--bg-surface-2); }
.proto-modebar__pill--sponsor { background: var(--s-50); color: white; }

/* Sponsor-mode wrapper (visible accent strip on phone for sponsor-facing screens) */
.phone__sponsor-strip { display: flex; align-items: center; justify-content: center; gap: 6px; padding: 5px 12px; background: var(--s-50); color: white; font-family: 'JetBrains Mono', monospace; font-size: 10.5px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; flex-shrink: 0; }
.phone__sponsor-strip svg { width: 11px; height: 11px; }
.phone__sponsor-url { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; padding: 6px 12px; background: var(--bg-surface-2); color: var(--text-secondary); flex-shrink: 0; text-align: center; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: center; gap: 6px; }
.phone__sponsor-url svg { width: 10px; height: 10px; opacity: 0.7; }

/* SP4 KYC step list */
.sp-kyc-step { display: grid; grid-template-columns: 30px 1fr auto; gap: 11px; align-items: center; padding: 11px 13px; background: var(--bg-surface); border: 1px solid var(--border); border-radius: 12px; }
.sp-kyc-step--current { border-color: var(--accent-strong); box-shadow: 0 0 0 2px rgba(133,118,194,0.18); }
.sp-kyc-step__n { width: 30px; height: 30px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 12px; background: var(--bg-surface-2); color: var(--text-secondary); flex-shrink: 0; }
.sp-kyc-step--done.sp-kyc-step__n { background: var(--t-50); color: white; }
.sp-kyc-step--current.sp-kyc-step__n { background: var(--accent-strong); color: white; }
.sp-kyc-step__t { font-size: 13px; font-weight: 600; }
.sp-kyc-step__s { font-size: 11.5px; color: var(--text-secondary); margin-top: 1px; }
.sp-kyc-step__pill { font-family: 'JetBrains Mono', monospace; font-size: 9.5px; font-weight: 700; letter-spacing: 0.05em; padding: 2px 7px; border-radius: 999px; background: var(--bg-surface-2); color: var(--text-muted); }
.sp-kyc-step--current.sp-kyc-step__pill { background: var(--accent-strong); color: white; }
.sp-kyc-step--done.sp-kyc-step__pill { background: var(--t-20); color: var(--t-80); }
[data-theme="light"].sp-kyc-step--done.sp-kyc-step__pill { background: var(--t-90); color: var(--t-30); }

.sp-cam-frame { aspect-ratio: 4/5; background: var(--bg-base); border: 2px dashed var(--border); border-radius: 14px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; padding: 18px; color: var(--text-muted); position: relative; }
.sp-cam-oval { width: 130px; height: 170px; border: 2.5px solid var(--accent); border-radius: 50%; opacity: 0.7; }
.sp-cam-frame__t { font-size: 13px; font-weight: 600; color: var(--text-primary); margin-top: 8px; }
.sp-cam-frame__s { font-size: 11px; text-align: center; line-height: 1.5; max-width: 28ch; }

/* SP5 mobile bank grid */
.sp-bank-grid-m { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.sp-bank-m { display: flex; align-items: center; gap: 10px; padding: 11px 12px; background: var(--bg-surface); border: 1px solid var(--border); border-radius: 11px; cursor: pointer; font-family: inherit; color: inherit; text-align: left; }
.sp-bank-m:hover { border-color: var(--accent); }
.sp-bank-m.is-on { border-color: var(--accent-strong); box-shadow: 0 0 0 2px rgba(133,118,194,0.18); }
.sp-bank-m__logo { width: 32px; height: 32px; border-radius: 8px; display: inline-flex; align-items: center; justify-content: center; font-weight: 800; color: white; font-family: 'JetBrains Mono', monospace; font-size: 13px; flex-shrink: 0; box-shadow: 0 0 0 1px rgba(255,255,255,0.06); }
[data-theme="light"].sp-bank-m__logo { box-shadow: 0 0 0 1px rgba(22,27,45,0.08); }
.sp-bank-m__n { font-size: 12.5px; font-weight: 600; }

/* SP6 mobile sponsor dashboard */
.sp6-stat { padding: 13px 14px; background: var(--bg-surface); border: 1px solid var(--border); border-radius: 12px; }
.sp6-stat__l { font-size: 10px; font-family: 'JetBrains Mono', monospace; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 4px; }
.sp6-stat__n { font-size: 21px; font-weight: 800; letter-spacing: -0.02em; line-height: 1; }
.sp6-stat__d { font-size: 11px; color: var(--text-secondary); margin-top: 3px; }
.sp6-stat__d--ok { color: var(--t-60); }
[data-theme="light"].sp6-stat__d--ok { color: var(--t-30); }
.sp6-stat-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

.sp6-tl { display: grid; grid-template-columns: auto 1fr; gap: 9px; align-items: flex-start; padding: 10px 0; border-top: 1px solid var(--border); }
.sp6-tl:first-of-type { border-top: none; padding-top: 0; }
.sp6-tl__pill { display: inline-flex; padding: 2px 8px; border-radius: 999px; font-size: 9px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; font-family: 'JetBrains Mono', monospace; flex-shrink: 0; height: fit-content; margin-top: 2px; }
.sp6-tl__pill--milestone { background: var(--t-20); color: var(--t-80); }
[data-theme="light"].sp6-tl__pill--milestone { background: var(--t-90); color: var(--t-30); }
.sp6-tl__pill--hold { background: var(--w-30); color: var(--w-80); }
[data-theme="light"].sp6-tl__pill--hold { background: var(--w-90); color: var(--w-30); }
.sp6-tl__pill--message { background: var(--s-20); color: var(--s-80); }
[data-theme="light"].sp6-tl__pill--message { background: var(--s-90); color: var(--s-20); }
.sp6-tl__t { font-size: 12.5px; font-weight: 600; }
.sp6-tl__s { font-size: 11px; color: var(--text-secondary); margin-top: 1px; line-height: 1.4; }
.sp6-tl__when { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-muted); margin-top: 3px; }

.sp6-mcc { display: flex; flex-direction: column; gap: 7px; }
.sp6-mcc-row { display: flex; flex-direction: column; gap: 3px; }
.sp6-mcc-head { display: flex; justify-content: space-between; font-size: 12px; }
.sp6-mcc-head__n { font-family: 'JetBrains Mono', monospace; color: var(--text-muted); font-size: 11px; }
.sp6-mcc-bar { height: 5px; background: var(--bg-surface-2); border-radius: 99px; overflow: hidden; }
.sp6-mcc-bar div { height: 100%; border-radius: 99px; }
.proto-modebar__id { color: var(--page-fg); font-weight: 700; letter-spacing: 0.06em; }
.proto-modebar__bar { width: 100px; height: 4px; border-radius: 4px; background: var(--bg-surface-2); position: relative; overflow: hidden; }
.proto-modebar__bar__fill { position: absolute; left: 0; top: 0; bottom: 0; background: linear-gradient(90deg, var(--s-50), var(--t-50)); transition: width 240ms ease; }
.proto-arrows { display: flex; align-items: center; gap: 8px; }
.proto-arrow { width: 36px; height: 36px; border-radius: 10px; background: var(--page-card-bg); border: 1px solid var(--page-divider); color: var(--page-fg-muted); display: inline-flex; align-items: center; justify-content: center; cursor: pointer; }
.proto-arrow:hover { background: var(--bg-surface-2); color: var(--page-fg); }
.proto-arrow:disabled { opacity: 0.3; cursor: not-allowed; }
.proto-arrow svg { width: 18px; height: 18px; }
.phone { width: 393px; height: 852px; flex-shrink: 0; border-radius: 56px; background: #000; padding: 13px; position: relative; box-shadow: 0 0 0 1.5px #2a2e3a, 0 30px 60px -20px rgba(0,0,0,0.7), 0 16px 32px -16px rgba(0,0,0,0.4); }
.phone::before,.phone::after { content: ''; position: absolute; background: #2a2e3a; }
.phone::before { left: -3px; top: 110px; width: 3px; height: 30px; border-radius: 3px 0 0 3px; }
.phone::after { left: -3px; top: 160px; width: 3px; height: 60px; border-radius: 3px 0 0 3px; }
.phone__inner { width: 100%; height: 100%; background: var(--bg-base); color: var(--text-primary); border-radius: 44px; overflow: hidden; position: relative; display: flex; flex-direction: column; }
.phone__notch { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); width: 120px; height: 32px; background: #000; border-radius: 18px; z-index: 30; }
.phone__statusbar { height: 44px; padding: 12px 32px 0; display: flex; align-items: center; justify-content: space-between; font-size: 14px; font-weight: 600; color: var(--text-primary); font-feature-settings: "tnum"; flex-shrink: 0; }
.phone__statusbar__right { display: flex; align-items: center; gap: 5px; font-size: 13px; }
.phone__topbar { display: flex; align-items: center; justify-content: space-between; padding: 8px 18px 12px; gap: 10px; flex-shrink: 0; }
.phone__back { width: 32px; height: 32px; border-radius: 50%; background: transparent; border: none; color: var(--text-primary); display: inline-flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
.phone__back svg { width: 20px; height: 20px; }
.phone__title { flex: 1; text-align: center; font-size: 14.5px; font-weight: 600; letter-spacing: -0.01em; }
.gc-crisis-pill { display: inline-flex; align-items: center; gap: 5px; padding: 6px 11px; border-radius: 999px; background: var(--e-50); color: white; border: none; font-family: inherit; font-size: 11.5px; font-weight: 600; cursor: pointer; flex-shrink: 0; }
.gc-crisis-pill svg { width: 11px; height: 11px; }

.sp-body { flex: 1; padding: 4px 16px 12px; overflow-y: auto; display: flex; flex-direction: column; gap: 11px; }
.sp-body::-webkit-scrollbar { width: 4px; }
.sp-body::-webkit-scrollbar-thumb { background: rgba(127,127,127,0.2); border-radius: 4px; }

.gc-card { padding: 14px; background: var(--bg-surface); border: 1px solid var(--border); border-radius: 14px; display: flex; flex-direction: column; gap: 8px; }
.gc-card--anna { background: linear-gradient(135deg, rgba(133,118,194,0.15), rgba(83,71,146,0.08)); border-color: rgba(133,118,194,0.25); flex-direction: row; align-items: center; gap: 10px; padding: 11px 13px; }
.gc-card--anna.anna-av { width: 30px; height: 30px; border-radius: 50%; background: var(--p-30); display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
.gc-card--anna.anna-av img { width: 60%; height: 60%; }
.gc-card--anna p { font-size: 12px; line-height: 1.45; margin: 0; font-style: italic; }
.gc-card--info { background: var(--bg-surface-2); border-left: 3px solid var(--s-50); border-radius: 4px 14px 14px 4px; padding: 13px 15px; }
.gc-card--success { background: linear-gradient(135deg, var(--t-50), var(--t-30)); color: white; border-color: transparent; }

/* Sponsor invite form */
.sp-input { padding: 12px 14px; background: var(--bg-base); border: 1px solid var(--border); border-radius: 11px; font-family: inherit; font-size: 14px; color: var(--text-primary); width: 100%; outline: none; }
.sp-input:focus { border-color: var(--accent); }
.sp-input--filled { font-weight: 600; }
.sp-textarea { padding: 11px 13px; background: var(--bg-base); border: 1px solid var(--border); border-radius: 11px; font-family: inherit; font-size: 13px; color: var(--text-primary); width: 100%; outline: none; resize: vertical; min-height: 75px; line-height: 1.55; }
.sp-label { font-size: 11.5px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 5px; display: block; }
.sp-label-row { display: flex; justify-content: space-between; }
.sp-counter { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; color: var(--text-muted); }

.sp-rel-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 7px; }
.sp-rel { padding: 9px 6px; background: var(--bg-base); border: 1px solid var(--border); border-radius: 9px; font-family: inherit; font-size: 12px; font-weight: 600; cursor: pointer; color: var(--text-primary); text-align: center; }
.sp-rel.is-on { background: var(--accent-strong); color: white; border-color: transparent; }

/* Email preview SP2 */
.sp-email { background: var(--bg-base); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
.sp-email__head { padding: 11px 13px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 4px; background: var(--bg-surface-2); }
.sp-email__from { display: flex; align-items: center; gap: 7px; font-size: 11.5px; }
.sp-email__from b { color: var(--text-primary); font-weight: 700; }
.sp-email__from span { color: var(--text-muted); font-family: 'JetBrains Mono', monospace; font-size: 10.5px; }
.sp-email__subj { font-size: 13px; font-weight: 700; line-height: 1.4; }
.sp-email__body { padding: 13px 14px; display: flex; flex-direction: column; gap: 9px; font-size: 12.5px; line-height: 1.55; color: var(--text-secondary); }
.sp-email__hero { padding: 18px; background: linear-gradient(135deg, var(--s-50), var(--p-40)); color: white; border-radius: 10px; text-align: center; }
.sp-email__hero h3 { font-size: 16px; margin: 0 0 4px; font-weight: 800; letter-spacing: -0.01em; }
.sp-email__hero p { font-size: 11.5px; margin: 0; opacity: 0.92; line-height: 1.5; }
.sp-email__note { padding: 10px 12px; background: var(--bg-surface-2); border-left: 3px solid var(--s-50); border-radius: 4px 10px 10px 4px; font-style: italic; color: var(--text-primary); font-size: 12px; }
.sp-email__cta { display: inline-block; padding: 11px 18px; background: var(--accent-strong); color: white; border-radius: 10px; font-weight: 700; font-size: 13px; text-align: center; text-decoration: none; align-self: flex-start; }
.sp-email__footer { font-size: 10.5px; color: var(--text-muted); padding-top: 8px; border-top: 1px solid var(--border); font-family: 'JetBrains Mono', monospace; }

/* SP_SENT confirmation */
.sp-sent-hero { padding: 22px 18px; display: flex; flex-direction: column; align-items: center; text-align: center; gap: 8px; }
.sp-sent-hero__ic { width: 56px; height: 56px; border-radius: 50%; background: rgba(255,255,255,0.18); display: inline-flex; align-items: center; justify-content: center; }
.sp-sent-hero__ic svg { width: 28px; height: 28px; }
.sp-sent-hero h2 { font-size: 20px; font-weight: 800; letter-spacing: -0.02em; margin: 0; }
.sp-sent-hero p { font-size: 13px; line-height: 1.55; margin: 0; opacity: 0.92; }

.sp-state { display: grid; grid-template-columns: 30px 1fr auto; gap: 12px; align-items: center; padding: 11px 0; border-top: 1px solid var(--border); }
.sp-state:first-of-type { border-top: none; padding-top: 0; }
.sp-state__ic { width: 30px; height: 30px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; }
.sp-state__ic--done { background: var(--t-20); color: var(--t-80); }
[data-theme="light"].sp-state__ic--done { background: var(--t-90); color: var(--t-30); }
.sp-state__ic--pending { background: var(--w-30); color: var(--w-80); }
[data-theme="light"].sp-state__ic--pending { background: var(--w-90); color: var(--w-30); }
.sp-state__ic--waiting { background: var(--bg-surface-2); color: var(--text-muted); }
.sp-state__ic svg { width: 14px; height: 14px; }
.sp-state__t { font-size: 13px; font-weight: 600; }
.sp-state__s { font-size: 11.5px; color: var(--text-secondary); margin-top: 1px; }
.sp-state__pill { font-family: 'JetBrains Mono', monospace; font-size: 9.5px; padding: 2px 7px; border-radius: 999px; letter-spacing: 0.05em; font-weight: 700; }

let idx = 0;
function pickRel(el) { el.parentElement.querySelectorAll('.is-on').forEach(s => s.classList.remove('is-on')); el.classList.add('is-on'); }
function pickBank(el) { el.parentElement.querySelectorAll('.is-on').forEach(s => s.classList.remove('is-on')); el.classList.add('is-on'); }
function render() {
 const screen = SCREENS[idx];
 document.getElementById('stage').innerHTML = `<div class="screen" style="display:flex;flex-direction:column;flex:1;min-height:0">${builders[screen.kind]()}</div>`;
 document.getElementById('screenId').textContent = screen.id;
 document.getElementById('screenName').textContent = screen.name;
 const aud = document.getElementById('audiencePill');
 if (screen.audience === 'sponsor') { aud.textContent = 'Sponsor · Joanna'; aud.className = 'proto-modebar__pill proto-modebar__pill--sponsor'; }
 else { aud.textContent = 'User · Sam'; aud.className = 'proto-modebar__pill'; aud.style.background = 'var(--bg-surface-2)'; }
 document.getElementById('progressFill').style.width = ((idx + 1) / SCREENS.length * 100) + '%';
 document.getElementById('navPrev').disabled = idx === 0;
 document.getElementById('navNext').disabled = idx === SCREENS.length - 1;
 document.querySelectorAll('.proto-scrubber__item').forEach((el, i) => { el.classList.toggle('is-active', i === idx); if (i === idx) el.scrollIntoView({ block: 'nearest', behavior: 'smooth' }); });
 document.getElementById('contextBody').innerHTML = CTX[screen.kind] || screen.name;
}
function next() { if (idx < SCREENS.length - 1) { idx++; render(); } }
function prev() { if (idx > 0) { idx--; render(); } }
function go(i) { idx = i; render(); }
function buildScrubber() { const nav = document.getElementById('scrubber'); SCREENS.forEach((s, i) => { const btn = document.createElement('button'); btn.className = 'proto-scrubber__item'; btn.innerHTML = `<span class="proto-scrubber__id">${s.id}</span><span class="proto-scrubber__name">${s.name}</span>`; btn.addEventListener('click', () => go(i)); nav.appendChild(btn); }); }
function initTheme() { const root = document.documentElement; const stored = localStorage.getItem('gc-proto-theme'); const initial = stored || 'dark'; root.setAttribute('data-theme', initial); document.querySelector('.theme-label').textContent = initial === 'dark' ? 'Dark' : 'Light'; document.querySelector('.proto-theme-toggle').addEventListener('click', () => { const next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'; root.setAttribute('data-theme', next); document.querySelector('.theme-label').textContent = next === 'dark' ? 'Dark' : 'Light'; try { localStorage.setItem('gc-proto-theme', next); } catch(e) {} }); }
document.getElementById('navPrev').addEventListener('click', prev);
document.getElementById('navNext').addEventListener('click', next);
document.addEventListener('keydown', (e) => { if (e.key === 'ArrowRight') next(); if (e.key === 'ArrowLeft') prev(); });
buildScrubber(); initTheme(); render();
</script>
