<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Holdwell · Mobile · §06 Banking</title>
<link rel="icon" href="../assets/gc-favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
 --p-10:#0B0F1C;--p-20:#161B2D;--p-30:#20273C;--p-40:#354872;--p-50:#4D608C;--p-60:#6B7DA6;--p-70:#8E9DC0;--p-80:#B5BFD9;--p-90:#DCE2F0;--p-95:#ECF0F9;--p-99:#FAFBFE;--p-100:#FFF;
 --s-10:#28215A;--s-20:#3E3478;--s-30:#534792;--s-40:#6B5DAC;--s-50:#8576C2;--s-60:#9D90D2;--s-70:#B5ACDF;--s-80:#CFC8EA;--s-90:#E8E4F4;
 --t-10:#0E4A35;--t-20:#1A6047;--t-30:#1F7058;--t-50:#399971;--t-60:#5BB088;--t-80:#ADDCC2;--t-90:#D5EDDF;
 --w-30:#6B4500;--w-40:#8C5A00;--w-50:#A36A00;--w-60:#C28200;--w-80:#FAB44A;--w-90:#FFDFA8;
 --e-30:#7A1F1F;--e-50:#C73838;--e-80:#F4A4A4;--e-90:#FBD9D9;
 --n-30:#43475A;--n-50:#76798A;--n-60:#9094A3;--n-80:#C5C8D2;--n-95:#F1F2F5;--nv-80:#C5C9DD;
}
[data-theme="dark"] { --bg-base: var(--p-30); --bg-surface: var(--p-20); --bg-surface-2: var(--p-10); --border: rgba(255,255,255,0.08); --text-primary: var(--n-95); --text-secondary: var(--nv-80); --text-muted: rgba(255,255,255,0.4); --accent: var(--s-70); --accent-strong: var(--s-50); --on-accent: #fff; --page-bg: #0a0e1a; --page-fg: var(--n-95); --page-fg-muted: var(--nv-80); --page-card-bg: var(--p-20); --page-divider: rgba(255,255,255,0.06); }
[data-theme="light"] { --bg-base: var(--p-99); --bg-surface: #fff; --bg-surface-2: var(--p-95); --border: rgba(22,27,45,0.08); --text-primary: var(--p-20); --text-secondary: var(--n-50); --text-muted: var(--n-50); --accent: var(--p-40); --accent-strong: var(--s-40); --on-accent: #fff; --page-bg: var(--p-95); --page-fg: var(--p-20); --page-fg-muted: var(--n-50); --page-card-bg: #fff; --page-divider: rgba(22,27,45,0.08); }
* { box-sizing: border-box; }
html, body { background: var(--page-bg); color: var(--page-fg); margin: 0; transition: background-color 220ms ease, color 220ms ease; }
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; min-height: 100vh; }

/* SHELL. Same as other prototypes */
.proto-shell { display: grid; grid-template-columns: 280px 1fr; gap: 0; min-height: 100vh; }
@media (max-width: 960px) {.proto-shell { grid-template-columns: 1fr; } }
.proto-sidebar { background: var(--page-card-bg); border-right: 1px solid var(--page-divider); padding: 28px 22px; position: sticky; top: 0; height: 100vh; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }
@media (max-width: 960px) {.proto-sidebar { position: static; height: auto; max-height: 50vh; border-right: none; border-bottom: 1px solid var(--page-divider); } }
.proto-sidebar__brand { display: flex; align-items: center; gap: 10px; }
.proto-sidebar__mark { width: 36px; height: 36px; border-radius: 10px; background: var(--p-30); display: inline-flex; align-items: center; justify-content: center; }
.proto-sidebar__mark img { width: 70%; height: 70%; }
.proto-sidebar__name { font-weight: 700; font-size: 17px; letter-spacing: -0.01em; }
.proto-sidebar__pill { display: inline-flex; padding: 3px 9px; border-radius: 999px; background: linear-gradient(120deg, var(--s-50), var(--p-50), var(--t-50)); color: white; font-weight: 700; font-size: 9.5px; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.06em; text-transform: uppercase; }
.proto-sidebar__back { display: inline-flex; align-items: center; gap: 6px; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--page-fg-muted); text-decoration: none; }
.proto-sidebar__back:hover { color: var(--page-accent); }
.proto-section-title { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--page-fg-muted); margin: 12px 0 6px; }
.proto-scrubber { display: flex; flex-direction: column; gap: 2px; }
.proto-scrubber__item { display: grid; grid-template-columns: 44px 1fr; gap: 8px; align-items: center; padding: 7px 10px; border-radius: 8px; cursor: pointer; border: none; background: transparent; color: inherit; font-family: inherit; text-align: left; }
.proto-scrubber__item:hover { background: rgba(127,127,127,0.08); }
.proto-scrubber__item.is-active { background: var(--accent-strong); color: var(--on-accent); }
.proto-scrubber__item.is-active.proto-scrubber__id { color: rgba(255,255,255,0.85); }
.proto-scrubber__id { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 600; color: var(--page-fg-muted); letter-spacing: 0.06em; }
.proto-scrubber__name { font-size: 12.5px; font-weight: 500; }
.proto-sidebar__footer { margin-top: auto; padding-top: 16px; border-top: 1px solid var(--page-divider); font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--page-fg-muted); }
.proto-sidebar__footer a { color: var(--page-fg-muted); text-decoration: none; border-bottom: 1px dotted currentColor; }
.proto-theme-toggle { display: inline-flex; align-items: center; gap: 8px; padding: 7px 12px; border-radius: 8px; background: var(--bg-surface-2); border: 1px solid var(--border); color: var(--page-fg-muted); cursor: pointer; font-family: 'JetBrains Mono', monospace; font-size: 11px; align-self: flex-start; }
.proto-theme-toggle svg { width: 12px; height: 12px; }
[data-theme="dark"].proto-theme-toggle.icon-moon { display: none; }
[data-theme="light"].proto-theme-toggle.icon-sun { display: none; }

/* STAGE */
.proto-stage { display: flex; flex-direction: column; align-items: center; padding: 32px 24px 64px; gap: 22px; }
.proto-modebar { display: flex; align-items: center; gap: 10px; padding: 10px 16px; background: var(--page-card-bg); border: 1px solid var(--page-divider); border-radius: 12px; font-family: 'JetBrains Mono', monospace; font-size: 11.5px; color: var(--page-fg-muted); flex-wrap: wrap; justify-content: center; }
.proto-modebar__pill { display: inline-flex; padding: 3px 9px; border-radius: 999px; background: var(--bg-surface-2); }
.proto-modebar__id { color: var(--page-fg); font-weight: 700; letter-spacing: 0.06em; }
.proto-modebar__bar { width: 100px; height: 4px; border-radius: 4px; background: var(--bg-surface-2); position: relative; overflow: hidden; }
.proto-modebar__bar__fill { position: absolute; left: 0; top: 0; bottom: 0; background: linear-gradient(90deg, var(--s-50), var(--t-50)); transition: width 240ms ease; }
.proto-arrows { display: flex; align-items: center; gap: 8px; }
.proto-arrow { width: 36px; height: 36px; border-radius: 10px; background: var(--page-card-bg); border: 1px solid var(--page-divider); color: var(--page-fg-muted); display: inline-flex; align-items: center; justify-content: center; cursor: pointer; }
.proto-arrow:hover { background: var(--bg-surface-2); color: var(--page-fg); }
.proto-arrow:disabled { opacity: 0.3; cursor: not-allowed; }
.proto-arrow svg { width: 18px; height: 18px; }

/* PHONE */
.phone {
 width: 393px; height: 852px; flex-shrink: 0;
 border-radius: 56px; background: #000; padding: 13px; position: relative;
 box-shadow: 0 0 0 1.5px #2a2e3a, 0 30px 60px -20px rgba(0,0,0,0.7), 0 16px 32px -16px rgba(0,0,0,0.4);
}
.phone::before,.phone::after { content: ''; position: absolute; background: #2a2e3a; }
.phone::before { left: -3px; top: 110px; width: 3px; height: 30px; border-radius: 3px 0 0 3px; }
.phone::after { left: -3px; top: 160px; width: 3px; height: 60px; border-radius: 3px 0 0 3px; }
.phone__inner { width: 100%; height: 100%; background: var(--bg-base); color: var(--text-primary); border-radius: 44px; overflow: hidden; position: relative; display: flex; flex-direction: column; }
.phone__notch { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); width: 120px; height: 32px; background: #000; border-radius: 18px; z-index: 30; }

.phone__statusbar { height: 44px; padding: 12px 32px 0; display: flex; align-items: center; justify-content: space-between; font-size: 14px; font-weight: 600; color: var(--text-primary); font-feature-settings: "tnum"; flex-shrink: 0; }
.phone__statusbar__right { display: flex; align-items: center; gap: 5px; font-size: 13px; }

.phone__topbar { display: flex; align-items: center; justify-content: space-between; padding: 8px 18px 12px; gap: 10px; flex-shrink: 0; }
.phone__mark { width: 32px; height: 32px; border-radius: 9px; background: var(--bg-surface); border: 1px solid var(--border); display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
.phone__mark img { width: 65%; height: 65%; }
[data-theme="light"].phone__mark img { filter: invert(1) brightness(0.3); }
.phone__back { width: 32px; height: 32px; border-radius: 50%; background: transparent; border: none; color: var(--text-primary); display: inline-flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
.phone__back:hover { background: rgba(127,127,127,0.06); }
.phone__back svg { width: 20px; height: 20px; }
.phone__title { flex: 1; text-align: center; font-size: 14.5px; font-weight: 600; color: var(--text-primary); letter-spacing: -0.01em; }
.gc-crisis-pill { display: inline-flex; align-items: center; gap: 5px; padding: 6px 11px; border-radius: 999px; background: var(--e-50); color: white; border: none; font-family: inherit; font-size: 11.5px; font-weight: 600; cursor: pointer; flex-shrink: 0; }
.gc-crisis-pill svg { width: 11px; height: 11px; flex-shrink: 0; }

.bk-body { flex: 1; padding: 4px 16px 12px; overflow-y: auto; display: flex; flex-direction: column; gap: 11px; }
.bk-body::-webkit-scrollbar { width: 4px; }
.bk-body::-webkit-scrollbar-thumb { background: rgba(127,127,127,0.2); border-radius: 4px; }

/* Card */
.gc-card { padding: 14px; background: var(--bg-surface); border: 1px solid var(--border); border-radius: 14px; display: flex; flex-direction: column; gap: 8px; }
.gc-card--anna { background: linear-gradient(135deg, rgba(133,118,194,0.15), rgba(83,71,146,0.08)); border-color: rgba(133,118,194,0.25); flex-direction: row; align-items: center; gap: 10px; padding: 11px 13px; }
.gc-card--anna.anna-av { width: 30px; height: 30px; border-radius: 50%; background: var(--p-30); display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
.gc-card--anna.anna-av img { width: 60%; height: 60%; }
.gc-card--anna.anna-name { font-size: 12.5px; font-weight: 700; letter-spacing: -0.01em; margin-bottom: 1px; }
.gc-card--anna p { font-size: 13px; line-height: 1.4; margin: 0; color: var(--text-primary); }
.gc-card--milestone { background: linear-gradient(135deg, var(--s-40), var(--p-40)); color: white; border-color: transparent; }
.gc-card--milestone p { color: rgba(255,255,255,0.92); }
.gc-card--alert { background: var(--bg-surface-2); border-left: 3px solid var(--e-50); border-radius: 4px 12px 12px 4px; }

/* Balance card */
.bk-balance__head { display: flex; justify-content: space-between; align-items: center; }
.bk-kicker { font-family: 'JetBrains Mono', monospace; font-size: 9.5px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); }
.bk-mask { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-secondary); }
.bk-amount { font-size: 30px; font-weight: 800; letter-spacing: -0.025em; color: var(--text-primary); line-height: 1; }
.bk-amount span { font-size: 17px; color: var(--text-secondary); }
.bk-amount--masked { font-family: 'JetBrains Mono', monospace; font-size: 30px; letter-spacing: 0.08em; }
.bk-balance__delta { font-size: 12px; font-weight: 600; }
.bk-balance__delta--pos { color: var(--t-50); }
.bk-balance__delta--neg { color: var(--w-60); }
.bk-eye-btn { width: 28px; height: 28px; border-radius: 9px; background: var(--bg-base); border: 1px solid var(--border); display: inline-flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-secondary); padding: 0; }
.bk-eye-btn:hover { background: rgba(127,127,127,0.04); color: var(--text-primary); }
.bk-eye-btn svg { width: 14px; height: 14px; }

/* Sparkline */
.bk-spark { width: 100%; height: 36px; }

/* Streak dots 30-day grid */
.bk-streak { display: grid; grid-template-columns: repeat(15, 1fr); gap: 4px; }
.bk-streak__day { width: 100%; aspect-ratio: 1; border-radius: 3px; background: var(--bg-surface-2); border: 1px solid var(--border); }
.bk-streak__day.is-clean { background: var(--t-50); border-color: transparent; }
.bk-streak__day.is-monitoring { background: var(--s-50); border-color: transparent; opacity: 0.85; }
.bk-streak__day.is-today { box-shadow: 0 0 0 2px var(--accent); }

/* Quick-link grid */
.bk-quick { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.bk-quick__tile { display: flex; flex-direction: column; align-items: center; gap: 5px; padding: 10px 6px; background: var(--bg-base); border: 1px solid var(--border); border-radius: 11px; cursor: pointer; font-family: inherit; color: var(--text-primary); text-decoration: none; }
.bk-quick__tile:hover { background: rgba(127,127,127,0.04); }
.bk-quick__ic { width: 32px; height: 32px; border-radius: 9px; display: inline-flex; align-items: center; justify-content: center; }
.bk-quick__l { font-size: 10px; font-weight: 600; text-align: center; line-height: 1.2; }

/* Tx row */
.bk-tx { display: grid; grid-template-columns: 36px 1fr auto; gap: 11px; align-items: center; padding: 10px 0; border-top: 1px solid var(--border); }
.bk-tx:first-child { border-top: none; }
.bk-tx__av { width: 36px; height: 36px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; flex-shrink: 0; }
.bk-tx__name { font-size: 14px; font-weight: 600; color: var(--text-primary); }
.bk-tx__sub { font-size: 11.5px; color: var(--text-secondary); margin-top: 1px; display: flex; align-items: center; gap: 6px; }
.bk-tx__mcc { font-family: 'JetBrains Mono', monospace; font-size: 10px; padding: 1px 5px; border-radius: 4px; background: var(--bg-surface-2); color: var(--text-muted); }
.bk-tx__amt { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 700; color: var(--text-primary); text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
.bk-tx__amt--pos { color: var(--t-50); }
.bk-tx__amt--muted { color: var(--text-muted); }
.bk-tx__flag { font-size: 9px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; padding: 2px 7px; border-radius: 999px; background: var(--e-30); color: var(--e-90); }
[data-theme="light"].bk-tx__flag { background: var(--e-90); color: var(--e-30); }
.bk-tx--blocked.bk-tx__amt { color: var(--text-muted); }

/* Tx stream day header */
.bk-stream-day { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); padding: 8px 0 4px; }

/* Search + filter chips */
.bk-search { display: flex; align-items: center; gap: 8px; padding: 9px 13px; background: var(--bg-surface-2); border: 1px solid var(--border); border-radius: 999px; }
.bk-search svg { width: 14px; height: 14px; color: var(--text-secondary); flex-shrink: 0; }
.bk-search input { background: transparent; border: none; flex: 1; font-family: inherit; font-size: 13px; color: var(--text-primary); outline: none; }
.bk-filters { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; margin: 0 -16px; padding-left: 16px; padding-right: 16px; scrollbar-width: none; }
.bk-filters::-webkit-scrollbar { display: none; }
.bk-filter { padding: 7px 13px; border-radius: 999px; background: var(--bg-surface-2); border: 1px solid var(--border); font-family: inherit; font-size: 12px; font-weight: 500; color: var(--text-primary); cursor: pointer; white-space: nowrap; flex-shrink: 0; }
.bk-filter.is-on { background: var(--accent-strong); color: var(--on-accent); border-color: transparent; font-weight: 600; }
.bk-filter--blocked.is-on { background: var(--e-50); }
.bk-filter span { font-family: 'JetBrains Mono', monospace; font-size: 11px; opacity: 0.7; margin-left: 4px; }

/* Linked account list */
.bk-link { display: grid; grid-template-columns: 36px 1fr auto; gap: 12px; align-items: center; padding: 11px 0; border-top: 1px solid var(--border); }
.bk-link:first-child { border-top: none; }
.bk-link__logo { width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg, var(--p-30), var(--p-20)); color: white; display: inline-flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; flex-shrink: 0; }
.bk-link__main { min-width: 0; }
.bk-link__head { display: flex; gap: 7px; align-items: center; flex-wrap: wrap; }
.bk-link__name { font-size: 14px; font-weight: 600; color: var(--text-primary); }
.bk-link__mask { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-secondary); }
.bk-link__pills { display: flex; gap: 4px; margin-top: 3px; flex-wrap: wrap; }
.bk-link-pill { font-size: 9.5px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; padding: 2px 7px; border-radius: 999px; }
.bk-link-pill--primary { background: var(--p-40); color: white; }
.bk-link-pill--sponsor { background: var(--s-90); color: var(--s-20); }
[data-theme="dark"].bk-link-pill--sponsor { background: var(--s-20); color: var(--s-80); }
.bk-link-pill--warn { background: var(--w-90); color: var(--w-30); }
[data-theme="dark"].bk-link-pill--warn { background: var(--w-30); color: var(--w-80); }
.bk-link-pill--stale { background: var(--n-30); color: var(--n-80); display: inline-flex; align-items: center; gap: 3px; }
.bk-link-pill--stale::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: currentColor; animation: pulse 1.6s ease-in-out infinite; }
@keyframes pulse { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }
.bk-link__sub { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
.bk-link__balance { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 700; color: var(--text-primary); text-align: right; }

/* Slip cards (Hold state) */
.bk-slip { display: flex; flex-direction: column; gap: 3px; padding: 11px 0; border-top: 1px solid var(--border); }
.bk-slip:first-child { border-top: none; padding-top: 0; }
.bk-slip__pill { display: inline-flex; align-items: center; gap: 5px; padding: 3px 9px; border-radius: 999px; font-size: 10px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; align-self: flex-start; }
.bk-slip__pill--blocked { background: var(--e-30); color: var(--e-90); }
[data-theme="light"].bk-slip__pill--blocked { background: var(--e-90); color: var(--e-30); }
.bk-slip__pill--notice { background: var(--s-20); color: var(--s-80); }
[data-theme="light"].bk-slip__pill--notice { background: var(--s-90); color: var(--s-20); }
.bk-slip__pill--paused { background: var(--w-30); color: var(--w-80); }
[data-theme="light"].bk-slip__pill--paused { background: var(--w-90); color: var(--w-30); }
.bk-slip__t { font-size: 13px; font-weight: 600; }
.bk-slip__s { font-size: 11.5px; color: var(--text-secondary); line-height: 1.4; }

/* Spending bars (BK5) */
.bk-totals { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 7px; }
.bk-total { padding: 11px 12px; background: var(--bg-base); border: 1px solid var(--border); border-radius: 11px; }
.bk-total__l { font-size: 10.5px; color: var(--text-secondary); margin-bottom: 3px; }
.bk-total__n { font-size: 18px; font-weight: 800; letter-spacing: -0.015em; }
.bk-bar { display: grid; grid-template-columns: 88px 1fr 48px; gap: 9px; align-items: center; padding: 7px 0; }
.bk-bar__l { font-size: 12.5px; font-weight: 500; }
.bk-bar__t { height: 8px; background: var(--bg-surface-2); border-radius: 999px; overflow: hidden; }
.bk-bar__f { height: 100%; border-radius: 999px; }
.bk-bar__v { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 700; text-align: right; }
.bk-bar--zero.bk-bar__v { color: var(--t-50); }

/* Tx detail */
.bk-detail-icon { width: 56px; height: 56px; border-radius: 16px; display: inline-flex; align-items: center; justify-content: center; align-self: center; font-size: 22px; font-weight: 800; color: white; }
.bk-detail-amt { font-family: 'JetBrains Mono', monospace; font-size: 28px; font-weight: 700; text-align: center; }
.bk-detail-amt--muted { color: var(--text-muted); }
.bk-detail-status { display: inline-flex; align-self: center; padding: 4px 11px; border-radius: 999px; font-size: 10.5px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; background: var(--bg-surface-2); color: var(--text-secondary); }
.bk-detail-status--blocked { background: var(--e-30); color: var(--e-90); }
[data-theme="light"].bk-detail-status--blocked { background: var(--e-90); color: var(--e-30); }
.bk-meta { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-top: 1px solid var(--border); font-size: 13px; }
.bk-meta:first-child { border-top: none; }
.bk-meta__l { color: var(--text-secondary); }
.bk-meta__v { color: var(--text-primary); font-weight: 500; }
.bk-actions { display: flex; flex-direction: column; gap: 7px; }
.bk-action { display: grid; grid-template-columns: 36px 1fr 14px; gap: 11px; align-items: center; padding: 12px 14px; background: var(--bg-surface); border: 1px solid var(--border); border-radius: 12px; cursor: pointer; font-family: inherit; color: inherit; text-align: left; }
.bk-action:hover { background: rgba(127,127,127,0.04); border-color: var(--accent); }
.bk-action__icon { width: 36px; height: 36px; border-radius: 10px; background: var(--bg-surface-2); display: inline-flex; align-items: center; justify-content: center; color: var(--text-primary); }
.bk-action__icon svg { width: 18px; height: 18px; }
.bk-action__t { font-size: 13.5px; font-weight: 600; }
.bk-action__s { font-size: 11.5px; color: var(--text-secondary); margin-top: 1px; }
.bk-action__chev { color: var(--text-muted); font-size: 18px; line-height: 1; }
.bk-action--danger { border-color: rgba(199,56,56,0.2); }
.bk-action--danger.bk-action__icon { background: var(--e-30); color: var(--e-90); }
[data-theme="light"].bk-action--danger.bk-action__icon { background: var(--e-90); color: var(--e-30); }

/* Bottom tab bar */
.phone__tabbar { display: grid; grid-template-columns: repeat(5, 1fr); padding: 8px 8px 22px; border-top: 1px solid var(--border); background: var(--bg-base); flex-shrink: 0; }
.phone__tab { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 5px 4px; cursor: pointer; color: var(--text-muted); }
.phone__tab.is-on { color: var(--accent-strong); }
.phone__tab svg { width: 22px; height: 22px; }
.phone__tab span { font-size: 10px; font-weight: 600; }

/* Insight tiles */
.bk-insight-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
.bk-insight { padding: 11px 12px; background: var(--bg-base); border: 1px solid var(--border); border-radius: 11px; }
.bk-insight__n { font-size: 18px; font-weight: 800; letter-spacing: -0.015em; }
.bk-insight__l { font-size: 10.5px; color: var(--text-secondary); margin-top: 2px; }

/* CTA buttons */
.gc-btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 12px 16px; border-radius: 12px; font-family: inherit; font-size: 13.5px; font-weight: 600; cursor: pointer; border: 1px solid transparent; }
.gc-btn--primary { background: var(--accent-strong); color: var(--on-accent); }
.gc-btn--primary:hover { background: var(--s-40); }
.gc-btn--ghost { background: transparent; color: var(--text-primary); border-color: var(--border); }
.gc-btn--full { width: 100%; }
.gc-btn--sm { padding: 8px 12px; font-size: 12px; border-radius: 10px; }

/* CONTEXT panel */
.proto-context { width: 100%; max-width: 480px; padding: 14px 16px; background: var(--page-card-bg); border: 1px solid var(--page-divider); border-radius: 12px; font-size: 12.5px; color: var(--page-fg-muted); line-height: 1.55; }
.proto-context strong { color: var(--page-fg); }
.proto-context a { color: var(--page-accent, var(--s-70)); text-decoration: none; border-bottom: 1px dotted currentColor; }
.proto-context__head { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; font-weight: 700; color: var(--page-fg); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; }
.screen { animation: fade-in 220ms ease; }
@keyframes fade-in { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
@media (max-width: 720px) {.phone { transform: scale(0.92); transform-origin: top center; } }
@media (max-width: 480px) {.phone { transform: scale(0.78); } }

let idx = 0;

function render() {
 const screen = SCREENS[idx];
 document.getElementById('stage').innerHTML = `<div class="screen" style="display:flex;flex-direction:column;flex:1;min-height:0">${builders[screen.kind]()}</div>`;
 document.getElementById('screenId').textContent = screen.id;
 document.getElementById('screenName').textContent = screen.name;
 document.getElementById('progressFill').style.width = ((idx + 1) / SCREENS.length * 100) + '%';
 document.getElementById('navPrev').disabled = idx === 0;
 document.getElementById('navNext').disabled = idx === SCREENS.length - 1;
 document.querySelectorAll('.proto-scrubber__item').forEach((el, i) => {
 el.classList.toggle('is-active', i === idx);
 if (i === idx) el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
 });
 document.getElementById('contextBody').innerHTML = CTX[screen.kind] || screen.name;
}

function next() { if (idx < SCREENS.length - 1) { idx++; render(); } }
function prev() { if (idx > 0) { idx--; render(); } }
function go(i) { idx = i; render(); }

function buildScrubber() {
 const nav = document.getElementById('scrubber');
 SCREENS.forEach((s, i) => {
 const btn = document.createElement('button');
 btn.className = 'proto-scrubber__item';
 btn.innerHTML = `<span class="proto-scrubber__id">${s.id}</span><span class="proto-scrubber__name">${s.name}</span>`;
 btn.addEventListener('click', () => go(i));
 nav.appendChild(btn);
 });
}

function initTheme() {
 const root = document.documentElement;
 const stored = localStorage.getItem('gc-proto-theme');
 const initial = stored || 'dark';
 root.setAttribute('data-theme', initial);
 document.querySelector('.theme-label').textContent = initial === 'dark' ? 'Dark' : 'Light';
 document.querySelector('.proto-theme-toggle').addEventListener('click', () => {
 const next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
 root.setAttribute('data-theme', next);
 document.querySelector('.theme-label').textContent = next === 'dark' ? 'Dark' : 'Light';
 try { localStorage.setItem('gc-proto-theme', next); } catch(e) {}
 });
}

document.getElementById('navPrev').addEventListener('click', prev);
document.getElementById('navNext').addEventListener('click', next);
document.addEventListener('keydown', (e) => {
 if (e.key === 'ArrowRight') next();
 if (e.key === 'ArrowLeft') prev();
});

buildScrubber();
initTheme();
render();
</script>

</body>
</html>
