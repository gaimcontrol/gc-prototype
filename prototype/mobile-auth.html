<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GaimControl · Mobile · §04 Auth &amp; session</title>
<link rel="icon" href="../assets/gc-favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --p-10:#0B0F1C;--p-20:#161B2D;--p-30:#20273C;--p-40:#354872;--p-50:#4D608C;--p-60:#6B7DA6;--p-70:#8E9DC0;--p-80:#B5BFD9;--p-90:#DCE2F0;--p-95:#ECF0F9;--p-99:#FAFBFE;--p-100:#FFF;
  --s-10:#28215A;--s-20:#3E3478;--s-30:#534792;--s-40:#6B5DAC;--s-50:#8576C2;--s-60:#9D90D2;--s-70:#B5ACDF;--s-80:#CFC8EA;--s-90:#E8E4F4;
  --t-10:#0E4A35;--t-20:#1A6047;--t-30:#1F7058;--t-40:#2A8060;--t-50:#399971;--t-60:#5BB088;--t-70:#82C7A4;--t-80:#ADDCC2;--t-90:#D5EDDF;
  --w-30:#6B4500;--w-40:#8C5A00;--w-50:#A36A00;--w-60:#C28200;--w-70:#E09900;--w-80:#FAB44A;--w-90:#FFDFA8;
  --e-30:#7A1F1F;--e-50:#C73838;--e-90:#FBD9D9;
  --n-50:#76798A;--n-60:#9094A3;--n-95:#F1F2F5;--nv-80:#C5C9DD;
}
[data-theme="dark"] {
  --bg-base: var(--p-30); --bg-surface: var(--p-20); --bg-surface-2: var(--p-10);
  --border: rgba(255,255,255,0.08);
  --text-primary: var(--n-95); --text-secondary: var(--nv-80); --text-muted: rgba(255,255,255,0.4);
  --accent: var(--s-70); --accent-strong: var(--s-50); --on-accent: #fff;
  --page-bg: #0a0e1a; --page-fg: var(--n-95); --page-fg-muted: var(--nv-80);
  --page-card-bg: var(--p-20); --page-divider: rgba(255,255,255,0.06);
}
[data-theme="light"] {
  --bg-base: var(--p-99); --bg-surface: #fff; --bg-surface-2: var(--p-95);
  --border: rgba(22,27,45,0.08);
  --text-primary: var(--p-20); --text-secondary: var(--n-50); --text-muted: var(--n-50);
  --accent: var(--p-40); --accent-strong: var(--s-40); --on-accent: #fff;
  --page-bg: var(--p-95); --page-fg: var(--p-20); --page-fg-muted: var(--n-50);
  --page-card-bg: #fff; --page-divider: rgba(22,27,45,0.08);
}
* { box-sizing: border-box; }
html, body { background: var(--page-bg); color: var(--page-fg); margin: 0; transition: background-color 220ms ease, color 220ms ease; }
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; min-height: 100vh; }

/* SHELL */
.proto-shell { display: grid; grid-template-columns: 280px 1fr; gap: 0; min-height: 100vh; }
@media (max-width: 960px) { .proto-shell { grid-template-columns: 1fr; } }
.proto-sidebar { background: var(--page-card-bg); border-right: 1px solid var(--page-divider); padding: 28px 22px; position: sticky; top: 0; height: 100vh; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }
@media (max-width: 960px) { .proto-sidebar { position: static; height: auto; max-height: 50vh; border-right: none; border-bottom: 1px solid var(--page-divider); } }
.proto-sidebar__brand { display: flex; align-items: center; gap: 10px; }
.proto-sidebar__mark { width: 36px; height: 36px; border-radius: 10px; background: var(--p-30); display: inline-flex; align-items: center; justify-content: center; }
.proto-sidebar__mark img { width: 70%; height: 70%; }
.proto-sidebar__name { font-weight: 700; font-size: 17px; letter-spacing: -0.01em; }
.proto-sidebar__pill { display: inline-flex; padding: 3px 9px; border-radius: 999px; background: linear-gradient(120deg, var(--s-50), var(--p-50), var(--t-50)); color: white; font-weight: 700; font-size: 9.5px; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.06em; text-transform: uppercase; }
.proto-sidebar__back { display: inline-flex; align-items: center; gap: 6px; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--page-fg-muted); text-decoration: none; }
.proto-sidebar__back:hover { color: var(--page-accent); }
.proto-section-title { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--page-fg-muted); margin: 12px 0 6px; }
.proto-scrubber { display: flex; flex-direction: column; gap: 2px; }
.proto-scrubber__item { display: grid; grid-template-columns: 44px 1fr; gap: 8px; align-items: center; padding: 7px 10px; border-radius: 8px; cursor: pointer; border: none; background: transparent; color: inherit; font-family: inherit; text-align: left; }
.proto-scrubber__item:hover { background: rgba(127,127,127,0.08); }
.proto-scrubber__item.is-active { background: var(--accent-strong); color: var(--on-accent); }
.proto-scrubber__item.is-active .proto-scrubber__id { color: rgba(255,255,255,0.85); }
.proto-scrubber__id { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 600; color: var(--page-fg-muted); letter-spacing: 0.06em; }
.proto-scrubber__name { font-size: 12.5px; font-weight: 500; }
.proto-sidebar__footer { margin-top: auto; padding-top: 16px; border-top: 1px solid var(--page-divider); font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--page-fg-muted); }
.proto-sidebar__footer a { color: var(--page-fg-muted); text-decoration: none; border-bottom: 1px dotted currentColor; }
.proto-theme-toggle { display: inline-flex; align-items: center; gap: 8px; padding: 7px 12px; border-radius: 8px; background: var(--bg-surface-2); border: 1px solid var(--border); color: var(--page-fg-muted); cursor: pointer; font-family: 'JetBrains Mono', monospace; font-size: 11px; align-self: flex-start; }
.proto-theme-toggle svg { width: 12px; height: 12px; }
[data-theme="dark"] .proto-theme-toggle .icon-moon { display: none; }
[data-theme="light"] .proto-theme-toggle .icon-sun { display: none; }

/* STAGE */
.proto-stage { display: flex; flex-direction: column; align-items: center; padding: 48px 24px 64px; gap: 24px; }
.proto-modebar { display: flex; align-items: center; gap: 10px; padding: 10px 16px; background: var(--page-card-bg); border: 1px solid var(--page-divider); border-radius: 12px; font-family: 'JetBrains Mono', monospace; font-size: 11.5px; color: var(--page-fg-muted); flex-wrap: wrap; justify-content: center; }
.proto-modebar__pill { display: inline-flex; padding: 3px 9px; border-radius: 999px; background: var(--bg-surface-2); }
.proto-modebar__id { color: var(--page-fg); font-weight: 700; letter-spacing: 0.06em; }
.proto-modebar__bar { width: 100px; height: 4px; border-radius: 4px; background: var(--bg-surface-2); position: relative; overflow: hidden; }
.proto-modebar__bar__fill { position: absolute; left: 0; top: 0; bottom: 0; background: linear-gradient(90deg, var(--s-50), var(--t-50)); transition: width 240ms ease; }
.proto-arrows { display: flex; align-items: center; gap: 8px; }
.proto-arrow { width: 36px; height: 36px; border-radius: 10px; background: var(--page-card-bg); border: 1px solid var(--page-divider); color: var(--page-fg-muted); display: inline-flex; align-items: center; justify-content: center; cursor: pointer; }
.proto-arrow:hover { background: var(--bg-surface-2); color: var(--page-fg); }
.proto-arrow:disabled { opacity: 0.3; cursor: not-allowed; }
.proto-arrow svg { width: 18px; height: 18px; }

/* PHONE */
.phone {
  width: 393px; height: 852px; flex-shrink: 0;
  border-radius: 56px; background: #000; padding: 13px; position: relative;
  box-shadow: 0 0 0 1.5px #2a2e3a, 0 30px 60px -20px rgba(0,0,0,0.7), 0 16px 32px -16px rgba(0,0,0,0.4);
}
.phone::before, .phone::after { content: ''; position: absolute; background: #2a2e3a; }
.phone::before { left: -3px; top: 110px; width: 3px; height: 30px; border-radius: 3px 0 0 3px; }
.phone::after { left: -3px; top: 160px; width: 3px; height: 60px; border-radius: 3px 0 0 3px; }
.phone__inner { width: 100%; height: 100%; background: var(--bg-base); color: var(--text-primary); border-radius: 44px; overflow: hidden; position: relative; display: flex; flex-direction: column; }
.phone__notch { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); width: 120px; height: 32px; background: #000; border-radius: 18px; z-index: 30; }
.phone__statusbar { height: 44px; padding: 12px 32px 0; display: flex; align-items: center; justify-content: space-between; font-size: 14px; font-weight: 600; color: var(--text-primary); font-feature-settings: "tnum"; flex-shrink: 0; }
.phone__statusbar__right { display: flex; align-items: center; gap: 5px; font-size: 13px; }
.phone__topbar { display: flex; align-items: center; justify-content: space-between; padding: 8px 18px 8px; gap: 10px; flex-shrink: 0; min-height: 40px; }
.phone__back { width: 36px; height: 36px; border-radius: 50%; background: transparent; border: none; color: var(--text-primary); display: inline-flex; align-items: center; justify-content: center; cursor: pointer; }
.phone__back:hover { background: rgba(127,127,127,0.06); }
.phone__back svg { width: 22px; height: 22px; }
.phone__topbar__spacer { flex: 1; }
.phone__topbar__skip { font-size: 13.5px; color: var(--text-secondary); text-decoration: none; padding: 6px 10px; }
.gc-crisis-pill { display: inline-flex; align-items: center; gap: 5px; padding: 6px 11px; border-radius: 999px; background: var(--e-50); color: white; border: none; font-family: inherit; font-size: 11.5px; font-weight: 600; cursor: pointer; }
.gc-crisis-pill svg { width: 11px; height: 11px; flex-shrink: 0; }

.phone__content { flex: 1; padding: 12px 28px 24px; display: flex; flex-direction: column; gap: 14px; overflow-y: auto; }

/* Brand mark (large, top of content) */
.phone__brand { display: inline-flex; align-items: center; justify-content: center; width: 56px; height: 56px; border-radius: 16px; background: linear-gradient(135deg, var(--s-30), var(--p-20)); margin: 8px auto 4px; }
.phone__brand img { width: 60%; height: 60%; }

.phone__heading { font-size: 24px; font-weight: 800; letter-spacing: -0.02em; line-height: 1.15; margin: 4px 0 0; color: var(--text-primary); text-align: left; }
.phone__heading--center { text-align: center; }
.phone__sub { font-size: 14px; color: var(--text-secondary); line-height: 1.5; margin: 0; }
.phone__sub--center { text-align: center; }

/* Segmented control */
.gc-segmented { display: inline-flex; background: var(--bg-surface); border: 1px solid var(--border); border-radius: 12px; padding: 3px; gap: 3px; align-self: flex-start; }
.gc-segmented button { padding: 8px 16px; border-radius: 9px; border: none; background: transparent; color: var(--text-secondary); font-family: inherit; font-size: 13px; font-weight: 500; cursor: pointer; }
.gc-segmented button.is-on { background: var(--accent-strong); color: var(--on-accent); font-weight: 600; }

/* Field */
.phone__field { display: flex; flex-direction: column; gap: 6px; }
.phone__label { font-size: 12px; font-weight: 600; color: var(--text-secondary); letter-spacing: 0.02em; }
.phone__input { padding: 13px 14px; background: var(--bg-base); border: 1px solid var(--border); border-radius: 12px; font-family: inherit; font-size: 15px; color: var(--text-primary); width: 100%; }
.phone__input:focus { outline: none; border-color: var(--accent-strong); }
.phone__hint { font-size: 12px; color: var(--text-secondary); line-height: 1.4; }

/* OTP boxes */
.phone__otp { display: flex; gap: 8px; }
.phone__otp input { width: 100%; flex: 1; max-width: 56px; height: 56px; text-align: center; padding: 0; background: var(--bg-base); border: 1px solid var(--border); border-radius: 11px; font-family: 'JetBrains Mono', monospace; font-size: 22px; font-weight: 700; color: var(--text-primary); }
.phone__otp input:focus { outline: none; border-color: var(--accent-strong); }

/* Checkbox row */
.phone__check { display: flex; gap: 9px; align-items: flex-start; font-size: 12.5px; color: var(--text-secondary); line-height: 1.45; cursor: pointer; }
.gc-checkbox { width: 18px; height: 18px; border-radius: 5px; border: 1.5px solid currentColor; flex-shrink: 0; margin-top: 1px; display: inline-flex; align-items: center; justify-content: center; }
.gc-checkbox--on { background: var(--accent-strong); border-color: var(--accent-strong); color: white; }
.gc-checkbox--on::after { content: '✓'; font-size: 12px; font-weight: 700; color: white; }
.phone__check a { color: var(--accent); text-decoration: none; }

/* CTA */
.phone__cta { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 15px 18px; border-radius: 14px; background: var(--accent-strong); color: var(--on-accent); border: none; font-family: inherit; font-size: 15px; font-weight: 600; cursor: pointer; transition: transform 120ms ease, background-color 160ms ease; width: 100%; }
.phone__cta:hover { background: var(--s-40); }
[data-theme="light"] .phone__cta:hover { background: var(--s-30); }
.phone__cta:active { transform: scale(0.98); }
.phone__cta:disabled { background: rgba(127,127,127,0.18); color: var(--text-muted); cursor: not-allowed; }

/* Alt link below CTA */
.phone__alt { font-size: 12.5px; color: var(--text-secondary); text-align: center; margin: 0; }
.phone__alt a { color: var(--accent); font-weight: 500; text-decoration: none; cursor: pointer; }

/* Bottom-anchored helper links */
.phone__bottom-links { margin-top: auto; padding-top: 12px; display: flex; flex-direction: column; gap: 8px; }
.phone__bottom-links a { font-size: 12px; color: var(--accent); font-weight: 500; text-align: center; text-decoration: none; cursor: pointer; }
.phone__bottom-links a.dim { color: var(--text-muted); font-weight: 400; }
.phone__bottom-links a.sec { color: var(--text-secondary); }

/* AU4 envelope + pulse dot */
.phone__icon-circle { width: 72px; height: 72px; border-radius: 50%; background: var(--bg-surface); display: inline-flex; align-items: center; justify-content: center; align-self: center; margin: 12px 0 0; color: var(--accent); }
.phone__icon-circle svg { width: 32px; height: 32px; }
.phone__pulse-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); animation: pulse 1.4s ease-in-out infinite; }
@keyframes pulse { 0%,100% { opacity: 0.4; transform: scale(1); } 50% { opacity: 1; transform: scale(1.3); } }

/* AU5 recovery option button */
.recover-option { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px; text-align: left; display: flex; flex-direction: column; gap: 3px; cursor: pointer; font-family: inherit; color: inherit; transition: background 140ms ease; }
.recover-option:hover { background: rgba(127,127,127,0.04); border-color: var(--accent); }
.recover-option strong { font-weight: 600; font-size: 14px; color: var(--text-primary); }
.recover-option span { font-size: 12px; color: var(--text-secondary); }

/* Samaritans card */
.crisis-card { padding: 14px 16px; border-radius: 12px; background: var(--e-30); color: var(--e-90); font-size: 12.5px; line-height: 1.5; }
[data-theme="light"] .crisis-card { background: var(--e-90); color: var(--e-30); }
.crisis-card strong { display: block; margin-bottom: 2px; font-size: 13.5px; }

/* AU6 / AU7 progress bar */
.phone__progress { height: 4px; background: var(--bg-surface-2); border-radius: 4px; overflow: hidden; }
.phone__progress div { height: 100%; background: linear-gradient(90deg, var(--s-50), var(--t-50)); border-radius: 4px; }

/* Passcode boxes */
.phone__passcode { display: flex; gap: 12px; justify-content: center; }
.phone__passcode input { width: 56px; height: 64px; text-align: center; background: var(--bg-base); border: 1px solid var(--border); border-radius: 13px; font-size: 28px; font-weight: 700; color: var(--text-primary); padding: 0; }
.phone__passcode input.is-filled { background: var(--bg-surface); }

/* Biometric icon */
.biometric-icon { width: 96px; height: 96px; border-radius: 24px; background: var(--bg-surface); display: inline-flex; align-items: center; justify-content: center; align-self: center; margin: 16px 0; color: var(--accent); }
.biometric-icon svg { width: 48px; height: 48px; }

/* CONTEXT PANEL */
.proto-context { width: 100%; max-width: 480px; padding: 14px 16px; background: var(--page-card-bg); border: 1px solid var(--page-divider); border-radius: 12px; font-size: 12.5px; color: var(--page-fg-muted); line-height: 1.55; }
.proto-context strong { color: var(--page-fg); }
.proto-context a { color: var(--page-accent, var(--s-70)); text-decoration: none; border-bottom: 1px dotted currentColor; }
.proto-context__head { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; font-weight: 700; color: var(--page-fg); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; }

.screen { animation: fade-in 220ms ease; }
@keyframes fade-in { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
@media (max-width: 720px) { .phone { transform: scale(0.92); transform-origin: top center; } }
@media (max-width: 480px) { .phone { transform: scale(0.78); } }

/* ============= SPLASH (LA1) ============= */
.la-stage { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 28px; gap: 22px; cursor: pointer; background: linear-gradient(160deg, var(--p-30) 0%, var(--p-10) 100%); position: relative; overflow: hidden; color: white; }
[data-theme="light"] .la-stage { background: linear-gradient(160deg, var(--p-40) 0%, var(--p-20) 100%); }
.la-mark { width: 110px; height: 110px; border-radius: 28px; background: linear-gradient(135deg, var(--s-30), var(--p-20)); display: inline-flex; align-items: center; justify-content: center; position: relative; box-shadow: 0 24px 60px -10px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.08); animation: la-mark-rise 1s cubic-bezier(0.2,0.8,0.2,1) backwards; z-index: 3; }
.la-mark img { width: 56%; height: 56%; }
@keyframes la-mark-rise { from { transform: scale(0.6); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.la-pulse { position: absolute; inset: -14px; border-radius: 36px; border: 2px solid var(--s-50); opacity: 0; animation: la-pulse 2.6s ease-in-out 0.6s infinite; }
.la-pulse--2 { animation-delay: 1.2s; }
@keyframes la-pulse { 0% { opacity: 0.4; transform: scale(1); } 100% { opacity: 0; transform: scale(1.3); } }
.la-particles { position: absolute; inset: 0; pointer-events: none; }
.la-particle { position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; border-radius: 50%; background: var(--s-70); opacity: 0; animation: la-particle-orbit var(--orbit-d, 6s) linear infinite, la-particle-fade 1.2s ease-out 0.5s forwards; }
@keyframes la-particle-orbit { from { transform: rotate(0deg) translateX(var(--orbit-r, 60px)) rotate(0deg); } to { transform: rotate(360deg) translateX(var(--orbit-r, 60px)) rotate(-360deg); } }
@keyframes la-particle-fade { from { opacity: 0; } to { opacity: 0.7; } }
.la-particle:nth-child(1) { --orbit-r: 80px; --orbit-d: 9s; background: var(--s-70); }
.la-particle:nth-child(2) { --orbit-r: 90px; --orbit-d: 11s; background: var(--t-60); animation-delay: 0.6s, 0.7s; }
.la-particle:nth-child(3) { --orbit-r: 100px; --orbit-d: 13s; background: var(--w-80); animation-delay: 0.7s, 0.9s; }
.la-particle:nth-child(4) { --orbit-r: 75px; --orbit-d: 10s; background: var(--p-70); animation-delay: 0.8s, 1.1s; }
.la-particle:nth-child(5) { --orbit-r: 110px; --orbit-d: 15s; background: var(--s-50); animation-delay: 0.9s, 1.3s; }
.la-particle:nth-child(6) { --orbit-r: 70px; --orbit-d: 8s; background: white; width: 3px; height: 3px; animation-delay: 1s, 1.5s; }
.la-wordmark { font-size: 30px; font-weight: 800; letter-spacing: -0.025em; color: white; margin: 0; animation: la-rise 0.8s 0.4s cubic-bezier(0.2,0.8,0.2,1) backwards; z-index: 3; position: relative; }
.la-tag { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; color: rgba(255,255,255,0.6); animation: la-rise 0.8s 0.6s cubic-bezier(0.2,0.8,0.2,1) backwards; z-index: 3; position: relative; }
@keyframes la-rise { from { transform: translateY(8px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.la-tap-hint { position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%); font-family: 'JetBrains Mono', monospace; font-size: 10.5px; color: rgba(255,255,255,0.4); letter-spacing: 0.1em; text-transform: uppercase; z-index: 3; animation: la-rise 1s 1.5s cubic-bezier(0.2,0.8,0.2,1) backwards; }

/* ============= WELCOME SLIDES (WE1–WE5) ============= */
.we-stage { flex: 1; display: flex; flex-direction: column; position: relative; overflow: hidden; color: white; }
.we-stage--brand { background: linear-gradient(160deg, var(--p-30) 0%, var(--p-10) 100%); }
.we-stage--diagnose { background: linear-gradient(160deg, var(--p-40) 0%, var(--p-20) 100%); }
.we-stage--control { background: linear-gradient(160deg, var(--w-60) 0%, var(--w-40) 100%); }
.we-stage--anna { background: linear-gradient(160deg, var(--s-40) 0%, var(--s-20) 100%); }
.we-stage--repair { background: linear-gradient(160deg, var(--t-50) 0%, var(--t-20) 100%); }
.we-top { display: flex; align-items: center; justify-content: space-between; padding: 16px 22px; }
.we-dots { display: inline-flex; gap: 5px; align-items: center; }
.we-dot { width: 6px; height: 6px; border-radius: 999px; background: rgba(255,255,255,0.35); transition: width 220ms ease, background 220ms ease; }
.we-dot.is-on { background: white; width: 20px; }
.we-skip { color: rgba(255,255,255,0.7); font-size: 13px; font-weight: 500; text-decoration: none; padding: 6px 10px; cursor: pointer; }
.we-skip:hover { color: white; }

let idx = 0;

function render() {
  const screen = SCREENS[idx];
  document.getElementById('stage').innerHTML = `<div class="screen" style="display:flex;flex-direction:column;flex:1;min-height:0">${builders[screen.kind]()}</div>`;

  document.getElementById('screenId').textContent = screen.id;
  document.getElementById('screenName').textContent = screen.name;
  document.getElementById('progressFill').style.width = ((idx + 1) / SCREENS.length * 100) + '%';
  document.getElementById('navPrev').disabled = idx === 0;
  document.getElementById('navNext').disabled = idx === SCREENS.length - 1;

  document.querySelectorAll('.proto-scrubber__item').forEach((el, i) => {
    el.classList.toggle('is-active', i === idx);
    if (i === idx) el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  });

  document.getElementById('contextBody').innerHTML = CTX[screen.kind] || `<strong>${screen.id}</strong> ${screen.name}`;
}

function next() { if (idx < SCREENS.length - 1) { idx++; render(); } }
function prev() { if (idx > 0) { idx--; render(); } }
function go(i) { idx = i; render(); }
function restart() { idx = 7; render(); /* loop back to daily unlock for demo cycle */ }

function buildScrubber() {
  const nav = document.getElementById('scrubber');
  SCREENS.forEach((s, i) => {
    const btn = document.createElement('button');
    btn.className = 'proto-scrubber__item';
    btn.innerHTML = `<span class="proto-scrubber__id">${s.id}</span><span class="proto-scrubber__name">${s.name}</span>`;
    btn.addEventListener('click', () => go(i));
    nav.appendChild(btn);
  });
}

function initTheme() {
  const root = document.documentElement;
  const stored = localStorage.getItem('gc-proto-theme');
  const initial = stored || 'dark';
  root.setAttribute('data-theme', initial);
  document.querySelector('.theme-label').textContent = initial === 'dark' ? 'Dark' : 'Light';
  document.querySelector('.proto-theme-toggle').addEventListener('click', () => {
    const next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    root.setAttribute('data-theme', next);
    document.querySelector('.theme-label').textContent = next === 'dark' ? 'Dark' : 'Light';
    try { localStorage.setItem('gc-proto-theme', next); } catch(e) {}
  });
}

document.getElementById('navPrev').addEventListener('click', prev);
document.getElementById('navNext').addEventListener('click', next);
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight') next();
  if (e.key === 'ArrowLeft') prev();
});

buildScrubber();
initTheme();
render();
</script>
