<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">

<title>Holdwell · Web · §14 Marketing site</title>
<link rel="icon" href="../assets/gc-favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
 --p-10:#0B0F1C;--p-20:#161B2D;--p-30:#20273C;--p-40:#354872;--p-50:#4D608C;--p-60:#6B7DA6;--p-70:#8E9DC0;--p-80:#B5BFD9;--p-90:#DCE2F0;--p-95:#ECF0F9;--p-99:#FAFBFE;--p-100:#FFF;
 --s-10:#28215A;--s-20:#3E3478;--s-30:#534792;--s-40:#6B5DAC;--s-50:#8576C2;--s-60:#9D90D2;--s-70:#B5ACDF;--s-80:#CFC8EA;--s-90:#E8E4F4;--s-95:#F4F1FB;
 --t-10:#0E4A35;--t-20:#1A6047;--t-30:#1F7058;--t-40:#2A8060;--t-50:#399971;--t-60:#5BB088;--t-70:#82C7A4;--t-80:#ADDCC2;--t-90:#D5EDDF;--t-95:#EBF6F0;
 --w-30:#6B4500;--w-60:#C28200;--w-80:#FAB44A;--w-90:#FFDFA8;
 --e-30:#7A1F1F;--e-50:#C73838;--e-80:#F4A4A4;--e-90:#FBD9D9;
 --n-50:#76798A;--n-80:#C5C8D2;--n-95:#F1F2F5;--nv-80:#C5C9DD;
}
[data-theme="dark"] { --bg-base: var(--p-30); --bg-surface: var(--p-20); --bg-surface-2: var(--p-10); --border: rgba(255,255,255,0.08); --border-strong: rgba(255,255,255,0.16); --text-primary: var(--n-95); --text-secondary: var(--nv-80); --text-muted: rgba(255,255,255,0.45); --accent: var(--s-70); --accent-strong: var(--s-50); --on-accent: #fff; --page-bg: #0a0e1a; --page-fg: var(--n-95); --page-fg-muted: var(--nv-80); --page-card-bg: var(--p-20); --page-divider: rgba(255,255,255,0.06); --hero-bg: radial-gradient(at 20% 10%, rgba(133,118,194,0.18) 0, transparent 50%), radial-gradient(at 90% 80%, rgba(57,153,113,0.16) 0, transparent 50%), var(--p-30); }
[data-theme="light"] { --bg-base: var(--p-99); --bg-surface: #fff; --bg-surface-2: var(--p-95); --border: rgba(22,27,45,0.08); --border-strong: rgba(22,27,45,0.16); --text-primary: var(--p-20); --text-secondary: var(--n-50); --text-muted: var(--n-50); --accent: var(--p-40); --accent-strong: var(--s-40); --on-accent: #fff; --page-bg: var(--p-95); --page-fg: var(--p-20); --page-fg-muted: var(--n-50); --page-card-bg: #fff; --page-divider: rgba(22,27,45,0.08); --hero-bg: radial-gradient(at 20% 10%, rgba(133,118,194,0.14) 0, transparent 50%), radial-gradient(at 90% 80%, rgba(57,153,113,0.12) 0, transparent 50%), var(--p-99); }
* { box-sizing: border-box; }
html, body { background: var(--page-bg); color: var(--page-fg); margin: 0; transition: background-color 220ms ease, color 220ms ease; }
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; font-size: 15px; line-height: 1.5; -webkit-font-smoothing: antialiased; min-height: 100vh; }

/* Proto shell */
.proto-shell { display: grid; grid-template-columns: 280px 1fr; gap: 0; min-height: 100vh; }
@media (max-width: 1100px) {.proto-shell { grid-template-columns: 1fr; } }
.proto-sidebar { background: var(--page-card-bg); border-right: 1px solid var(--page-divider); padding: 28px 22px; position: sticky; top: 0; height: 100vh; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }
@media (max-width: 1100px) {.proto-sidebar { position: static; height: auto; max-height: 50vh; border-right: none; border-bottom: 1px solid var(--page-divider); } }
.proto-sidebar__brand { display: flex; align-items: center; gap: 10px; }
.proto-sidebar__mark { width: 36px; height: 36px; border-radius: 10px; background: var(--p-30); display: inline-flex; align-items: center; justify-content: center; }
.proto-sidebar__mark img { width: 70%; height: 70%; }
.proto-sidebar__name { font-weight: 700; font-size: 17px; letter-spacing: -0.01em; }
.proto-sidebar__pill { display: inline-flex; padding: 3px 9px; border-radius: 999px; background: linear-gradient(120deg, var(--s-50), var(--p-50), var(--t-50)); color: white; font-weight: 700; font-size: 9.5px; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.06em; text-transform: uppercase; }
.proto-sidebar__back { display: inline-flex; align-items: center; gap: 6px; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--page-fg-muted); text-decoration: none; }
.proto-section-title { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--page-fg-muted); margin: 12px 0 6px; }
.proto-scrubber { display: flex; flex-direction: column; gap: 2px; }
.proto-scrubber__item { display: grid; grid-template-columns: 44px 1fr; gap: 8px; align-items: center; padding: 7px 10px; border-radius: 8px; cursor: pointer; border: none; background: transparent; color: inherit; font-family: inherit; text-align: left; }
.proto-scrubber__item:hover { background: rgba(127,127,127,0.08); }
.proto-scrubber__item.is-active { background: var(--accent-strong); color: var(--on-accent); }
.proto-scrubber__item.is-active.proto-scrubber__id { color: rgba(255,255,255,0.85); }
.proto-scrubber__id { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 600; color: var(--page-fg-muted); letter-spacing: 0.06em; }
.proto-scrubber__name { font-size: 12.5px; font-weight: 500; }
.proto-sidebar__footer { margin-top: auto; padding-top: 16px; border-top: 1px solid var(--page-divider); font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--page-fg-muted); }
.proto-sidebar__footer a { color: var(--page-fg-muted); text-decoration: none; border-bottom: 1px dotted currentColor; }
.proto-theme-toggle { display: inline-flex; align-items: center; gap: 8px; padding: 7px 12px; border-radius: 8px; background: var(--bg-surface-2); border: 1px solid var(--border); color: var(--page-fg-muted); cursor: pointer; font-family: 'JetBrains Mono', monospace; font-size: 11px; align-self: flex-start; }
.proto-theme-toggle svg { width: 12px; height: 12px; }
[data-theme="dark"].proto-theme-toggle.icon-moon { display: none; }
[data-theme="light"].proto-theme-toggle.icon-sun { display: none; }

.proto-stage { display: flex; flex-direction: column; align-items: center; padding: 32px 24px 64px; gap: 18px; }
.proto-modebar { display: flex; align-items: center; gap: 10px; padding: 10px 16px; background: var(--page-card-bg); border: 1px solid var(--page-divider); border-radius: 12px; font-family: 'JetBrains Mono', monospace; font-size: 11.5px; color: var(--page-fg-muted); flex-wrap: wrap; justify-content: center; }
.proto-modebar__pill { display: inline-flex; padding: 3px 9px; border-radius: 999px; background: var(--bg-surface-2); }
.proto-modebar__id { color: var(--page-fg); font-weight: 700; letter-spacing: 0.06em; }
.proto-modebar__bar { width: 100px; height: 4px; border-radius: 4px; background: var(--bg-surface-2); position: relative; overflow: hidden; }
.proto-modebar__bar__fill { position: absolute; left: 0; top: 0; bottom: 0; background: linear-gradient(90deg, var(--s-50), var(--t-50)); transition: width 240ms ease; }
.proto-arrows { display: flex; align-items: center; gap: 8px; }
.proto-arrow { width: 36px; height: 36px; border-radius: 10px; background: var(--page-card-bg); border: 1px solid var(--page-divider); color: var(--page-fg-muted); display: inline-flex; align-items: center; justify-content: center; cursor: pointer; }
.proto-arrow:hover { background: var(--bg-surface-2); color: var(--page-fg); }
.proto-arrow:disabled { opacity: 0.3; cursor: not-allowed; }
.proto-arrow svg { width: 18px; height: 18px; }

/* Browser frame */
.browser { width: 100%; max-width: 1380px; background: var(--bg-base); border-radius: 18px; overflow: hidden; border: 1px solid var(--border); box-shadow: 0 24px 60px -20px rgba(0,0,0,0.45), 0 8px 24px -12px rgba(0,0,0,0.25); }
[data-theme="light"].browser { box-shadow: 0 24px 60px -20px rgba(22,27,45,0.18), 0 8px 24px -12px rgba(22,27,45,0.08); }
.browser__chrome { display: flex; align-items: center; gap: 14px; padding: 12px 16px; background: var(--p-20); border-bottom: 1px solid var(--border); }
[data-theme="light"].browser__chrome { background: var(--n-95); }
.browser__dots { display: inline-flex; gap: 7px; flex-shrink: 0; }
.browser__dot { width: 11px; height: 11px; border-radius: 50%; }
.browser__dot:nth-child(1) { background: #FF5F57; }.browser__dot:nth-child(2) { background: #FEBC2E; }.browser__dot:nth-child(3) { background: #28C840; }
.browser__url { flex: 1; background: var(--bg-base); border: 1px solid var(--border); border-radius: 7px; padding: 6px 14px; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-secondary); text-align: center; display: flex; align-items: center; justify-content: center; gap: 8px; }
.browser__url svg { width: 12px; height: 12px; opacity: 0.7; flex-shrink: 0; }
.browser__viewport { background: var(--bg-base); min-height: 820px; max-height: 820px; position: relative; color: var(--text-primary); overflow-y: auto; }
.browser__viewport::-webkit-scrollbar { width: 6px; }
.browser__viewport::-webkit-scrollbar-thumb { background: rgba(127,127,127,0.2); border-radius: 6px; }

/* ──────────── MARKETING SITE STYLES ──────────── */
/* Brand-wide marketing layout */
.mk { display: flex; flex-direction: column; min-height: 820px; }

/* Public top-nav */
.mk-nav { display: flex; align-items: center; gap: 32px; padding: 18px 36px; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 20; background: var(--bg-base); backdrop-filter: blur(20px); }
[data-theme="dark"].mk-nav { background: rgba(32,39,60,0.85); }
.mk-nav__brand { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--text-primary); flex-shrink: 0; }
.mk-nav__mark { width: 32px; height: 32px; border-radius: 9px; background: var(--p-30); display: inline-flex; align-items: center; justify-content: center; }
.mk-nav__mark img { width: 70%; height: 70%; }
.mk-nav__name { font-weight: 800; font-size: 17px; letter-spacing: -0.02em; }
.mk-nav__links { display: flex; gap: 4px; }
.mk-nav__link { padding: 8px 14px; font-size: 14px; font-weight: 500; color: var(--text-secondary); text-decoration: none; border-radius: 8px; cursor: pointer; }
.mk-nav__link:hover { color: var(--text-primary); background: rgba(127,127,127,0.06); }
.mk-nav__link.is-on { color: var(--text-primary); font-weight: 600; }
.mk-nav__cta { margin-left: auto; display: flex; gap: 10px; align-items: center; }
.mk-nav__login { font-size: 13.5px; font-weight: 600; color: var(--text-primary); text-decoration: none; padding: 8px 14px; }
.mk-btn { display: inline-flex; align-items: center; justify-content: center; gap: 7px; padding: 11px 20px; border-radius: 12px; font-family: inherit; font-size: 14px; font-weight: 700; cursor: pointer; border: 1px solid transparent; text-decoration: none; transition: transform 160ms ease, background-color 160ms ease; }
.mk-btn:hover { transform: translateY(-1px); }
.mk-btn--primary { background: var(--p-30); color: white; }
.mk-btn--primary:hover { background: var(--p-20); }
[data-theme="light"].mk-btn--primary { background: var(--p-30); }
.mk-btn--gradient { background: linear-gradient(120deg, var(--s-50), var(--p-50), var(--t-50)); color: white; box-shadow: 0 8px 24px -10px rgba(133,118,194,0.5); }
.mk-btn--gradient:hover { box-shadow: 0 12px 28px -10px rgba(133,118,194,0.65); }
.mk-btn--ghost { background: transparent; color: var(--text-primary); border-color: var(--border-strong); }
.mk-btn--ghost:hover { background: rgba(127,127,127,0.05); }
.mk-btn--lg { padding: 15px 28px; font-size: 16px; border-radius: 14px; }
.mk-btn--xl { padding: 18px 34px; font-size: 17px; border-radius: 14px; }

/* Hero · MK1 */
.mk-hero { position: relative; padding: 80px 60px 100px; background: var(--hero-bg); overflow: hidden; }
.mk-hero__bg-orb { position: absolute; pointer-events: none; opacity: 0.6; }
.mk-hero__bg-orb--1 { top: -120px; right: -80px; width: 420px; height: 420px; background: radial-gradient(circle, rgba(133,118,194,0.45), transparent 65%); }
.mk-hero__bg-orb--2 { bottom: -180px; left: -100px; width: 540px; height: 540px; background: radial-gradient(circle, rgba(57,153,113,0.32), transparent 65%); }
.mk-hero__container { display: grid; grid-template-columns: 1.2fr 1fr; gap: 60px; align-items: center; max-width: 1200px; margin: 0 auto; position: relative; z-index: 2; }
@media (max-width: 900px) {.mk-hero__container { grid-template-columns: 1fr; } }
.mk-eyebrow { display: inline-flex; align-items: center; gap: 8px; padding: 6px 14px; border-radius: 999px; background: rgba(133,118,194,0.16); color: var(--s-70); font-family: 'JetBrains Mono', monospace; font-size: 11.5px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; }
[data-theme="light"].mk-eyebrow { background: var(--s-95); color: var(--s-40); }
.mk-eyebrow::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--t-50); animation: pulse 2.4s ease-in-out infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

.mk-hero__h1 { font-size: 76px; font-weight: 900; letter-spacing: -0.04em; line-height: 0.95; margin: 22px 0 24px; max-width: 14ch; }
@media (max-width: 900px) {.mk-hero__h1 { font-size: 56px; } }
.mk-grad { background: linear-gradient(120deg, var(--s-50) 0%, var(--p-60) 38%, var(--t-50) 100%); -webkit-background-clip: text; background-clip: text; color: transparent; }
[data-theme="light"].mk-grad { background: linear-gradient(120deg, var(--s-40), var(--p-40), var(--t-40)); -webkit-background-clip: text; background-clip: text; color: transparent; }
.mk-hero__p { font-size: 19px; line-height: 1.55; color: var(--text-secondary); max-width: 52ch; margin: 0 0 36px; }
.mk-hero__cta-row { display: flex; gap: 14px; flex-wrap: wrap; }
.mk-hero__trust { display: flex; align-items: center; gap: 22px; margin-top: 36px; flex-wrap: wrap; padding-top: 28px; border-top: 1px solid var(--border); }
.mk-hero__trust-item { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); display: flex; align-items: center; gap: 8px; }
.mk-hero__trust-item svg { width: 14px; height: 14px; color: var(--t-50); }

/* Hero illustration */
.mk-hero__art { position: relative; aspect-ratio: 1/1; max-width: 480px; margin-left: auto; }
.mk-hero__art svg { width: 100%; height: 100%; filter: drop-shadow(0 24px 48px rgba(133,118,194,0.18)); }

/* Sections */
.mk-section { padding: 90px 60px; position: relative; }
.mk-section__container { max-width: 1200px; margin: 0 auto; }
.mk-section--bg { background: var(--bg-surface); }
[data-theme="dark"].mk-section--bg { background: rgba(0,0,0,0.18); }
.mk-section__h2 { font-size: 48px; font-weight: 800; letter-spacing: -0.03em; line-height: 1.05; margin: 0 0 20px; max-width: 22ch; }
@media (max-width: 900px) {.mk-section__h2 { font-size: 36px; } }
.mk-section__p { font-size: 18px; color: var(--text-secondary); line-height: 1.6; max-width: 60ch; margin: 0 0 56px; }
.mk-section__head { text-align: center; margin: 0 auto 60px; max-width: 700px; }
.mk-section__head.mk-section__h2 { margin: 16px auto 16px; }
.mk-section__head.mk-section__p { margin: 0 auto; }

/* 3-pillar grid */
.mk-pillars { display: grid; grid-template-columns: repeat(3, 1fr); gap: 22px; }
@media (max-width: 900px) {.mk-pillars { grid-template-columns: 1fr; } }
.mk-pillar { padding: 36px 30px; border-radius: 20px; background: var(--bg-surface); border: 1px solid var(--border); display: flex; flex-direction: column; gap: 14px; transition: transform 240ms ease, border-color 240ms ease, box-shadow 240ms ease; }
.mk-pillar:hover { transform: translateY(-4px); border-color: var(--accent); box-shadow: 0 24px 48px -20px rgba(0,0,0,0.25); }
.mk-pillar__icon { width: 64px; height: 64px; border-radius: 16px; display: inline-flex; align-items: center; justify-content: center; position: relative; }
.mk-pillar__icon svg { width: 60%; height: 60%; }
.mk-pillar--banking.mk-pillar__icon { background: linear-gradient(135deg, var(--s-50), var(--s-20)); color: white; }
.mk-pillar--therapy.mk-pillar__icon { background: linear-gradient(135deg, var(--p-50), var(--p-30)); color: white; }
.mk-pillar--account.mk-pillar__icon { background: linear-gradient(135deg, var(--t-50), var(--t-20)); color: white; }
.mk-pillar__tag { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); }
.mk-pillar__h { font-size: 22px; font-weight: 800; letter-spacing: -0.01em; margin: 0; }
.mk-pillar__d { font-size: 14.5px; color: var(--text-secondary); line-height: 1.6; margin: 0; }
.mk-pillar__link { display: inline-flex; align-items: center; gap: 6px; font-size: 13.5px; font-weight: 700; color: var(--accent); text-decoration: none; margin-top: 4px; }
.mk-pillar__link:hover { gap: 10px; }

/* Stats row */
.mk-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 22px; }
@media (max-width: 900px) {.mk-stats { grid-template-columns: 1fr 1fr; } }
.mk-stat { text-align: left; padding: 24px 26px; background: var(--bg-surface); border: 1px solid var(--border); border-radius: 16px; }
.mk-stat__n { font-size: 48px; font-weight: 900; letter-spacing: -0.03em; line-height: 1; background: linear-gradient(120deg, var(--s-50), var(--t-50)); -webkit-background-clip: text; background-clip: text; color: transparent; }
.mk-stat__l { font-size: 13.5px; color: var(--text-secondary); margin-top: 10px; line-height: 1.5; }

/* Quote */
.mk-quote { padding: 60px; border-radius: 24px; background: linear-gradient(135deg, var(--s-20), var(--p-30) 80%); color: white; position: relative; overflow: hidden; }
[data-theme="light"].mk-quote { background: linear-gradient(135deg, var(--p-30), var(--s-30)); }
.mk-quote::before { content: '"'; position: absolute; top: -20px; left: 40px; font-family: 'Inter', serif; font-size: 200px; font-weight: 900; color: rgba(255,255,255,0.1); line-height: 1; }
.mk-quote__t { font-size: 26px; font-weight: 600; line-height: 1.4; letter-spacing: -0.01em; max-width: 28ch; position: relative; z-index: 2; }
.mk-quote__author { display: flex; align-items: center; gap: 14px; margin-top: 28px; }
.mk-quote__author-av { width: 44px; height: 44px; border-radius: 50%; background: rgba(255,255,255,0.18); display: inline-flex; align-items: center; justify-content: center; font-weight: 800; }
.mk-quote__author-name { font-weight: 700; font-size: 15px; }
.mk-quote__author-role { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; opacity: 0.78; letter-spacing: 0.06em; text-transform: uppercase; margin-top: 2px; }

/* Big CTA strip */
.mk-cta { padding: 60px; border-radius: 24px; background: linear-gradient(135deg, var(--s-50), var(--p-40) 50%, var(--t-50)); color: white; text-align: center; position: relative; overflow: hidden; }
.mk-cta::before,.mk-cta::after { content: ''; position: absolute; border-radius: 50%; background: radial-gradient(circle, rgba(255,255,255,0.18), transparent 70%); }
.mk-cta::before { top: -160px; left: -100px; width: 380px; height: 380px; }
.mk-cta::after { bottom: -180px; right: -120px; width: 460px; height: 460px; }
.mk-cta__h { font-size: 42px; font-weight: 900; letter-spacing: -0.03em; line-height: 1.05; margin: 0; position: relative; z-index: 2; }
.mk-cta__p { font-size: 17px; line-height: 1.55; opacity: 0.92; margin: 16px auto 36px; max-width: 50ch; position: relative; z-index: 2; }
.mk-cta__btns { display: inline-flex; gap: 12px; flex-wrap: wrap; justify-content: center; position: relative; z-index: 2; }
.mk-btn--white { background: white; color: var(--p-30); }
.mk-btn--white:hover { background: var(--p-95); }
.mk-btn--ghost-light { background: rgba(255,255,255,0.15); color: white; border-color: rgba(255,255,255,0.25); }

/* Footer */
.mk-footer { padding: 60px; border-top: 1px solid var(--border); background: var(--bg-surface-2); }
.mk-footer__container { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1fr; gap: 40px; }
@media (max-width: 900px) {.mk-footer__container { grid-template-columns: 1fr 1fr; } }
.mk-footer__brand-h { font-size: 16px; font-weight: 800; margin: 0 0 10px; }
.mk-footer__brand-p { font-size: 13px; color: var(--text-secondary); line-height: 1.55; max-width: 32ch; }
.mk-footer__col-h { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin: 0 0 14px; }
.mk-footer__col-link { display: block; padding: 4px 0; font-size: 13px; color: var(--text-secondary); text-decoration: none; }
.mk-footer__col-link:hover { color: var(--text-primary); }
.mk-footer__bottom { max-width: 1200px; margin: 40px auto 0; padding-top: 22px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; font-size: 12px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; flex-wrap: wrap; gap: 14px; }

/* MK2 · How it works */
.mk-step { display: grid; grid-template-columns: 80px 1fr 1fr; gap: 32px; align-items: center; padding: 36px 0; border-top: 1px solid var(--border); }
.mk-step:first-of-type { border-top: none; }

// ────────── render ──────────
let idx = 0;

function render() {
 const screen = SCREENS[idx];
 const vp = document.getElementById('viewport');
 vp.scrollTop = 0;
 vp.innerHTML = builders[screen.kind]();
 document.getElementById('browserUrl').textContent = 'gaimcontrol.com' + screen.url;
 document.getElementById('screenId').textContent = screen.id;
 document.getElementById('screenName').innerHTML = screen.name;
 document.getElementById('progressFill').style.width = ((idx + 1) / SCREENS.length * 100) + '%';
 document.getElementById('navPrev').disabled = idx === 0;
 document.getElementById('navNext').disabled = idx === SCREENS.length - 1;
 document.querySelectorAll('.proto-scrubber__item').forEach((el, i) => {
 el.classList.toggle('is-active', i === idx);
 if (i === idx) el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
 });
 document.getElementById('contextBody').innerHTML = CTX[screen.kind] || screen.name;
 if (screen.kind === 'mk7') renderProfile('p2');
}

function next() { if (idx < SCREENS.length - 1) { idx++; render(); } }
function prev() { if (idx > 0) { idx--; render(); } }
function go(i) { idx = i; render(); }

function buildScrubber() {
 const nav = document.getElementById('scrubber');
 SCREENS.forEach((s, i) => {
 const btn = document.createElement('button');
 btn.className = 'proto-scrubber__item';
 btn.innerHTML = `<span class="proto-scrubber__id">${s.id}</span><span class="proto-scrubber__name">${s.name}</span>`;
 btn.addEventListener('click', () => go(i));
 nav.appendChild(btn);
 });
}

function initTheme() {
 const root = document.documentElement;
 const stored = localStorage.getItem('gc-proto-theme');
 const initial = stored || 'dark';
 root.setAttribute('data-theme', initial);
 document.querySelector('.theme-label').textContent = initial === 'dark' ? 'Dark' : 'Light';
 document.querySelector('.proto-theme-toggle').addEventListener('click', () => {
 const next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
 root.setAttribute('data-theme', next);
 document.querySelector('.theme-label').textContent = next === 'dark' ? 'Dark' : 'Light';
 try { localStorage.setItem('gc-proto-theme', next); } catch(e) {}
 });
}

document.getElementById('navPrev').addEventListener('click', prev);
document.getElementById('navNext').addEventListener('click', next);
document.addEventListener('keydown', (e) => { if (e.key === 'ArrowRight') next(); if (e.key === 'ArrowLeft') prev(); });
buildScrubber();
initTheme();
render();
</script>
