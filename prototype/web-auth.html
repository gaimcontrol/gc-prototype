<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GaimControl · Web · §04 Auth &amp; session</title>
<link rel="icon" href="../assets/gc-favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --p-10:#0B0F1C;--p-20:#161B2D;--p-30:#20273C;--p-40:#354872;--p-50:#4D608C;--p-60:#6B7DA6;--p-70:#8E9DC0;--p-90:#DCE2F0;--p-95:#ECF0F9;--p-99:#FAFBFE;--p-100:#FFF;
  --s-10:#28215A;--s-20:#3E3478;--s-30:#534792;--s-40:#6B5DAC;--s-50:#8576C2;--s-70:#B5ACDF;--s-80:#CFC8EA;--s-90:#E8E4F4;
  --t-10:#0E4A35;--t-20:#1A6047;--t-30:#1F7058;--t-50:#399971;--t-60:#5BB088;--t-80:#ADDCC2;--t-90:#D5EDDF;
  --w-30:#6B4500;--w-60:#C28200;--w-80:#FAB44A;--w-90:#FFDFA8;
  --e-30:#7A1F1F;--e-50:#C73838;--e-80:#F4A4A4;--e-90:#FBD9D9;
  --n-50:#76798A;--n-60:#9094A3;--n-95:#F1F2F5;--nv-80:#C5C9DD;
}
[data-theme="dark"] { --bg-base: var(--p-30); --bg-surface: var(--p-20); --bg-surface-2: var(--p-10); --border: rgba(255,255,255,0.08); --text-primary: var(--n-95); --text-secondary: var(--nv-80); --text-muted: rgba(255,255,255,0.4); --accent: var(--s-70); --accent-strong: var(--s-50); --on-accent: #fff; --page-bg: #0a0e1a; --page-fg: var(--n-95); --page-fg-muted: var(--nv-80); --page-card-bg: var(--p-20); --page-divider: rgba(255,255,255,0.06); }
[data-theme="light"] { --bg-base: var(--p-99); --bg-surface: #fff; --bg-surface-2: var(--p-95); --border: rgba(22,27,45,0.08); --text-primary: var(--p-20); --text-secondary: var(--n-50); --text-muted: var(--n-50); --accent: var(--p-40); --accent-strong: var(--s-40); --on-accent: #fff; --page-bg: var(--p-95); --page-fg: var(--p-20); --page-fg-muted: var(--n-50); --page-card-bg: #fff; --page-divider: rgba(22,27,45,0.08); }
* { box-sizing: border-box; }
html, body { background: var(--page-bg); color: var(--page-fg); margin: 0; transition: background-color 220ms ease, color 220ms ease; }
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; min-height: 100vh; }

/* SHELL */
.proto-shell { display: grid; grid-template-columns: 280px 1fr; gap: 0; min-height: 100vh; }
@media (max-width: 1100px) { .proto-shell { grid-template-columns: 1fr; } }
.proto-sidebar { background: var(--page-card-bg); border-right: 1px solid var(--page-divider); padding: 28px 22px; position: sticky; top: 0; height: 100vh; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }
@media (max-width: 1100px) { .proto-sidebar { position: static; height: auto; max-height: 50vh; border-right: none; border-bottom: 1px solid var(--page-divider); } }
.proto-sidebar__brand { display: flex; align-items: center; gap: 10px; }
.proto-sidebar__mark { width: 36px; height: 36px; border-radius: 10px; background: var(--p-30); display: inline-flex; align-items: center; justify-content: center; }
.proto-sidebar__mark img { width: 70%; height: 70%; }
.proto-sidebar__name { font-weight: 700; font-size: 17px; letter-spacing: -0.01em; }
.proto-sidebar__pill { display: inline-flex; padding: 3px 9px; border-radius: 999px; background: linear-gradient(120deg, var(--s-50), var(--p-50), var(--t-50)); color: white; font-weight: 700; font-size: 9.5px; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.06em; text-transform: uppercase; }
.proto-sidebar__back { display: inline-flex; align-items: center; gap: 6px; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--page-fg-muted); text-decoration: none; }
.proto-sidebar__back:hover { color: var(--page-accent); }
.proto-section-title { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--page-fg-muted); margin: 12px 0 6px; }
.proto-scrubber { display: flex; flex-direction: column; gap: 2px; }
.proto-scrubber__item { display: grid; grid-template-columns: 44px 1fr; gap: 8px; align-items: center; padding: 7px 10px; border-radius: 8px; cursor: pointer; border: none; background: transparent; color: inherit; font-family: inherit; text-align: left; }
.proto-scrubber__item:hover { background: rgba(127,127,127,0.08); }
.proto-scrubber__item.is-active { background: var(--accent-strong); color: var(--on-accent); }
.proto-scrubber__item.is-active .proto-scrubber__id { color: rgba(255,255,255,0.85); }
.proto-scrubber__id { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 600; color: var(--page-fg-muted); letter-spacing: 0.06em; }
.proto-scrubber__name { font-size: 12.5px; font-weight: 500; }
.proto-sidebar__footer { margin-top: auto; padding-top: 16px; border-top: 1px solid var(--page-divider); font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--page-fg-muted); }
.proto-sidebar__footer a { color: var(--page-fg-muted); text-decoration: none; border-bottom: 1px dotted currentColor; }
.proto-theme-toggle { display: inline-flex; align-items: center; gap: 8px; padding: 7px 12px; border-radius: 8px; background: var(--bg-surface-2); border: 1px solid var(--border); color: var(--page-fg-muted); cursor: pointer; font-family: 'JetBrains Mono', monospace; font-size: 11px; align-self: flex-start; }
.proto-theme-toggle svg { width: 12px; height: 12px; }
[data-theme="dark"] .proto-theme-toggle .icon-moon { display: none; }
[data-theme="light"] .proto-theme-toggle .icon-sun { display: none; }

/* STAGE */
.proto-stage { display: flex; flex-direction: column; align-items: center; padding: 32px 24px 64px; gap: 18px; }
.proto-modebar { display: flex; align-items: center; gap: 10px; padding: 10px 16px; background: var(--page-card-bg); border: 1px solid var(--page-divider); border-radius: 12px; font-family: 'JetBrains Mono', monospace; font-size: 11.5px; color: var(--page-fg-muted); flex-wrap: wrap; justify-content: center; }
.proto-modebar__pill { display: inline-flex; padding: 3px 9px; border-radius: 999px; background: var(--bg-surface-2); }
.proto-modebar__id { color: var(--page-fg); font-weight: 700; letter-spacing: 0.06em; }
.proto-modebar__bar { width: 100px; height: 4px; border-radius: 4px; background: var(--bg-surface-2); position: relative; overflow: hidden; }
.proto-modebar__bar__fill { position: absolute; left: 0; top: 0; bottom: 0; background: linear-gradient(90deg, var(--s-50), var(--t-50)); transition: width 240ms ease; }
.proto-arrows { display: flex; align-items: center; gap: 8px; }
.proto-arrow { width: 36px; height: 36px; border-radius: 10px; background: var(--page-card-bg); border: 1px solid var(--page-divider); color: var(--page-fg-muted); display: inline-flex; align-items: center; justify-content: center; cursor: pointer; }
.proto-arrow:hover { background: var(--bg-surface-2); color: var(--page-fg); }
.proto-arrow:disabled { opacity: 0.3; cursor: not-allowed; }
.proto-arrow svg { width: 18px; height: 18px; }

/* BROWSER */
.browser { width: 100%; max-width: 1280px; background: var(--bg-base); border-radius: 18px; overflow: hidden; border: 1px solid var(--border); box-shadow: 0 24px 60px -20px rgba(0,0,0,0.45), 0 8px 24px -12px rgba(0,0,0,0.25); }
[data-theme="light"] .browser { box-shadow: 0 24px 60px -20px rgba(22,27,45,0.18), 0 8px 24px -12px rgba(22,27,45,0.08); }
.browser__chrome { display: flex; align-items: center; gap: 14px; padding: 12px 16px; background: var(--p-20); border-bottom: 1px solid var(--border); }
[data-theme="light"] .browser__chrome { background: var(--n-95); }
.browser__dots { display: inline-flex; gap: 7px; flex-shrink: 0; }
.browser__dot { width: 11px; height: 11px; border-radius: 50%; }
.browser__dot:nth-child(1) { background: #FF5F57; } .browser__dot:nth-child(2) { background: #FEBC2E; } .browser__dot:nth-child(3) { background: #28C840; }
.browser__url { flex: 1; background: var(--bg-base); border: 1px solid var(--border); border-radius: 7px; padding: 6px 14px; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-secondary); text-align: center; display: flex; align-items: center; justify-content: center; gap: 8px; }
.browser__url svg { width: 12px; height: 12px; opacity: 0.7; flex-shrink: 0; }
.browser__viewport { background: var(--bg-base); min-height: 720px; position: relative; color: var(--text-primary); }

/* AUTH STAGE (inside browser) */
.auth-stage { display: flex; flex-direction: column; min-height: 720px; }
.auth-stage__top { display: flex; align-items: center; justify-content: space-between; padding: 20px 36px; border-bottom: 1px solid var(--border); }
.auth-stage__brand { display: inline-flex; align-items: center; gap: 10px; font-weight: 700; font-size: 15px; letter-spacing: -0.01em; }
.auth-stage__brand img { width: 22px; height: 22px; }
[data-theme="light"] .auth-stage__brand img { filter: invert(1) brightness(0.3); }
.auth-stage__top-right { display: flex; align-items: center; gap: 12px; font-size: 13px; color: var(--text-secondary); }
.auth-stage__top-right a { color: var(--text-secondary); text-decoration: none; }
.auth-stage__top-right a:hover { color: var(--accent); }

.gc-crisis-pill { display: inline-flex; align-items: center; gap: 7px; padding: 8px 14px; border-radius: 999px; background: var(--e-50); color: white; border: none; font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer; }
.gc-crisis-pill svg { width: 13px; height: 13px; flex-shrink: 0; }

.auth-stage__body { flex: 1; display: flex; flex-direction: column; padding: 0; }
.auth-stage__footer { display: flex; justify-content: center; gap: 24px; padding: 18px 36px; border-top: 1px solid var(--border); font-size: 12px; color: var(--text-secondary); }
.auth-stage__footer a { color: var(--text-secondary); text-decoration: none; }
.auth-stage__footer a:hover { color: var(--accent); }

/* SPLIT (AU1, AU2) */
.auth-split { display: grid; grid-template-columns: 1fr 1fr; flex: 1; min-height: 0; }
.auth-split__form { display: flex; align-items: center; justify-content: center; padding: 56px 48px; }
.auth-form-card { width: 100%; max-width: 380px; display: flex; flex-direction: column; gap: 18px; }
.auth-form-card__heading { font-size: 32px; font-weight: 800; letter-spacing: -0.025em; line-height: 1.1; margin: 0; }
.auth-form-card__sub { font-size: 14.5px; color: var(--text-secondary); margin: 0; line-height: 1.55; }
.auth-form-card__alt { font-size: 13.5px; color: var(--text-secondary); }
.auth-form-card__alt a { color: var(--accent); font-weight: 500; text-decoration: none; cursor: pointer; }

/* Carousel (right panel of AU1/AU2) */
.auth-split__illust { background: var(--bg-surface); border-left: 1px solid var(--border); position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; padding: 32px; }
[data-theme="light"] .auth-split__illust { background: var(--bg-surface-2); }
.carousel { position: relative; width: 100%; height: 100%; min-height: 480px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px; }
.carousel__slide { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px; padding: 36px; opacity: 0; transition: opacity 600ms ease; pointer-events: none; }
.carousel__slide.is-on { opacity: 1; pointer-events: auto; }
.carousel__visual { width: 100%; max-width: 280px; min-height: 240px; display: flex; align-items: center; justify-content: center; position: relative; }
.carousel__heading { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.2; margin: 0; text-align: center; }
.carousel__sub { font-size: 13.5px; color: var(--text-secondary); margin: 0; text-align: center; line-height: 1.55; max-width: 320px; }
.carousel__dots { position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; }
.carousel__dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(127,127,127,0.3); cursor: pointer; }
.carousel__dot.is-on { background: var(--accent-strong); width: 22px; border-radius: 4px; transition: width 220ms ease; }

@keyframes brand-float { 0%,100% { transform: translateY(0) rotate(-3deg); } 50% { transform: translateY(-6px) rotate(-2deg); } }
@keyframes gc-pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }

/* Slide visuals */
.slide-brand { position: relative; display: flex; flex-direction: column; align-items: center; gap: 14px; transform: rotate(-3deg); animation: brand-float 4.5s ease-in-out infinite; }
.slide-brand__mark { width: 96px; height: 96px; border-radius: 24px; background: linear-gradient(135deg,var(--p-30),var(--p-10)); display: inline-flex; align-items: center; justify-content: center; box-shadow: 0 24px 48px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.08); }
.slide-brand__mark img { width: 60%; height: 60%; }
.slide-brand__pill { padding: 5px 13px; border-radius: 999px; background: var(--p-20); color: white; font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: 0.06em; font-weight: 600; }

.slide-diagnose { display: flex; flex-direction: column; gap: 12px; width: 240px; }
.slide-diagnose__chart { background: var(--bg-base); border: 1px solid var(--border); border-radius: 14px; padding: 14px; transform: rotate(-2deg); box-shadow: 0 16px 40px rgba(0,0,0,0.3); }
.slide-diagnose__chart-label { font-size: 9.5px; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; color: var(--text-secondary); }
.slide-diagnose__alert { background: linear-gradient(135deg,var(--e-30),#5C0E0A); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 10px 12px; display: flex; align-items: center; gap: 10px; box-shadow: 0 16px 40px rgba(0,0,0,0.3); transform: rotate(2deg); }
.slide-diagnose__alert-icon { width: 26px; height: 26px; border-radius: 50%; background: rgba(255,255,255,0.15); display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; color: white; }
.slide-diagnose__alert-icon svg { width: 14px; height: 14px; }
.slide-diagnose__alert-title { font-size: 11px; font-weight: 600; color: white; }
.slide-diagnose__alert-sub { font-size: 10px; color: var(--e-80); }

.slide-control__card { width: 220px; height: 140px; background: linear-gradient(135deg,#161B2D,#20273C); border-radius: 18px; padding: 16px; color: white; box-shadow: 0 24px 48px rgba(0,0,0,0.4); transform: rotate(-8deg); position: relative; }
.slide-control__card img { width: 20px; height: 20px; opacity: 0.95; }
.slide-control__num { font-family: 'JetBrains Mono', monospace; font-size: 15px; letter-spacing: 0.08em; margin-top: 20px; }
.slide-control__meta { display: flex; gap: 14px; margin-top: 6px; font-size: 9px; color: var(--nv-80); }
.slide-control__lock { position: absolute; bottom: 14px; right: 14px; width: 30px; height: 30px; border-radius: 50%; background: var(--e-90); color: var(--e-30); display: inline-flex; align-items: center; justify-content: center; }
.slide-control__lock svg { width: 16px; height: 16px; }
.slide-control__badge { position: absolute; top: -10px; right: -10px; padding: 5px 11px; border-radius: 999px; background: var(--e-50); color: white; font-size: 10.5px; font-weight: 700; transform: rotate(8deg); }

.slide-anna { display: flex; flex-direction: column; gap: 8px; width: 240px; }
.slide-anna__bubble-in { padding: 12px 14px; border-radius: 18px 18px 18px 4px; font-size: 13px; line-height: 1.4; max-width: 88%; box-shadow: 0 16px 40px rgba(0,0,0,0.25); transform: rotate(-2deg); align-self: flex-start; background: white; color: var(--p-20); }
.slide-anna__bubble-out { background: var(--s-10); color: white; padding: 10px 14px; border-radius: 18px 18px 4px 18px; font-size: 13px; align-self: flex-end; max-width: 50%; box-shadow: 0 16px 40px rgba(0,0,0,0.25); transform: rotate(1deg); }
.slide-anna__typing { background: white; padding: 12px 14px; border-radius: 18px 18px 18px 4px; align-self: flex-start; display: flex; gap: 5px; box-shadow: 0 16px 40px rgba(0,0,0,0.25); transform: rotate(-1deg); }
.slide-anna__typing span { width: 7px; height: 7px; border-radius: 50%; background: var(--s-50); animation: gc-pulse 1.4s infinite; }
.slide-anna__typing span:nth-child(2) { animation-delay: 0.2s; }
.slide-anna__typing span:nth-child(3) { animation-delay: 0.4s; }

.slide-repair { width: 240px; padding: 22px; border-radius: 22px; background: white; box-shadow: 0 24px 60px rgba(0,0,0,0.35); transform: rotate(2deg); text-align: center; color: var(--p-20); }
.slide-repair__kicker { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; color: var(--t-30); letter-spacing: 0.08em; text-transform: uppercase; font-weight: 700; }
.slide-repair__amount { font-size: 40px; font-weight: 800; letter-spacing: -0.02em; color: var(--p-20); line-height: 1; margin: 6px 0 4px; }
.slide-repair__amount__pre { font-size: 22px; color: var(--n-50); vertical-align: 6px; }
.slide-repair__term { font-size: 11.5px; color: var(--n-50); margin-bottom: 14px; }
.slide-repair__bar { height: 7px; background: var(--p-95); border-radius: 999px; overflow: hidden; margin-bottom: 10px; }
.slide-repair__bar div { height: 100%; width: 100%; background: linear-gradient(90deg,var(--t-50),var(--t-60)); border-radius: 999px; }
.slide-repair__pill { display: inline-flex; align-items: center; gap: 6px; background: var(--t-90); color: var(--t-20); padding: 5px 13px; border-radius: 999px; font-size: 11px; font-weight: 700; }
.slide-repair__pill::before { content: ''; width: 7px; height: 7px; border-radius: 50%; background: var(--t-50); }

/* SEGMENTED */
.gc-segmented { display: inline-flex; background: var(--bg-surface); border: 1px solid var(--border); border-radius: 10px; padding: 3px; gap: 3px; align-self: flex-start; }
.gc-segmented button { padding: 8px 18px; border-radius: 7px; border: none; background: transparent; color: var(--text-secondary); font-family: inherit; font-size: 13px; font-weight: 500; cursor: pointer; }
.gc-segmented button.is-on { background: var(--accent-strong); color: var(--on-accent); font-weight: 600; }

/* FIELDS */
.gc-field { display: flex; flex-direction: column; gap: 6px; }
.gc-field__label { font-size: 12.5px; font-weight: 600; color: var(--text-secondary); letter-spacing: 0.02em; }
.gc-input { padding: 13px 16px; background: var(--bg-base); border: 1px solid var(--border); border-radius: 12px; font-family: inherit; font-size: 15px; color: var(--text-primary); width: 100%; }
.gc-input:focus { outline: none; border-color: var(--accent-strong); }
.gc-hint { font-size: 12px; color: var(--text-secondary); line-height: 1.4; }

/* BUTTONS */
.gc-btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 12px 22px; border-radius: 12px; font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer; border: 1px solid transparent; transition: transform 120ms ease, background-color 160ms ease; }
.gc-btn:active { transform: scale(0.98); }
.gc-btn--primary { background: var(--accent-strong); color: var(--on-accent); }
.gc-btn--primary:hover { background: var(--s-40); }
[data-theme="light"] .gc-btn--primary:hover { background: var(--s-30); }
.gc-btn--ghost { background: transparent; color: var(--text-primary); border-color: var(--border); }
.gc-btn--ghost:hover { background: rgba(127,127,127,0.06); border-color: rgba(127,127,127,0.18); }
.gc-btn--lg { padding: 14px 28px; font-size: 15px; border-radius: 14px; }
.gc-btn--full { width: 100%; }
.gc-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* CHECK */
.auth-check { display: flex; gap: 9px; align-items: flex-start; font-size: 13px; color: var(--text-secondary); line-height: 1.45; cursor: pointer; }
.gc-checkbox { width: 18px; height: 18px; border-radius: 5px; border: 1.5px solid currentColor; flex-shrink: 0; margin-top: 1px; display: inline-flex; align-items: center; justify-content: center; }
.gc-checkbox--on { background: var(--accent-strong); border-color: var(--accent-strong); color: white; }
.gc-checkbox--on::after { content: '✓'; font-size: 12px; font-weight: 700; color: white; }
.auth-check a { color: var(--accent); text-decoration: none; }

/* CENTERED CARD (AU3-AU6) */
.auth-center { flex: 1; display: flex; align-items: center; justify-content: center; padding: 56px 32px; }
.auth-card { width: 100%; max-width: 440px; background: var(--bg-surface); border: 1px solid var(--border); border-radius: 18px; padding: 36px 36px 32px; display: flex; flex-direction: column; gap: 18px; box-shadow: 0 8px 32px -16px rgba(0,0,0,0.25); }
.auth-card__back { background: transparent; border: none; color: var(--text-secondary); cursor: pointer; padding: 0; font-family: 'JetBrains Mono', monospace; font-size: 11px; display: inline-flex; align-items: center; gap: 4px; align-self: flex-start; letter-spacing: 0.04em; }
.auth-card__back:hover { color: var(--accent); }
.auth-card__back svg { width: 12px; height: 12px; }
.auth-card__heading { font-size: 26px; font-weight: 800; letter-spacing: -0.02em; line-height: 1.15; margin: 0; }
.auth-card__sub { font-size: 14px; color: var(--text-secondary); margin: 0; line-height: 1.55; }
.auth-card__sub strong { color: var(--text-primary); }

/* OTP */
.auth-otp { display: flex; gap: 8px; }
.auth-otp input { flex: 1; max-width: 56px; height: 60px; text-align: center; padding: 0; background: var(--bg-base); border: 1px solid var(--border); border-radius: 12px; font-family: 'JetBrains Mono', monospace; font-size: 22px; font-weight: 700; color: var(--text-primary); }
.auth-otp input:focus { outline: none; border-color: var(--accent-strong); }

/* AU4 ENVELOPE */
.auth-envelope { width: 84px; height: 84px; border-radius: 24px; background: var(--bg-base); display: inline-flex; align-items: center; justify-content: center; align-self: center; color: var(--accent); border: 1px solid var(--border); }
.auth-envelope svg { width: 36px; height: 36px; }
.auth-waiting { display: inline-flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-secondary); align-self: center; }
.auth-waiting__dot { width: 9px; height: 9px; border-radius: 50%; background: var(--accent); animation: gc-pulse 1.4s ease-in-out infinite; }

/* AU5 RECOVERY */
.recover-option { background: var(--bg-base); border: 1px solid var(--border); border-radius: 12px; padding: 14px 18px; text-align: left; display: flex; flex-direction: column; gap: 3px; cursor: pointer; font-family: inherit; color: inherit; transition: background 140ms ease; }
.recover-option:hover { background: rgba(127,127,127,0.04); border-color: var(--accent); }
.recover-option strong { font-weight: 600; font-size: 14.5px; color: var(--text-primary); }
.recover-option span { font-size: 12.5px; color: var(--text-secondary); }
.crisis-card { padding: 14px 18px; border-radius: 12px; background: var(--e-30); color: var(--e-90); font-size: 13px; line-height: 1.5; }
[data-theme="light"] .crisis-card { background: var(--e-90); color: var(--e-30); }
.crisis-card strong { display: block; margin-bottom: 2px; font-size: 14px; }

/* PASSCODE (AU6) */
.auth-passcode { display: flex; gap: 12px; justify-content: center; }
.auth-passcode input { width: 60px; height: 68px; text-align: center; background: var(--bg-base); border: 1px solid var(--border); border-radius: 14px; font-size: 28px; font-weight: 700; color: var(--text-primary); padding: 0; }
.auth-passcode input.is-filled { background: var(--bg-surface); }
.auth-progress { height: 4px; background: var(--bg-surface-2); border-radius: 4px; overflow: hidden; }
.auth-progress div { height: 100%; background: linear-gradient(90deg, var(--s-50), var(--t-50)); border-radius: 4px; }

/* CONTEXT */
.proto-context { width: 100%; max-width: 1280px; padding: 16px 20px; background: var(--page-card-bg); border: 1px solid var(--page-divider); border-radius: 12px; font-size: 13px; color: var(--page-fg-muted); line-height: 1.55; }
.proto-context strong { color: var(--page-fg); }
.proto-context a { color: var(--page-accent, var(--s-70)); text-decoration: none; border-bottom: 1px dotted currentColor; }
.proto-context__head { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 700; color: var(--page-fg); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; }

.screen { animation: fade-in 220ms ease; }
@keyframes fade-in { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
</style>
<script src="flow-chain.js" defer></script>
</head>
<body>

<div class="proto-shell">

  <aside class="proto-sidebar">
    <div class="proto-sidebar__brand">
      <span class="proto-sidebar__mark"><img src="../assets/gc-mark-mono-light.svg" alt=""></span>
      <span>
        <div class="proto-sidebar__name">GaimControl</div>
        <span class="proto-sidebar__pill">web</span>
      </span>
    </div>
    <a class="proto-sidebar__back" href="index.html">← prototype index</a>

    <button class="proto-theme-toggle" type="button" aria-label="Toggle theme">
      <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
      <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
      <span class="theme-label">Dark</span>
    </button>

    <div class="proto-section-title">§04 · AU1 – AU6</div>
    <nav class="proto-scrubber" id="scrubber"></nav>

    <div class="proto-sidebar__footer">
      Source: <a href="../web-ui/04-auth.html">web-ui/04</a>
    </div>
  </aside>

  <main class="proto-stage">

    <div class="proto-modebar">
      <span>Screen <span class="proto-modebar__id" id="screenId">AU1</span></span>
      <span class="proto-modebar__pill" id="screenName">Sign in</span>
      <div class="proto-modebar__bar"><div class="proto-modebar__bar__fill" id="progressFill" style="width:17%"></div></div>
      <div class="proto-arrows">
        <button class="proto-arrow" id="navPrev" aria-label="Previous"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></button>
        <button class="proto-arrow" id="navNext" aria-label="Next"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg></button>
      </div>
    </div>

    <div class="browser">
      <div class="browser__chrome">
        <span class="browser__dots"><span class="browser__dot"></span><span class="browser__dot"></span><span class="browser__dot"></span></span>
        <span class="browser__url">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <span id="browserUrl">app.gaimcontrol.com/auth/sign-in</span>
        </span>
      </div>
      <div class="browser__viewport" id="viewport"></div>
    </div>

    <div class="proto-context" id="contextPanel">
      <div class="proto-context__head">Screen context</div>
      <div id="contextBody"></div>
    </div>

  </main>
</div>

<script>
const SCREENS = [
  { id: 'AU1', name: 'Sign in', kind: 'au1', url: '/auth/sign-in' },
  { id: 'AU2', name: 'Sign up', kind: 'au2', url: '/auth/sign-up' },
  { id: 'AU3', name: 'Verify code', kind: 'au3', url: '/auth/verify' },
  { id: 'AU4', name: 'Magic link sent', kind: 'au4', url: '/auth/magic-link' },
  { id: 'AU5', name: 'Recovery', kind: 'au5', url: '/auth/recover' },
  { id: 'AU6', name: 'Set passcode', kind: 'au6', url: '/auth/passcode' },
];

const CTX = {
  au1: '<strong>AU1 Sign in.</strong> Returning user. Email-only entry (no enumeration — we don\'t reveal whether the email is on file). 2-col split: form left, auto-rotating 5-slide product story right. <a href="../web-ui/04-auth.html">web-ui/04</a>.',
  au2: '<strong>AU2 Sign up.</strong> New user. Adds invite-code field (gated during Sandbox Phase 1–4, removed at general availability). T&amp;C + Privacy checkbox required.',
  au3: '<strong>AU3 Verify code.</strong> 6-digit OTP, expires in 10 min. Alternate paths: magic link → AU4, recovery → AU5.',
  au4: '<strong>AU4 Magic link sent.</strong> Email link completes server-side and redirects back to /auth/passcode (AU6).',
  au5: '<strong>AU5 Recovery.</strong> The "can\'t access this" off-ramp. Only screen with the Crisis pill visible (Samaritans card).',
  au6: '<strong>AU6 Set passcode.</strong> Optional passcode for fast re-entry on shared / public devices. Mobile only needs this; web users may skip.',
};

const CAROUSEL_SLIDES = [
  {
    kind: 'brand',
    heading: 'Banking, but for staying clean',
    sub: 'A bank account designed for people in recovery from gambling.',
    visual: `
      <div class="slide-brand">
        <div class="slide-brand__mark"><img src="../assets/gc-mark-mono-light.svg" alt=""></div>
        <span class="slide-brand__pill">GaimControl · Sandbox Q2 2026</span>
      </div>`
  },
  {
    kind: 'diagnose',
    heading: 'We notice the patterns',
    sub: "Connect your bank and we'll spot the slips before they become spirals.",
    visual: `
      <div class="slide-diagnose">
        <div class="slide-diagnose__chart">
          <span class="slide-diagnose__chart-label">Spend · last 30d</span>
          <svg width="100%" height="56" viewBox="0 0 220 56" preserveAspectRatio="none" style="margin-top:8px">
            <path d="M0 46 Q 30 40 50 32 T 110 18 T 160 10 T 220 14" fill="none" stroke="var(--s-50)" stroke-width="2.5" stroke-linecap="round"/>
            <circle cx="160" cy="10" r="6" fill="var(--e-50)"/>
            <circle cx="110" cy="18" r="4" fill="var(--w-80)"/>
          </svg>
        </div>
        <div class="slide-diagnose__alert">
          <span class="slide-diagnose__alert-icon"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/></svg></span>
          <div>
            <div class="slide-diagnose__alert-title">Sky Bet · 22:14</div>
            <div class="slide-diagnose__alert-sub">Pattern flagged</div>
          </div>
        </div>
      </div>`
  },
  {
    kind: 'control',
    heading: 'We block where it goes wrong',
    sub: 'Your card refuses gambling sites at the merchant-code level.',
    visual: `
      <div class="slide-control__card">
        <img src="../assets/gc-mark-mono-light.svg" alt="">
        <div class="slide-control__num">•••• 1234</div>
        <div class="slide-control__meta"><span>05/29</span><span>SAM K</span></div>
        <span class="slide-control__lock"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="14" height="10" x="5" y="11" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg></span>
        <span class="slide-control__badge">Sky Bet · Blocked</span>
      </div>`
  },
  {
    kind: 'anna',
    heading: "Anna's there when it's hard",
    sub: 'CBT-based AI coach. Open chat at 11pm before payday — that\'s what she\'s for.',
    visual: `
      <div class="slide-anna">
        <div class="slide-anna__bubble-in">Hey, today's session is on goals. Slow with me?</div>
        <div class="slide-anna__bubble-out">ok</div>
        <div class="slide-anna__typing"><span></span><span></span><span></span></div>
      </div>`
  },
  {
    kind: 'repair',
    heading: "When you're ready, we help with the debt",
    sub: '30 days clean unlocks consolidation. Relapse Hold pauses interest if you slip.',
    visual: `
      <div class="slide-repair">
        <span class="slide-repair__kicker">Loan offer</span>
        <div class="slide-repair__amount"><span class="slide-repair__amount__pre">£</span>12,450</div>
        <div class="slide-repair__term">36 months · paid direct</div>
        <div class="slide-repair__bar"><div></div></div>
        <span class="slide-repair__pill">Eligible</span>
      </div>`
  },
];

function carousel() {
  let html = '<div class="carousel" id="carousel">';
  CAROUSEL_SLIDES.forEach((s, i) => {
    html += `<div class="carousel__slide${i === 0 ? ' is-on' : ''}" data-slide="${i}">
      <div class="carousel__visual">${s.visual}</div>
      <h3 class="carousel__heading">${s.heading}</h3>
      <p class="carousel__sub">${s.sub}</p>
    </div>`;
  });
  html += '<div class="carousel__dots">';
  CAROUSEL_SLIDES.forEach((_, i) => {
    html += `<span class="carousel__dot${i === 0 ? ' is-on' : ''}" data-dot="${i}" onclick="setSlide(${i})"></span>`;
  });
  html += '</div>';
  html += '</div>';
  return html;
}

let slideIdx = 0;
let slideTimer = null;
function setSlide(i) {
  slideIdx = i;
  document.querySelectorAll('.carousel__slide').forEach((el, idx) => el.classList.toggle('is-on', idx === i));
  document.querySelectorAll('.carousel__dot').forEach((el, idx) => el.classList.toggle('is-on', idx === i));
}
function startCarousel() {
  stopCarousel();
  slideTimer = setInterval(() => {
    slideIdx = (slideIdx + 1) % CAROUSEL_SLIDES.length;
    setSlide(slideIdx);
  }, 4500);
}
function stopCarousel() { if (slideTimer) { clearInterval(slideTimer); slideTimer = null; } }

function stageShell(inner, opts = {}) {
  return `
    <div class="auth-stage screen">
      <div class="auth-stage__top">
        <span class="auth-stage__brand"><img src="../assets/gc-mark-mono-light.svg" alt=""> GaimControl</span>
        <div class="auth-stage__top-right">
          ${opts.crisis ? '<button class="gc-crisis-pill" type="button"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21s-7-4.5-9-9.5C2 7 5 4 8 4c1.7 0 3.2.8 4 2 .8-1.2 2.3-2 4-2 3 0 6 3 5 7.5C19 16.5 12 21 12 21z"/></svg> Help</button>' : ''}
          ${opts.skip ? `<a onclick="next()">${opts.skip}</a>` : ''}
        </div>
      </div>
      <div class="auth-stage__body">${inner}</div>
      <div class="auth-stage__footer"><a href="#">Terms</a><a href="#">Privacy</a><a href="#">Help</a></div>
    </div>`;
}

const builders = {
  au1: () => stageShell(`
    <div class="auth-split">
      <div class="auth-split__form">
        <div class="auth-form-card">
          <h3 class="auth-form-card__heading">Welcome back</h3>
          <p class="auth-form-card__sub">Sign in with email or phone. We'll send a 6-digit code.</p>
          <div class="gc-segmented"><button class="is-on">Email</button><button>Phone</button></div>
          <div class="gc-field">
            <label class="gc-field__label">Email address</label>
            <input class="gc-input" type="email" value="sam@example.com">
          </div>
          <button class="gc-btn gc-btn--primary gc-btn--lg gc-btn--full" onclick="next()">Continue</button>
          <div class="auth-form-card__alt">Don't have an account? <a onclick="go(1)">Sign up</a></div>
        </div>
      </div>
      <div class="auth-split__illust">${carousel()}</div>
    </div>`),

  au2: () => stageShell(`
    <div class="auth-split">
      <div class="auth-split__form">
        <div class="auth-form-card">
          <h3 class="auth-form-card__heading">Let's begin</h3>
          <p class="auth-form-card__sub">During the FCA Sandbox you'll need an invite code from us.</p>
          <div class="gc-segmented"><button class="is-on">Email</button><button>Phone</button></div>
          <div class="gc-field">
            <label class="gc-field__label">Email address</label>
            <input class="gc-input" type="email" placeholder="you@example.com">
          </div>
          <div class="gc-field">
            <label class="gc-field__label">Invite code</label>
            <input class="gc-input" type="text" placeholder="GAIMCONTROL-xxxx" style="font-family:'JetBrains Mono',monospace">
          </div>
          <label class="auth-check">
            <span class="gc-checkbox gc-checkbox--on"></span>
            <span>I agree to <a href="#">Terms</a>, <a href="#">Privacy</a>, and to GC reading my banking transactions.</span>
          </label>
          <button class="gc-btn gc-btn--primary gc-btn--lg gc-btn--full" onclick="go(2)">Continue</button>
          <div class="auth-form-card__alt">Already have an account? <a onclick="go(0)">Sign in</a></div>
        </div>
      </div>
      <div class="auth-split__illust">${carousel()}</div>
    </div>`),

  au3: () => stageShell(`
    <div class="auth-center">
      <div class="auth-card">
        <button class="auth-card__back" onclick="prev()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg> Back</button>
        <h3 class="auth-card__heading">Check your email</h3>
        <p class="auth-card__sub">Enter the 6-digit code sent to <strong>sam@example.com</strong>. Expires in 10 min.</p>
        <div class="gc-field">
          <label class="gc-field__label">Code</label>
          <div class="auth-otp">
            <input maxlength="1" value="4"><input maxlength="1" value="2"><input maxlength="1" value="9"><input maxlength="1"><input maxlength="1"><input maxlength="1">
          </div>
          <span class="gc-hint">Auto-submits when you fill the last box.</span>
        </div>
        <button class="gc-btn gc-btn--primary gc-btn--lg gc-btn--full" onclick="go(5)">Verify code</button>
        <div style="display:flex;flex-direction:column;gap:8px;align-items:center;padding-top:4px">
          <a onclick="go(3)" style="font-size:13px;color:var(--accent);font-weight:500;cursor:pointer;text-decoration:none">Send a magic link instead</a>
          <span style="font-size:12px;color:var(--text-muted)">Resend code in 24s</span>
          <a onclick="go(4)" style="font-size:12px;color:var(--text-secondary);cursor:pointer;text-decoration:none">I can't access this email</a>
        </div>
      </div>
    </div>`),

  au4: () => stageShell(`
    <div class="auth-center">
      <div class="auth-card" style="text-align:center;align-items:center">
        <button class="auth-card__back" onclick="prev()" style="align-self:flex-start"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg> Back</button>
        <span class="auth-envelope">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
        </span>
        <h3 class="auth-card__heading" style="text-align:center">Check your email</h3>
        <p class="auth-card__sub" style="text-align:center">We sent a sign-in link to <strong>sam@example.com</strong>. Click it — we'll bring you back here.</p>
        <div class="auth-waiting">
          <span class="auth-waiting__dot"></span>
          Waiting for you to click…
        </div>
        <button class="gc-btn gc-btn--primary gc-btn--lg gc-btn--full" onclick="go(5)">Simulate link click (sim)</button>
        <div style="display:flex;flex-direction:column;gap:6px;align-items:center;padding-top:4px">
          <a onclick="go(2)" style="font-size:13px;color:var(--accent);font-weight:500;cursor:pointer;text-decoration:none">Send a code instead</a>
          <span style="font-size:12px;color:var(--text-muted)">Resend link</span>
        </div>
      </div>
    </div>`),

  au5: () => stageShell(`
    <div class="auth-center">
      <div class="auth-card">
        <button class="auth-card__back" onclick="prev()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg> Back</button>
        <h3 class="auth-card__heading">Can't get in?</h3>
        <p class="auth-card__sub">No problem. Pick one — we'll get you back in.</p>
        <button class="recover-option" onclick="go(2)">
          <strong>Try my phone instead</strong>
          <span>SMS to ····· 1234</span>
        </button>
        <button class="recover-option">
          <strong>Contact our team</strong>
          <span>Reply within 1 working day</span>
        </button>
        <div class="crisis-card">
          <strong>Need to talk to someone now?</strong>
          Samaritans free on <strong>116 123</strong>, 24/7.
        </div>
      </div>
    </div>`, { crisis: true }),

  au6: () => stageShell(`
    <div class="auth-center">
      <div class="auth-card">
        <div class="auth-progress" style="margin-bottom:4px"><div style="width:50%"></div></div>
        <h3 class="auth-card__heading">Create a passcode</h3>
        <p class="auth-card__sub">Optional. Quick re-entry on this device. We'll still ask for an OTP every 30 days, or on a new device.</p>
        <div class="gc-field">
          <label class="gc-field__label" style="text-align:center">4-digit passcode</label>
          <div class="auth-passcode">
            <input maxlength="1" type="password" inputmode="numeric" value="•" class="is-filled">
            <input maxlength="1" type="password" inputmode="numeric" value="•" class="is-filled">
            <input maxlength="1" type="password" inputmode="numeric">
            <input maxlength="1" type="password" inputmode="numeric">
          </div>
          <span class="gc-hint" style="text-align:center">Avoid 1234 or your year of birth.</span>
        </div>
        <button class="gc-btn gc-btn--primary gc-btn--lg gc-btn--full" onclick="restart()">Continue</button>
        <div style="text-align:center;padding-top:4px">
          <a onclick="restart()" style="font-size:13px;color:var(--text-secondary);cursor:pointer;text-decoration:none">Skip for now</a>
        </div>
      </div>
    </div>`, { skip: 'Skip' }),
};

let idx = 0;

function render() {
  stopCarousel();
  const screen = SCREENS[idx];
  document.getElementById('viewport').innerHTML = builders[screen.kind]();
  document.getElementById('browserUrl').textContent = 'app.gaimcontrol.com' + screen.url;
  document.getElementById('screenId').textContent = screen.id;
  document.getElementById('screenName').textContent = screen.name;
  document.getElementById('progressFill').style.width = ((idx + 1) / SCREENS.length * 100) + '%';
  document.getElementById('navPrev').disabled = idx === 0;
  document.getElementById('navNext').disabled = idx === SCREENS.length - 1;
  document.querySelectorAll('.proto-scrubber__item').forEach((el, i) => {
    el.classList.toggle('is-active', i === idx);
    if (i === idx) el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  });
  document.getElementById('contextBody').innerHTML = CTX[screen.kind] || `<strong>${screen.id}</strong> ${screen.name}`;
  // Restart carousel if it's a split screen
  if (screen.kind === 'au1' || screen.kind === 'au2') { slideIdx = 0; startCarousel(); }
}

function next() { if (idx < SCREENS.length - 1) { idx++; render(); } }
function prev() { if (idx > 0) { idx--; render(); } }
function go(i) { idx = i; render(); }
function restart() { idx = 0; render(); }

function buildScrubber() {
  const nav = document.getElementById('scrubber');
  SCREENS.forEach((s, i) => {
    const btn = document.createElement('button');
    btn.className = 'proto-scrubber__item';
    btn.innerHTML = `<span class="proto-scrubber__id">${s.id}</span><span class="proto-scrubber__name">${s.name}</span>`;
    btn.addEventListener('click', () => go(i));
    nav.appendChild(btn);
  });
}

function initTheme() {
  const root = document.documentElement;
  const stored = localStorage.getItem('gc-proto-theme');
  const initial = stored || 'dark';
  root.setAttribute('data-theme', initial);
  document.querySelector('.theme-label').textContent = initial === 'dark' ? 'Dark' : 'Light';
  document.querySelector('.proto-theme-toggle').addEventListener('click', () => {
    const next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    root.setAttribute('data-theme', next);
    document.querySelector('.theme-label').textContent = next === 'dark' ? 'Dark' : 'Light';
    try { localStorage.setItem('gc-proto-theme', next); } catch(e) {}
  });
}

document.getElementById('navPrev').addEventListener('click', prev);
document.getElementById('navNext').addEventListener('click', next);
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight') next();
  if (e.key === 'ArrowLeft') prev();
});

buildScrubber();
initTheme();
render();
</script>

</body>
</html>
