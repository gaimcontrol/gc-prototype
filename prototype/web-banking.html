<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Holdwell · Web · §06 Banking</title>
<link rel="icon" href="../assets/gc-favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
 --p-10:#0B0F1C;--p-20:#161B2D;--p-30:#20273C;--p-40:#354872;--p-50:#4D608C;--p-60:#6B7DA6;--p-70:#8E9DC0;--p-90:#DCE2F0;--p-95:#ECF0F9;--p-99:#FAFBFE;--p-100:#FFF;
 --s-10:#28215A;--s-20:#3E3478;--s-30:#534792;--s-40:#6B5DAC;--s-50:#8576C2;--s-70:#B5ACDF;--s-80:#CFC8EA;--s-90:#E8E4F4;
 --t-20:#1A6047;--t-30:#1F7058;--t-50:#399971;--t-60:#5BB088;--t-80:#ADDCC2;--t-90:#D5EDDF;
 --w-30:#6B4500;--w-60:#C28200;--w-80:#FAB44A;--w-90:#FFDFA8;
 --e-30:#7A1F1F;--e-50:#C73838;--e-80:#F4A4A4;--e-90:#FBD9D9;
 --n-30:#43475A;--n-50:#76798A;--n-60:#9094A3;--n-80:#C5C8D2;--n-95:#F1F2F5;--nv-80:#C5C9DD;
}
[data-theme="dark"] { --bg-base: var(--p-30); --bg-surface: var(--p-20); --bg-surface-2: var(--p-10); --border: rgba(255,255,255,0.08); --text-primary: var(--n-95); --text-secondary: var(--nv-80); --text-muted: rgba(255,255,255,0.4); --accent: var(--s-70); --accent-strong: var(--s-50); --on-accent: #fff; --page-bg: #0a0e1a; --page-fg: var(--n-95); --page-fg-muted: var(--nv-80); --page-card-bg: var(--p-20); --page-divider: rgba(255,255,255,0.06); }
[data-theme="light"] { --bg-base: var(--p-99); --bg-surface: #fff; --bg-surface-2: var(--p-95); --border: rgba(22,27,45,0.08); --text-primary: var(--p-20); --text-secondary: var(--n-50); --text-muted: var(--n-50); --accent: var(--p-40); --accent-strong: var(--s-40); --on-accent: #fff; --page-bg: var(--p-95); --page-fg: var(--p-20); --page-fg-muted: var(--n-50); --page-card-bg: #fff; --page-divider: rgba(22,27,45,0.08); }
* { box-sizing: border-box; }
html, body { background: var(--page-bg); color: var(--page-fg); margin: 0; transition: background-color 220ms ease, color 220ms ease; }
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; min-height: 100vh; }

/* SHELL */
.proto-shell { display: grid; grid-template-columns: 280px 1fr; gap: 0; min-height: 100vh; }
@media (max-width: 1100px) {.proto-shell { grid-template-columns: 1fr; } }
.proto-sidebar { background: var(--page-card-bg); border-right: 1px solid var(--page-divider); padding: 28px 22px; position: sticky; top: 0; height: 100vh; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }
@media (max-width: 1100px) {.proto-sidebar { position: static; height: auto; max-height: 50vh; border-right: none; border-bottom: 1px solid var(--page-divider); } }
.proto-sidebar__brand { display: flex; align-items: center; gap: 10px; }
.proto-sidebar__mark { width: 36px; height: 36px; border-radius: 10px; background: var(--p-30); display: inline-flex; align-items: center; justify-content: center; }
.proto-sidebar__mark img { width: 70%; height: 70%; }
.proto-sidebar__name { font-weight: 700; font-size: 17px; letter-spacing: -0.01em; }
.proto-sidebar__pill { display: inline-flex; padding: 3px 9px; border-radius: 999px; background: linear-gradient(120deg, var(--s-50), var(--p-50), var(--t-50)); color: white; font-weight: 700; font-size: 9.5px; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.06em; text-transform: uppercase; }
.proto-sidebar__back { display: inline-flex; align-items: center; gap: 6px; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--page-fg-muted); text-decoration: none; }
.proto-sidebar__back:hover { color: var(--page-accent); }
.proto-section-title { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--page-fg-muted); margin: 12px 0 6px; }
.proto-scrubber { display: flex; flex-direction: column; gap: 2px; }
.proto-scrubber__item { display: grid; grid-template-columns: 44px 1fr; gap: 8px; align-items: center; padding: 7px 10px; border-radius: 8px; cursor: pointer; border: none; background: transparent; color: inherit; font-family: inherit; text-align: left; }
.proto-scrubber__item:hover { background: rgba(127,127,127,0.08); }
.proto-scrubber__item.is-active { background: var(--accent-strong); color: var(--on-accent); }
.proto-scrubber__item.is-active.proto-scrubber__id { color: rgba(255,255,255,0.85); }
.proto-scrubber__id { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 600; color: var(--page-fg-muted); letter-spacing: 0.06em; }
.proto-scrubber__name { font-size: 12.5px; font-weight: 500; }
.proto-sidebar__footer { margin-top: auto; padding-top: 16px; border-top: 1px solid var(--page-divider); font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--page-fg-muted); }
.proto-sidebar__footer a { color: var(--page-fg-muted); text-decoration: none; border-bottom: 1px dotted currentColor; }
.proto-theme-toggle { display: inline-flex; align-items: center; gap: 8px; padding: 7px 12px; border-radius: 8px; background: var(--bg-surface-2); border: 1px solid var(--border); color: var(--page-fg-muted); cursor: pointer; font-family: 'JetBrains Mono', monospace; font-size: 11px; align-self: flex-start; }
.proto-theme-toggle svg { width: 12px; height: 12px; }
[data-theme="dark"].proto-theme-toggle.icon-moon { display: none; }
[data-theme="light"].proto-theme-toggle.icon-sun { display: none; }

/* STAGE */
.proto-stage { display: flex; flex-direction: column; align-items: center; padding: 32px 24px 64px; gap: 18px; }
.proto-modebar { display: flex; align-items: center; gap: 10px; padding: 10px 16px; background: var(--page-card-bg); border: 1px solid var(--page-divider); border-radius: 12px; font-family: 'JetBrains Mono', monospace; font-size: 11.5px; color: var(--page-fg-muted); flex-wrap: wrap; justify-content: center; }
.proto-modebar__pill { display: inline-flex; padding: 3px 9px; border-radius: 999px; background: var(--bg-surface-2); }
.proto-modebar__id { color: var(--page-fg); font-weight: 700; letter-spacing: 0.06em; }
.proto-modebar__bar { width: 100px; height: 4px; border-radius: 4px; background: var(--bg-surface-2); position: relative; overflow: hidden; }
.proto-modebar__bar__fill { position: absolute; left: 0; top: 0; bottom: 0; background: linear-gradient(90deg, var(--s-50), var(--t-50)); transition: width 240ms ease; }
.proto-arrows { display: flex; align-items: center; gap: 8px; }
.proto-arrow { width: 36px; height: 36px; border-radius: 10px; background: var(--page-card-bg); border: 1px solid var(--page-divider); color: var(--page-fg-muted); display: inline-flex; align-items: center; justify-content: center; cursor: pointer; }
.proto-arrow:hover { background: var(--bg-surface-2); color: var(--page-fg); }
.proto-arrow:disabled { opacity: 0.3; cursor: not-allowed; }
.proto-arrow svg { width: 18px; height: 18px; }

/* BROWSER */
.browser { width: 100%; max-width: 1380px; background: var(--bg-base); border-radius: 18px; overflow: hidden; border: 1px solid var(--border); box-shadow: 0 24px 60px -20px rgba(0,0,0,0.45), 0 8px 24px -12px rgba(0,0,0,0.25); }
[data-theme="light"].browser { box-shadow: 0 24px 60px -20px rgba(22,27,45,0.18), 0 8px 24px -12px rgba(22,27,45,0.08); }
.browser__chrome { display: flex; align-items: center; gap: 14px; padding: 12px 16px; background: var(--p-20); border-bottom: 1px solid var(--border); }
[data-theme="light"].browser__chrome { background: var(--n-95); }
.browser__dots { display: inline-flex; gap: 7px; flex-shrink: 0; }
.browser__dot { width: 11px; height: 11px; border-radius: 50%; }
.browser__dot:nth-child(1) { background: #FF5F57; }.browser__dot:nth-child(2) { background: #FEBC2E; }.browser__dot:nth-child(3) { background: #28C840; }
.browser__url { flex: 1; background: var(--bg-base); border: 1px solid var(--border); border-radius: 7px; padding: 6px 14px; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-secondary); text-align: center; display: flex; align-items: center; justify-content: center; gap: 8px; }
.browser__url svg { width: 12px; height: 12px; opacity: 0.7; flex-shrink: 0; }
.browser__viewport { background: var(--bg-base); min-height: 800px; position: relative; color: var(--text-primary); display: grid; grid-template-columns: 240px 1fr; }

/* App sidenav */
.appnav { background: var(--bg-surface); border-right: 1px solid var(--border); padding: 20px 16px; display: flex; flex-direction: column; gap: 16px; }
[data-theme="light"].appnav { background: var(--bg-surface-2); border-right: 1px solid rgba(22,27,45,0.12); }
[data-theme="light"].appnav__item { color: var(--p-40); }
[data-theme="light"].appnav__item:hover { color: var(--p-20); }
[data-theme="light"].appnav__subitem { color: var(--p-50); }
[data-theme="light"].appnav__subitem:hover { color: var(--p-20); }
[data-theme="light"].appnav__user-sub { color: var(--p-50); }
[data-theme="light"].appnav.appnav__help div:nth-of-type(2) { color: var(--p-50); }
.appnav__brand { display: flex; align-items: center; gap: 10px; padding: 4px 4px 12px; border-bottom: 1px solid var(--border); margin-bottom: 4px; }
.appnav__mark { width: 32px; height: 32px; border-radius: 9px; background: var(--p-30); display: inline-flex; align-items: center; justify-content: center; }
.appnav__mark img { width: 70%; height: 70%; }
.appnav__name { font-weight: 700; font-size: 15px; letter-spacing: -0.01em; }
.appnav__user { display: flex; align-items: center; gap: 10px; padding: 8px 8px; border-radius: 10px; background: var(--bg-base); }
.appnav__avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--accent-strong); color: white; display: inline-flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; }
.appnav__user-name { font-size: 13px; font-weight: 600; }
.appnav__user-sub { font-size: 11px; color: var(--text-secondary); }
.appnav__list { display: flex; flex-direction: column; gap: 2px; }
.appnav__item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 10px; cursor: pointer; color: var(--text-secondary); text-decoration: none; font-size: 13.5px; font-weight: 500; }
.appnav__item:hover { background: var(--bg-base); color: var(--text-primary); }
.appnav__item.is-on { background: var(--accent-strong); color: var(--on-accent); font-weight: 600; }
.appnav__item.is-disabled { opacity: 0.35; cursor: not-allowed; }
.appnav__item.is-disabled:hover { background: transparent; color: var(--text-secondary); }
.appnav__item svg { width: 18px; height: 18px; flex-shrink: 0; }
.appnav__subnav { padding: 4px 0 4px 28px; display: flex; flex-direction: column; gap: 1px; border-left: 1px solid var(--border); margin: 2px 0 2px 22px; }
.appnav__subitem { padding: 7px 12px; border-radius: 8px; font-size: 12.5px; font-weight: 500; color: var(--text-secondary); cursor: pointer; }
.appnav__subitem:hover { background: var(--bg-base); color: var(--text-primary); }
.appnav__subitem.is-on { background: var(--bg-base); color: var(--accent); font-weight: 600; }
.appnav__subitem.is-disabled { opacity: 0.35; cursor: not-allowed; }
.appnav__subitem.is-disabled:hover { background: transparent; color: var(--text-secondary); }
.appnav__help { margin-top: auto; padding: 14px 14px; border-radius: 12px; background: var(--bg-base); border: 1px solid var(--border); }
.gc-crisis-btn { width: 100%; padding: 9px 12px; border-radius: 10px; background: var(--e-50); color: white; border: none; font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 6px; margin-top: 8px; }
.gc-crisis-btn svg { width: 14px; height: 14px; }

/* Main content */
.main { padding: 32px 40px 56px; overflow-y: auto; max-height: 800px; }
.main::-webkit-scrollbar { width: 6px; }
.main::-webkit-scrollbar-thumb { background: rgba(127,127,127,0.2); border-radius: 6px; }
.main__head { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 24px; }
.main__title { font-size: 30px; font-weight: 800; letter-spacing: -0.02em; margin: 0; }
.main__sub { font-size: 13.5px; color: var(--text-secondary); margin: 4px 0 0; }
.main__head-actions { display: flex; gap: 10px; align-items: center; }

/* Card */
.gc-card { padding: 20px; background: var(--bg-surface); border: 1px solid var(--border); border-radius: 16px; display: flex; flex-direction: column; gap: 12px; }
.gc-card--anna { background: linear-gradient(135deg, rgba(133,118,194,0.12), rgba(83,71,146,0.06)); border-color: rgba(133,118,194,0.25); flex-direction: row; align-items: center; gap: 14px; padding: 16px 20px; }
.gc-card--anna.anna-av { width: 38px; height: 38px; border-radius: 50%; background: var(--p-30); display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
.gc-card--anna.anna-av img { width: 60%; height: 60%; }
.gc-card--anna.anna-name { font-size: 13px; font-weight: 700; letter-spacing: -0.01em; margin-bottom: 2px; }
.gc-card--anna p { font-size: 14px; line-height: 1.5; margin: 0; }
.gc-card--milestone { background: linear-gradient(135deg, var(--s-40), var(--p-40)); color: white; border-color: transparent; }
.gc-card--alert { background: var(--bg-surface-2); border-left: 4px solid var(--e-50); border-radius: 6px 16px 16px 6px; }

/* Grid layouts */
.row-2 { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; }
.row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
.stack { display: flex; flex-direction: column; gap: 16px; }
@media (max-width: 900px) {.row-2 { grid-template-columns: 1fr; }.row-3 { grid-template-columns: 1fr 1fr; } }

/* Balance card */
.bk-kicker { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); }
.bk-balance__head { display: flex; justify-content: space-between; align-items: center; }
.bk-mask { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-secondary); }
.bk-amount { font-size: 42px; font-weight: 800; letter-spacing: -0.025em; color: var(--text-primary); line-height: 1; }
.bk-amount span { font-size: 22px; color: var(--text-secondary); }
.bk-amount--masked { font-family: 'JetBrains Mono', monospace; letter-spacing: 0.08em; }
.bk-balance__delta { font-size: 13px; font-weight: 600; }
.bk-balance__delta--pos { color: var(--t-50); }
.bk-balance__delta--neg { color: var(--w-60); }
.bk-eye-btn { width: 32px; height: 32px; border-radius: 10px; background: var(--bg-base); border: 1px solid var(--border); display: inline-flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-secondary); padding: 0; }
.bk-eye-btn:hover { background: rgba(127,127,127,0.04); color: var(--text-primary); }
.bk-eye-btn svg { width: 15px; height: 15px; }
.bk-spark { width: 100%; height: 48px; }

/* Streak */
.bk-streak { display: grid; grid-template-columns: repeat(15, 1fr); gap: 5px; }
.bk-streak__day { width: 100%; aspect-ratio: 1; border-radius: 4px; background: var(--bg-surface-2); border: 1px solid var(--border); }
.bk-streak__day.is-clean { background: var(--t-50); border-color: transparent; }
.bk-streak__day.is-monitoring { background: var(--s-50); border-color: transparent; opacity: 0.85; }
.bk-streak__day.is-today { box-shadow: 0 0 0 2px var(--accent); }

/* Quick-link tile grid */
.bk-quick { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
.bk-quick__tile { display: flex; flex-direction: column; align-items: flex-start; gap: 6px; padding: 14px 14px; background: var(--bg-base); border: 1px solid var(--border); border-radius: 12px; cursor: pointer; font-family: inherit; color: var(--text-primary); text-align: left; }
.bk-quick__tile:hover { background: rgba(127,127,127,0.04); border-color: var(--accent); }
.bk-quick__ic { width: 32px; height: 32px; border-radius: 9px; display: inline-flex; align-items: center; justify-content: center; }
.bk-quick__l { font-size: 12.5px; font-weight: 600; }

/* Tx */
.bk-tx { display: grid; grid-template-columns: 40px 1fr auto; gap: 14px; align-items: center; padding: 14px 0; border-top: 1px solid var(--border); }
.bk-tx:first-child { border-top: none; padding-top: 0; }
.bk-tx__av { width: 40px; height: 40px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; flex-shrink: 0; }
.bk-tx__name { font-size: 14.5px; font-weight: 600; }
.bk-tx__sub { font-size: 12px; color: var(--text-secondary); margin-top: 2px; display: flex; align-items: center; gap: 6px; }
.bk-tx__mcc { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; padding: 2px 6px; border-radius: 4px; background: var(--bg-surface-2); color: var(--text-muted); }
.bk-tx__amt { font-family: 'JetBrains Mono', monospace; font-size: 14.5px; font-weight: 700; text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: 3px; }
.bk-tx__amt--pos { color: var(--t-50); }
.bk-tx__flag { font-size: 9.5px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; padding: 2px 7px; border-radius: 999px; background: var(--e-30); color: var(--e-90); }
[data-theme="light"].bk-tx__flag { background: var(--e-90); color: var(--e-30); }
.bk-tx--blocked.bk-tx__amt { color: var(--text-muted); }
.bk-stream-day { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); padding: 12px 0 6px; border-top: 1px solid var(--border); margin-top: 4px; }
.bk-stream-day:first-child { border-top: none; margin-top: 0; padding-top: 4px; }

/* Search + filter */
.bk-search { display: flex; align-items: center; gap: 10px; padding: 10px 16px; background: var(--bg-base); border: 1px solid var(--border); border-radius: 999px; max-width: 360px; }
.bk-search svg { width: 14px; height: 14px; color: var(--text-secondary); flex-shrink: 0; }
.bk-search input { background: transparent; border: none; flex: 1; font-family: inherit; font-size: 13.5px; color: var(--text-primary); outline: none; }
.bk-filters { display: flex; gap: 8px; flex-wrap: wrap; }
.bk-filter { padding: 8px 14px; border-radius: 999px; background: var(--bg-base); border: 1px solid var(--border); font-family: inherit; font-size: 13px; font-weight: 500; color: var(--text-primary); cursor: pointer; }
.bk-filter.is-on { background: var(--accent-strong); color: var(--on-accent); border-color: transparent; font-weight: 600; }
.bk-filter--blocked.is-on { background: var(--e-50); }
.bk-filter span { font-family: 'JetBrains Mono', monospace; font-size: 11px; opacity: 0.7; margin-left: 5px; }

/* Linked accounts */
.bk-link { display: grid; grid-template-columns: 44px 1fr auto; gap: 14px; align-items: center; padding: 14px 0; border-top: 1px solid var(--border); }
.bk-link:first-child { border-top: none; padding-top: 0; }
.bk-link__logo { width: 44px; height: 44px; border-radius: 12px; background: linear-gradient(135deg, var(--p-30), var(--p-20)); color: white; display: inline-flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; flex-shrink: 0; }
.bk-link__main { min-width: 0; }
.bk-link__head { display: flex; gap: 9px; align-items: center; flex-wrap: wrap; }
.bk-link__name { font-size: 15px; font-weight: 600; }
.bk-link__mask { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-secondary); }
.bk-link__pills { display: flex; gap: 5px; margin-top: 4px; flex-wrap: wrap; }
.bk-link-pill { font-size: 10px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; padding: 2px 8px; border-radius: 999px; }
.bk-link-pill--primary { background: var(--p-40); color: white; }
.bk-link-pill--sponsor { background: var(--s-20); color: var(--s-80); }
[data-theme="light"].bk-link-pill--sponsor { background: var(--s-90); color: var(--s-20); }
.bk-link-pill--warn { background: var(--w-30); color: var(--w-80); }
[data-theme="light"].bk-link-pill--warn { background: var(--w-90); color: var(--w-30); }
.bk-link-pill--stale { background: var(--n-30); color: var(--n-80); display: inline-flex; align-items: center; gap: 3px; }
[data-theme="light"].bk-link-pill--stale { background: var(--n-95); color: var(--n-50); }
.bk-link-pill--stale::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: currentColor; animation: pulse 1.6s ease-in-out infinite; }
@keyframes pulse { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }
.bk-link__sub { font-size: 12px; color: var(--text-secondary); margin-top: 3px; }
.bk-link__balance { font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 700; text-align: right; }

/* Slip cards */
.bk-slip { display: flex; flex-direction: column; gap: 4px; padding: 14px 0; border-top: 1px solid var(--border); }
.bk-slip:first-child { border-top: none; padding-top: 0; }
.bk-slip__pill { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 999px; font-size: 10.5px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; align-self: flex-start; }

let idx = 0;

function render() {
 const screen = SCREENS[idx];
 document.getElementById('viewport').innerHTML = builders[screen.kind]();
 document.getElementById('browserUrl').textContent = 'app.gaimcontrol.com' + screen.url;
 document.getElementById('screenId').textContent = screen.id;
 document.getElementById('screenName').textContent = screen.name;
 document.getElementById('progressFill').style.width = ((idx + 1) / SCREENS.length * 100) + '%';
 document.getElementById('navPrev').disabled = idx === 0;
 document.getElementById('navNext').disabled = idx === SCREENS.length - 1;
 document.querySelectorAll('.proto-scrubber__item').forEach((el, i) => {
 el.classList.toggle('is-active', i === idx);
 if (i === idx) el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
 });
 document.getElementById('contextBody').innerHTML = CTX[screen.kind] || screen.name;
}

function next() { if (idx < SCREENS.length - 1) { idx++; render(); } }
function prev() { if (idx > 0) { idx--; render(); } }
function go(i) { idx = i; render(); }

function buildScrubber() {
 const nav = document.getElementById('scrubber');
 SCREENS.forEach((s, i) => {
 const btn = document.createElement('button');
 btn.className = 'proto-scrubber__item';
 btn.innerHTML = `<span class="proto-scrubber__id">${s.id}</span><span class="proto-scrubber__name">${s.name}</span>`;
 btn.addEventListener('click', () => go(i));
 nav.appendChild(btn);
 });
}

function initTheme() {
 const root = document.documentElement;
 const stored = localStorage.getItem('gc-proto-theme');
 const initial = stored || 'dark';
 root.setAttribute('data-theme', initial);
 document.querySelector('.theme-label').textContent = initial === 'dark' ? 'Dark' : 'Light';
 document.querySelector('.proto-theme-toggle').addEventListener('click', () => {
 const next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
 root.setAttribute('data-theme', next);
 document.querySelector('.theme-label').textContent = next === 'dark' ? 'Dark' : 'Light';
 try { localStorage.setItem('gc-proto-theme', next); } catch(e) {}
 });
}

document.getElementById('navPrev').addEventListener('click', prev);
document.getElementById('navNext').addEventListener('click', next);
document.addEventListener('keydown', (e) => {
 if (e.key === 'ArrowRight') next();
 if (e.key === 'ArrowLeft') prev();
});

buildScrubber();
initTheme();
render();
</script>
