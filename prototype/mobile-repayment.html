<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Holdwell · Mobile · §10 Repayment &amp; Relapse Hold</title>
<link rel="icon" href="../assets/gc-favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
 --p-10:#0B0F1C;--p-20:#161B2D;--p-30:#20273C;--p-40:#354872;--p-50:#4D608C;--p-60:#6B7DA6;--p-90:#DCE2F0;--p-95:#ECF0F9;--p-99:#FAFBFE;--p-100:#FFF;
 --s-10:#28215A;--s-20:#3E3478;--s-30:#534792;--s-40:#6B5DAC;--s-50:#8576C2;--s-70:#B5ACDF;--s-90:#E8E4F4;
 --t-20:#1A6047;--t-30:#1F7058;--t-50:#399971;--t-60:#5BB088;--t-80:#ADDCC2;--t-90:#D5EDDF;
 --w-30:#6B4500;--w-60:#C28200;--w-80:#FAB44A;--w-90:#FFDFA8;
 --e-30:#7A1F1F;--e-50:#C73838;--e-90:#FBD9D9;
 --n-50:#76798A;--n-80:#C5C8D2;--n-95:#F1F2F5;--nv-80:#C5C9DD;
}
[data-theme="dark"] { --bg-base: var(--p-30); --bg-surface: var(--p-20); --bg-surface-2: var(--p-10); --border: rgba(255,255,255,0.08); --text-primary: var(--n-95); --text-secondary: var(--nv-80); --text-muted: rgba(255,255,255,0.4); --accent: var(--s-70); --accent-strong: var(--s-50); --on-accent: #fff; --page-bg: #0a0e1a; --page-fg: var(--n-95); --page-fg-muted: var(--nv-80); --page-card-bg: var(--p-20); --page-divider: rgba(255,255,255,0.06); }
[data-theme="light"] { --bg-base: var(--p-99); --bg-surface: #fff; --bg-surface-2: var(--p-95); --border: rgba(22,27,45,0.08); --text-primary: var(--p-20); --text-secondary: var(--n-50); --text-muted: var(--n-50); --accent: var(--p-40); --accent-strong: var(--s-40); --on-accent: #fff; --page-bg: var(--p-95); --page-fg: var(--p-20); --page-fg-muted: var(--n-50); --page-card-bg: #fff; --page-divider: rgba(22,27,45,0.08); }
* { box-sizing: border-box; }
html, body { background: var(--page-bg); color: var(--page-fg); margin: 0; transition: background-color 220ms ease, color 220ms ease; }
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; min-height: 100vh; }

.proto-shell { display: grid; grid-template-columns: 280px 1fr; gap: 0; min-height: 100vh; }
@media (max-width: 960px) {.proto-shell { grid-template-columns: 1fr; } }
.proto-sidebar { background: var(--page-card-bg); border-right: 1px solid var(--page-divider); padding: 28px 22px; position: sticky; top: 0; height: 100vh; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }
@media (max-width: 960px) {.proto-sidebar { position: static; height: auto; max-height: 50vh; border-right: none; border-bottom: 1px solid var(--page-divider); } }
.proto-sidebar__brand { display: flex; align-items: center; gap: 10px; }
.proto-sidebar__mark { width: 36px; height: 36px; border-radius: 10px; background: var(--p-30); display: inline-flex; align-items: center; justify-content: center; }
.proto-sidebar__mark img { width: 70%; height: 70%; }
.proto-sidebar__name { font-weight: 700; font-size: 17px; letter-spacing: -0.01em; }
.proto-sidebar__pill { display: inline-flex; padding: 3px 9px; border-radius: 999px; background: linear-gradient(120deg, var(--s-50), var(--p-50), var(--t-50)); color: white; font-weight: 700; font-size: 9.5px; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.06em; text-transform: uppercase; }
.proto-sidebar__back { display: inline-flex; align-items: center; gap: 6px; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--page-fg-muted); text-decoration: none; }
.proto-sidebar__back:hover { color: var(--page-accent); }
.proto-section-title { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--page-fg-muted); margin: 12px 0 6px; }
.proto-scrubber { display: flex; flex-direction: column; gap: 2px; }
.proto-scrubber__item { display: grid; grid-template-columns: 44px 1fr; gap: 8px; align-items: center; padding: 7px 10px; border-radius: 8px; cursor: pointer; border: none; background: transparent; color: inherit; font-family: inherit; text-align: left; }
.proto-scrubber__item:hover { background: rgba(127,127,127,0.08); }
.proto-scrubber__item.is-active { background: var(--accent-strong); color: var(--on-accent); }
.proto-scrubber__item.is-active.proto-scrubber__id { color: rgba(255,255,255,0.85); }
.proto-scrubber__id { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 600; color: var(--page-fg-muted); letter-spacing: 0.06em; }
.proto-scrubber__name { font-size: 12.5px; font-weight: 500; }
.proto-sidebar__footer { margin-top: auto; padding-top: 16px; border-top: 1px solid var(--page-divider); font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--page-fg-muted); }
.proto-sidebar__footer a { color: var(--page-fg-muted); text-decoration: none; border-bottom: 1px dotted currentColor; }
.proto-theme-toggle { display: inline-flex; align-items: center; gap: 8px; padding: 7px 12px; border-radius: 8px; background: var(--bg-surface-2); border: 1px solid var(--border); color: var(--page-fg-muted); cursor: pointer; font-family: 'JetBrains Mono', monospace; font-size: 11px; align-self: flex-start; }
.proto-theme-toggle svg { width: 12px; height: 12px; }
[data-theme="dark"].proto-theme-toggle.icon-moon { display: none; }
[data-theme="light"].proto-theme-toggle.icon-sun { display: none; }

.proto-stage { display: flex; flex-direction: column; align-items: center; padding: 32px 24px 64px; gap: 22px; }
.proto-modebar { display: flex; align-items: center; gap: 10px; padding: 10px 16px; background: var(--page-card-bg); border: 1px solid var(--page-divider); border-radius: 12px; font-family: 'JetBrains Mono', monospace; font-size: 11.5px; color: var(--page-fg-muted); flex-wrap: wrap; justify-content: center; }
.proto-modebar__pill { display: inline-flex; padding: 3px 9px; border-radius: 999px; background: var(--bg-surface-2); }
.proto-modebar__id { color: var(--page-fg); font-weight: 700; letter-spacing: 0.06em; }
.proto-modebar__bar { width: 100px; height: 4px; border-radius: 4px; background: var(--bg-surface-2); position: relative; overflow: hidden; }
.proto-modebar__bar__fill { position: absolute; left: 0; top: 0; bottom: 0; background: linear-gradient(90deg, var(--s-50), var(--t-50)); transition: width 240ms ease; }
.proto-arrows { display: flex; align-items: center; gap: 8px; }
.proto-arrow { width: 36px; height: 36px; border-radius: 10px; background: var(--page-card-bg); border: 1px solid var(--page-divider); color: var(--page-fg-muted); display: inline-flex; align-items: center; justify-content: center; cursor: pointer; }
.proto-arrow:hover { background: var(--bg-surface-2); color: var(--page-fg); }
.proto-arrow:disabled { opacity: 0.3; cursor: not-allowed; }
.proto-arrow svg { width: 18px; height: 18px; }

.phone { width: 393px; height: 852px; flex-shrink: 0; border-radius: 56px; background: #000; padding: 13px; position: relative; box-shadow: 0 0 0 1.5px #2a2e3a, 0 30px 60px -20px rgba(0,0,0,0.7), 0 16px 32px -16px rgba(0,0,0,0.4); }
.phone::before,.phone::after { content: ''; position: absolute; background: #2a2e3a; }
.phone::before { left: -3px; top: 110px; width: 3px; height: 30px; border-radius: 3px 0 0 3px; }
.phone::after { left: -3px; top: 160px; width: 3px; height: 60px; border-radius: 3px 0 0 3px; }
.phone__inner { width: 100%; height: 100%; background: var(--bg-base); color: var(--text-primary); border-radius: 44px; overflow: hidden; position: relative; display: flex; flex-direction: column; }
.phone__notch { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); width: 120px; height: 32px; background: #000; border-radius: 18px; z-index: 30; }
.phone__statusbar { height: 44px; padding: 12px 32px 0; display: flex; align-items: center; justify-content: space-between; font-size: 14px; font-weight: 600; color: var(--text-primary); font-feature-settings: "tnum"; flex-shrink: 0; }
.phone__statusbar__right { display: flex; align-items: center; gap: 5px; font-size: 13px; }
.phone__topbar { display: flex; align-items: center; justify-content: space-between; padding: 8px 18px 12px; gap: 10px; flex-shrink: 0; }
.phone__mark { width: 32px; height: 32px; border-radius: 9px; background: var(--bg-surface); border: 1px solid var(--border); display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
.phone__mark img { width: 65%; height: 65%; }
[data-theme="light"].phone__mark img { filter: invert(1) brightness(0.3); }
.phone__back { width: 32px; height: 32px; border-radius: 50%; background: transparent; border: none; color: var(--text-primary); display: inline-flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
.phone__back:hover { background: rgba(127,127,127,0.06); }
.phone__back svg { width: 20px; height: 20px; }
.phone__title { flex: 1; text-align: center; font-size: 14.5px; font-weight: 600; letter-spacing: -0.01em; }
.gc-crisis-pill { display: inline-flex; align-items: center; gap: 5px; padding: 6px 11px; border-radius: 999px; background: var(--e-50); color: white; border: none; font-family: inherit; font-size: 11.5px; font-weight: 600; cursor: pointer; flex-shrink: 0; }
.gc-crisis-pill svg { width: 11px; height: 11px; }

.rp-body { flex: 1; padding: 4px 16px 12px; overflow-y: auto; display: flex; flex-direction: column; gap: 11px; }
.rp-body::-webkit-scrollbar { width: 4px; }
.rp-body::-webkit-scrollbar-thumb { background: rgba(127,127,127,0.2); border-radius: 4px; }

.gc-card { padding: 14px; background: var(--bg-surface); border: 1px solid var(--border); border-radius: 14px; display: flex; flex-direction: column; gap: 8px; }
.gc-card--milestone { background: linear-gradient(135deg, var(--t-50), var(--t-30)); color: white; border-color: transparent; }
.gc-card--milestone p { color: rgba(255,255,255,0.92); }
.gc-card--alert { background: var(--bg-surface-2); border-left: 3px solid var(--w-60); border-radius: 4px 14px 14px 4px; padding: 14px 16px; }
.gc-card--anna { background: linear-gradient(135deg, rgba(133,118,194,0.15), rgba(83,71,146,0.08)); border-color: rgba(133,118,194,0.25); flex-direction: row; align-items: flex-start; gap: 10px; padding: 11px 13px; }
.gc-card--anna.anna-av { width: 30px; height: 30px; border-radius: 50%; background: var(--p-30); display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
.gc-card--anna.anna-av img { width: 60%; height: 60%; }
.gc-card--anna.anna-name { font-size: 12.5px; font-weight: 700; letter-spacing: -0.01em; margin-bottom: 2px; }
.gc-card--anna p { font-size: 12.5px; line-height: 1.45; margin: 0; }
.gc-card--anna strong { display: block; font-size: 12.5px; margin-bottom: 2px; }

.rp-pill { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px 3px 4px; border-radius: 999px; font-size: 10px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; align-self: flex-start; }
.rp-pill::before { content: ''; width: 8px; height: 8px; border-radius: 50%; }
.rp-pill--active { background: var(--t-20); color: var(--t-80); }
.rp-pill--active::before { background: var(--t-50); }
[data-theme="light"].rp-pill--active { background: var(--t-90); color: var(--t-30); }
.rp-pill--hold { background: var(--w-30); color: var(--w-80); }
.rp-pill--hold::before { background: var(--w-60); }
[data-theme="light"].rp-pill--hold { background: var(--w-90); color: var(--w-30); }
.rp-pill--fca { background: var(--w-90); color: var(--w-30); align-self:flex-start; font-family: 'JetBrains Mono', monospace; font-size: 10px; padding: 4px 11px; }
.rp-pill--fca::before { display: none; }
.rp-pill--rec { background: var(--t-90); color: var(--t-30); padding: 4px 11px; }
.rp-pill--rec::before { display: none; }

/* RP1 progress */
.rp-balance { display: flex; flex-direction: column; gap: 8px; padding: 14px 16px; background: var(--bg-surface); border: 1px solid var(--border); border-radius: 14px; }
.rp-balance__loanid { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-muted); }
.rp-balance__bar { height: 8px; background: var(--bg-surface-2); border-radius: 999px; overflow: hidden; }
.rp-balance__bar div { height: 100%; background: linear-gradient(90deg, var(--p-50), var(--t-50)); border-radius: 999px; }
.rp-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.rp-stat-n { font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 700; }
.rp-stat-l { font-size: 9px; font-family: 'JetBrains Mono', monospace; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin-top: 2px; }

/* Next payment card */
.rp-next { display: flex; align-items: center; gap: 11px; padding-top: 8px; border-top: 1px solid var(--border); }
.rp-next__date { background: var(--bg-surface-2); border: 1px solid var(--border); border-radius: 10px; padding: 9px 11px; text-align: center; flex-shrink: 0; min-width: 56px; }
.rp-next__day { font-size: 22px; font-weight: 800; line-height: 1; }
.rp-next__mo { font-size: 9px; font-family: 'JetBrains Mono', monospace; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin-top: 2px; }
.rp-next__amt { font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 700; line-height: 1; }
.rp-next__sub { font-size: 11px; color: var(--text-secondary); margin-top: 3px; }
.rp-next__split { font-size: 10px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; margin-top: 2px; }

/* Schedule */
.rp-sched { display: grid; grid-template-columns: 30px 1fr auto; gap: 10px; align-items: center; padding: 9px 0; border-top: 1px solid var(--border); }
.rp-sched:first-of-type { border-top: none; padding-top: 0; }
.rp-sched__n { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 700; color: var(--text-muted); }
.rp-sched__t { font-size: 13px; font-weight: 600; }
.rp-sched__s { font-size: 11px; color: var(--text-secondary); margin-top: 1px; }
.rp-sched-pill { display: inline-flex; padding: 2px 8px; border-radius: 999px; font-size: 9.5px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; background: var(--bg-surface-2); color: var(--text-muted); }
.rp-sched-pill--paid { background: var(--t-20); color: var(--t-80); }
[data-theme="light"].rp-sched-pill--paid { background: var(--t-90); color: var(--t-30); }
.rp-sched-pill--next { background: var(--accent-strong); color: white; }
.rp-sched-pill--final { background: var(--p-40); color: white; }
.rp-sched--paid.rp-sched__t,.rp-sched--paid.rp-sched__s { color: var(--text-muted); }
.rp-sched-gap { padding: 7px 0; text-align: center; font-style: italic; color: var(--text-muted); font-size: 11px; border-top: 1px solid var(--border); }

/* Action rows */
.rp-action { display: grid; grid-template-columns: 34px 1fr; gap: 11px; align-items: center; padding: 10px 0; border-top: 1px solid var(--border); cursor: pointer; }
.rp-action:first-of-type { border-top: none; padding-top: 0; }
.rp-action__ic { width: 34px; height: 34px; border-radius: 10px; display: inline-flex; align-items: center; justify-content: center; }
.rp-action__ic svg { width: 16px; height: 16px; }
.rp-action__t { font-size: 13px; font-weight: 600; }
.rp-action__s { font-size: 11px; color: var(--text-secondary); margin-top: 1px; }

/* Payment receipt */
.rp-recv { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-top: 1px solid var(--border); font-size: 12.5px; }
.rp-recv:first-of-type { border-top: none; padding-top: 0; }
.rp-recv-l { color: var(--text-secondary); }
.rp-recv-v { font-weight: 600; font-family: 'JetBrains Mono', monospace; }
.rp-recv--total { font-weight: 700; padding-top: 11px; }
.rp-recv--total.rp-recv-l { color: var(--text-primary); }

/* Hold event timeline */
.rp-event { display: grid; grid-template-columns: 90px 1fr; gap: 11px; align-items: flex-start; padding: 11px 0; border-top: 1px solid var(--border); }
.rp-event:first-of-type { border-top: none; padding-top: 0; }
.rp-event-pill { padding: 3px 9px; border-radius: 999px; font-size: 9.5px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; text-align: center; }
.rp-event-pill--blocked { background: var(--e-30); color: var(--e-90); }
[data-theme="light"].rp-event-pill--blocked { background: var(--e-90); color: var(--e-30); }
.rp-event-pill--paused { background: var(--w-30); color: var(--w-80); }
[data-theme="light"].rp-event-pill--paused { background: var(--w-90); color: var(--w-30); }
.rp-event-pill--notice { background: var(--s-20); color: var(--s-80); }
[data-theme="light"].rp-event-pill--notice { background: var(--s-90); color: var(--s-20); }
.rp-event-pill--anna { background: var(--p-40); color: var(--p-95); }
[data-theme="light"].rp-event-pill--anna { background: var(--p-90); color: var(--p-30); }
.rp-event-pill--upcoming { background: var(--bg-surface-2); color: var(--text-muted); border: 1px solid var(--border); }
.rp-event__t { font-size: 13px; font-weight: 600; }
.rp-event__s { font-size: 11.5px; color: var(--text-secondary); margin-top: 2px; line-height: 1.4; }

/* Frozen row */
.rp-frozen { display: flex; justify-content: space-between; padding: 9px 0; border-top: 1px solid var(--border); font-size: 12.5px; }
.rp-frozen:first-of-type { border-top: none; padding-top: 0; }
.rp-frozen-l { color: var(--text-secondary); }
.rp-frozen-v { font-weight: 600; text-align: right; }
.rp-frozen-v--ok { color: var(--t-50); }

/* Manual Hold rules */
.rp-rule { display: grid; grid-template-columns: 26px 1fr; gap: 10px; align-items: flex-start; padding: 8px 0; border-top: 1px solid var(--border); }
.rp-rule:first-of-type { border-top: none; padding-top: 0; }
.rp-rule__n { width: 26px; height: 26px; border-radius: 50%; background: var(--bg-surface-2); border: 1px solid var(--border); display: inline-flex; align-items: center; justify-content: center; font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 11px; color: var(--text-secondary); }
.rp-rule__t { font-size: 13px; font-weight: 600; }
.rp-rule__s { font-size: 11.5px; color: var(--text-secondary); margin-top: 1px; }

/* Reason chips */
.rp-chip-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.rp-chip { display: flex; align-items: center; gap: 7px; padding: 9px 11px; background: var(--bg-base); border: 1px solid var(--border); border-radius: 11px; font-family: inherit; font-size: 12px; font-weight: 500; color: var(--text-primary); cursor: pointer; text-align: left; }
.rp-chip.is-on { background: var(--accent-strong); color: var(--on-accent); border-color: transparent; font-weight: 600; }
.rp-chip > span:first-child { font-size: 14px; flex-shrink: 0; }

/* Budget */
.rp-budget-bar { height: 8px; background: var(--bg-surface-2); border-radius: 999px; overflow: hidden; }
.rp-budget-bar div { height: 100%; background: var(--w-60); border-radius: 999px; }

/* CONC tiles */
.rp-pd-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
.rp-pd-tile { padding: 11px 12px; background: var(--bg-base); border: 1px solid var(--border); border-radius: 10px; }
.rp-pd-tile__l { font-size: 11px; color: var(--text-secondary); }
.rp-pd-tile__n { font-size: 18px; font-weight: 800; letter-spacing: -0.015em; margin-top: 2px; }
.rp-pd-tile--gap { background: var(--w-30); border-color: transparent; }
[data-theme="light"].rp-pd-tile--gap { background: var(--w-90); }
.rp-pd-tile--gap.rp-pd-tile__l { color: var(--w-80); }
[data-theme="light"].rp-pd-tile--gap.rp-pd-tile__l { color: var(--w-30); }

/* Plan card */
.rp-plan { padding: 13px 14px; border: 1px solid var(--t-50); border-radius: 14px; background: var(--bg-surface); display: flex; flex-direction: column; gap: 6px; }

/* CTAs */
.gc-btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 11px 15px; border-radius: 12px; font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer; border: 1px solid transparent; }
.gc-btn--primary { background: var(--accent-strong); color: var(--on-accent); }
.gc-btn--primary:hover { background: var(--s-40); }
.gc-btn--white { background: white; color: var(--p-30); }
.gc-btn--ghost { background: transparent; color: var(--text-primary); border-color: var(--border); }
.gc-btn--sm { padding: 8px 12px; font-size: 11.5px; border-radius: 10px; }
.gc-btn--full { width: 100%; }

.phone__tabbar { display: grid; grid-template-columns: repeat(5, 1fr); padding: 8px 8px 22px; border-top: 1px solid var(--border); background: var(--bg-base); flex-shrink: 0; }
.phone__tab { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 5px 4px; cursor: pointer; color: var(--text-muted); }
.phone__tab.is-on { color: var(--accent-strong); }
.phone__tab svg { width: 22px; height: 22px; }
.phone__tab span { font-size: 10px; font-weight: 600; }

.rp-decision { font-size: 11px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; padding: 4px 0; line-height: 1.4; text-align: center; }

let idx = 0;
function toggleChip(el) { el.classList.toggle('is-on'); }

function render() {
 const screen = SCREENS[idx];
 document.getElementById('stage').innerHTML = `<div class="screen" style="display:flex;flex-direction:column;flex:1;min-height:0">${builders[screen.kind]()}</div>`;
 document.getElementById('screenId').textContent = screen.id;
 document.getElementById('screenName').textContent = screen.name;
 document.getElementById('progressFill').style.width = ((idx + 1) / SCREENS.length * 100) + '%';
 document.getElementById('navPrev').disabled = idx === 0;
 document.getElementById('navNext').disabled = idx === SCREENS.length - 1;
 document.querySelectorAll('.proto-scrubber__item').forEach((el, i) => {
 el.classList.toggle('is-active', i === idx);
 if (i === idx) el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
 });
 document.getElementById('contextBody').innerHTML = CTX[screen.kind] || screen.name;
}

function next() { if (idx < SCREENS.length - 1) { idx++; render(); } }
function prev() { if (idx > 0) { idx--; render(); } }
function go(i) { idx = i; render(); }

function buildScrubber() {
 const nav = document.getElementById('scrubber');
 SCREENS.forEach((s, i) => {
 const btn = document.createElement('button');
 btn.className = 'proto-scrubber__item';
 btn.innerHTML = `<span class="proto-scrubber__id">${s.id}</span><span class="proto-scrubber__name">${s.name}</span>`;
 btn.addEventListener('click', () => go(i));
 nav.appendChild(btn);
 });
}

function initTheme() {
 const root = document.documentElement;
 const stored = localStorage.getItem('gc-proto-theme');
 const initial = stored || 'dark';
 root.setAttribute('data-theme', initial);
 document.querySelector('.theme-label').textContent = initial === 'dark' ? 'Dark' : 'Light';
 document.querySelector('.proto-theme-toggle').addEventListener('click', () => {
 const next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
 root.setAttribute('data-theme', next);
 document.querySelector('.theme-label').textContent = next === 'dark' ? 'Dark' : 'Light';
 try { localStorage.setItem('gc-proto-theme', next); } catch(e) {}
 });
}

document.getElementById('navPrev').addEventListener('click', prev);
document.getElementById('navNext').addEventListener('click', next);
document.addEventListener('keydown', (e) => {
 if (e.key === 'ArrowRight') next();
 if (e.key === 'ArrowLeft') prev();
});

buildScrubber();
initTheme();
render();
</script>
