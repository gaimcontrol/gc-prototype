<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Holdwell · Mobile · §05 Onboarding</title>
<link rel="icon" href="../assets/gc-favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
 /* Color scale tokens. Exact from spec 01-brand & 02-design-system */
 --p-10:#0B0F1C;--p-20:#161B2D;--p-30:#20273C;--p-40:#354872;--p-50:#4D608C;--p-60:#6B7DA6;--p-70:#8E9DC0;--p-80:#B5BFD9;--p-90:#DCE2F0;--p-95:#ECF0F9;--p-99:#FAFBFE;--p-100:#FFF;
 --s-10:#28215A;--s-20:#3E3478;--s-30:#534792;--s-40:#6B5DAC;--s-50:#8576C2;--s-60:#9D90D2;--s-70:#B5ACDF;--s-80:#CFC8EA;--s-90:#E8E4F4;
 --t-10:#0E4A35;--t-20:#1A6047;--t-30:#1F7058;--t-40:#2A8060;--t-50:#399971;--t-60:#5BB088;--t-70:#82C7A4;--t-80:#ADDCC2;--t-90:#D5EDDF;
 --w-30:#6B4500;--w-40:#8C5A00;--w-50:#A36A00;--w-60:#C28200;--w-70:#E09900;--w-80:#FAB44A;--w-90:#FFDFA8;
 --e-30:#7A1F1F;--e-50:#C73838;--e-90:#FBD9D9;
 --n-50:#76798A;--n-60:#9094A3;--n-95:#F1F2F5;--nv-80:#C5C9DD;
}

/* Dark theme = product default */
[data-theme="dark"] {
 --bg-base: var(--p-30);
 --bg-surface: var(--p-20);
 --bg-surface-2: var(--p-10);
 --border: rgba(255,255,255,0.08);
 --text-primary: var(--n-95);
 --text-secondary: var(--nv-80);
 --accent: var(--s-70);
 --accent-strong: var(--s-50);
 --on-accent: #fff;
 --page-bg: #0a0e1a;
 --page-fg: var(--n-95);
 --page-fg-muted: var(--nv-80);
 --page-card-bg: var(--p-20);
 --page-divider: rgba(255,255,255,0.06);
}
[data-theme="light"] {
 --bg-base: var(--p-99);
 --bg-surface: #fff;
 --bg-surface-2: var(--p-95);
 --border: rgba(22,27,45,0.08);
 --text-primary: var(--p-20);
 --text-secondary: var(--n-50);
 --accent: var(--p-40);
 --accent-strong: var(--s-40);
 --on-accent: #fff;
 --page-bg: var(--p-95);
 --page-fg: var(--p-20);
 --page-fg-muted: var(--n-50);
 --page-card-bg: #fff;
 --page-divider: rgba(22,27,45,0.08);
}

* { box-sizing: border-box; }
html, body { background: var(--page-bg); color: var(--page-fg); margin: 0; transition: background-color 220ms ease, color 220ms ease; }
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; min-height: 100vh; }

/* ============= PROTOTYPE CHROME (everything outside the phone) ============= */
.proto-shell { display: grid; grid-template-columns: 280px 1fr; gap: 0; min-height: 100vh; }
@media (max-width: 960px) {.proto-shell { grid-template-columns: 1fr; } }

.proto-sidebar { background: var(--page-card-bg); border-right: 1px solid var(--page-divider); padding: 28px 22px; position: sticky; top: 0; height: 100vh; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }
@media (max-width: 960px) {.proto-sidebar { position: static; height: auto; max-height: 50vh; border-right: none; border-bottom: 1px solid var(--page-divider); } }
.proto-sidebar__brand { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
.proto-sidebar__mark { width: 36px; height: 36px; border-radius: 10px; background: var(--p-30); display: inline-flex; align-items: center; justify-content: center; }
.proto-sidebar__mark img { width: 70%; height: 70%; }
.proto-sidebar__name { font-weight: 700; font-size: 17px; letter-spacing: -0.01em; }
.proto-sidebar__pill { display: inline-flex; padding: 3px 9px; border-radius: 999px; background: linear-gradient(120deg, var(--s-50), var(--p-50), var(--t-50)); color: white; font-weight: 700; font-size: 9.5px; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.06em; text-transform: uppercase; }

.proto-sidebar__back { display: inline-flex; align-items: center; gap: 6px; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--page-fg-muted); text-decoration: none; margin-bottom: 4px; }
.proto-sidebar__back:hover { color: var(--page-accent, var(--s-70)); }

.proto-section-title { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--page-fg-muted); margin: 12px 0 6px; }

.proto-scrubber { display: flex; flex-direction: column; gap: 2px; }
.proto-scrubber__item { display: grid; grid-template-columns: 44px 1fr; gap: 8px; align-items: center; padding: 7px 10px; border-radius: 8px; cursor: pointer; font-size: 12.5px; transition: background 140ms ease; border: none; background: transparent; color: inherit; font-family: inherit; text-align: left; }
.proto-scrubber__item:hover { background: rgba(127,127,127,0.08); }
.proto-scrubber__item.is-active { background: var(--accent-strong); color: var(--on-accent); }
.proto-scrubber__item.is-active.proto-scrubber__id { color: rgba(255,255,255,0.85); }
.proto-scrubber__id { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 600; color: var(--page-fg-muted); letter-spacing: 0.06em; }
.proto-scrubber__name { font-size: 12.5px; font-weight: 500; }

.proto-sidebar__footer { margin-top: auto; padding-top: 16px; border-top: 1px solid var(--page-divider); font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--page-fg-muted); }
.proto-sidebar__footer a { color: var(--page-fg-muted); text-decoration: none; border-bottom: 1px dotted currentColor; }
.proto-sidebar__footer a:hover { color: var(--page-accent, var(--s-70)); }

.proto-theme-toggle { display: inline-flex; align-items: center; gap: 8px; padding: 7px 12px; border-radius: 8px; background: var(--bg-surface-2); border: 1px solid var(--border); color: var(--page-fg-muted); cursor: pointer; font-family: 'JetBrains Mono', monospace; font-size: 11px; align-self: flex-start; }
.proto-theme-toggle svg { width: 12px; height: 12px; }
[data-theme="dark"].proto-theme-toggle.icon-moon { display: none; }
[data-theme="light"].proto-theme-toggle.icon-sun { display: none; }

/* ============= STAGE (where the phone sits) ============= */
.proto-stage { display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 48px 24px 64px; gap: 24px; }
.proto-stage__caption { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--page-fg-muted); letter-spacing: 0.06em; text-transform: uppercase; }
.proto-stage__caption strong { color: var(--page-fg); }

/* ============= PHONE FRAME (real iPhone 14 size: 393 × 852 inner) ============= */
.phone {
 width: 393px; height: 852px; flex-shrink: 0;
 border-radius: 56px;
 background: #000;
 padding: 13px;
 position: relative;
 box-shadow: 0 0 0 1.5px #2a2e3a, 0 30px 60px -20px rgba(0,0,0,0.7), 0 16px 32px -16px rgba(0,0,0,0.4);
}
.phone::before,.phone::after { content: ''; position: absolute; background: #2a2e3a; }
.phone::before { left: -3px; top: 110px; width: 3px; height: 30px; border-radius: 3px 0 0 3px; }
.phone::after { left: -3px; top: 160px; width: 3px; height: 60px; border-radius: 3px 0 0 3px; }
.phone__inner {
 width: 100%; height: 100%; background: var(--bg-base); color: var(--text-primary);
 border-radius: 44px; overflow: hidden; position: relative;
 display: flex; flex-direction: column;
}
.phone__notch {
 position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
 width: 120px; height: 32px; background: #000; border-radius: 18px; z-index: 30;
}

/* Status bar */
.phone__statusbar {
 height: 44px; padding: 12px 32px 0;
 display: flex; align-items: center; justify-content: space-between;
 font-size: 14px; font-weight: 600; color: var(--text-primary);
 font-feature-settings: "tnum"; letter-spacing: -0.01em;
 flex-shrink: 0;
}
.phone__statusbar__time { font-weight: 700; }
.phone__statusbar__right { display: flex; align-items: center; gap: 5px; font-size: 13px; }

/* App-bar (per design-system §10) */
.phone__topbar {
 display: flex; align-items: center; justify-content: space-between;
 padding: 8px 18px 14px; gap: 10px; flex-shrink: 0;
}
.phone__mark {
 width: 32px; height: 32px; border-radius: 9px;
 background: var(--bg-surface); border: 1px solid var(--border);
 display: inline-flex; align-items: center; justify-content: center;
 cursor: pointer; flex-shrink: 0;
}
.phone__mark img { width: 65%; height: 65%; }
/* Mono-light SVG is white; invert it on light backgrounds so the mark stays visible */
[data-theme="light"].phone__mark img { filter: invert(1) brightness(0.3); }
.phone__title { flex: 1; text-align: center; font-size: 14px; font-weight: 600; color: var(--text-primary); letter-spacing: -0.01em; }
.gc-crisis-pill {
 display: inline-flex; align-items: center; gap: 5px;
 padding: 6px 11px; border-radius: 999px;
 background: var(--e-50); color: white;
 border: none; font-family: inherit;
 font-size: 11.5px; font-weight: 600;
 cursor: pointer; flex-shrink: 0;
}

/* Body */
.ob-body {
 flex: 1; padding: 4px 18px 18px; overflow-y: auto;
 display: flex; flex-direction: column; gap: 12px;
 scrollbar-width: thin;
}
.ob-body::-webkit-scrollbar { width: 4px; }
.ob-body::-webkit-scrollbar-thumb { background: rgba(127,127,127,0.2); border-radius: 4px; }

/* Anna welcome (ON1) */
.ob-anna-mark { position: relative; width: 88px; height: 88px; border-radius: 22px; background: linear-gradient(135deg, var(--s-30), var(--p-20)); display: inline-flex; align-items: center; justify-content: center; align-self: center; margin: 12px 0 4px; }
.ob-anna-mark img { width: 60%; height: 60%; }
.ob-anna-mark__pulse { position: absolute; inset: -7px; border-radius: 28px; border: 2px solid var(--s-50); opacity: 0.5; animation: ob-pulse 2.4s ease-in-out infinite; }
@keyframes ob-pulse { 0%,100% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.06); opacity: 0.2; } }
.ob-anna-name { font-weight: 700; font-size: 14px; color: var(--text-primary); text-align: center; }

.gc-card { padding: 14px; background: var(--bg-surface); border: 1px solid var(--border); border-radius: 14px; display: flex; gap: 10px; }
.gc-card--anna { background: linear-gradient(135deg, rgba(133,118,194,0.15), rgba(83,71,146,0.08)); border-color: rgba(133,118,194,0.25); flex-direction: row; align-items: flex-start; gap: 10px; padding: 12px 14px; border-radius: 14px; }
.gc-card--anna.anna-avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--p-30); display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
.gc-card--anna.anna-avatar img { width: 60%; height: 60%; }
.gc-card--anna.anna-name { font-size: 12px; font-weight: 700; letter-spacing: -0.01em; }
.gc-card--anna p { font-size: 13px; line-height: 1.5; margin: 2px 0 0; color: var(--text-primary); }

.ob-h { font-size: 22px; font-weight: 800; letter-spacing: -0.02em; line-height: 1.15; color: var(--text-primary); margin: 8px 0 4px; }

.ob-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 7px; }
.ob-list li { display: grid; grid-template-columns: 28px 1fr; gap: 11px; align-items: center; padding: 10px 13px; background: var(--bg-surface); border: 1px solid var(--border); border-radius: 11px; font-size: 13.5px; color: var(--text-primary); }
.ob-list__num { width: 28px; height: 28px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 12px; background: var(--accent-strong); color: var(--on-accent); }

/* Bottom CTA area */
.ob-cta { padding: 14px 18px 24px; border-top: 1px solid var(--border); background: var(--bg-base); flex-shrink: 0; }
.gc-btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 14px 18px; border-radius: 14px; font-family: inherit; font-size: 15px; font-weight: 600; cursor: pointer; border: 1px solid transparent; transition: transform 120ms ease, background-color 160ms ease; }
.gc-btn:active { transform: scale(0.98); }
.gc-btn--primary { background: var(--accent-strong); color: var(--on-accent); }
.gc-btn--primary:hover { background: var(--s-40); }
[data-theme="light"].gc-btn--primary:hover { background: var(--s-30); }
.gc-btn--ghost { background: transparent; color: var(--text-primary); border-color: var(--border); }
.gc-btn--ghost:hover { background: rgba(127,127,127,0.06); }
.gc-btn--ghost:disabled { opacity: 0.35; cursor: not-allowed; }
.gc-btn--full { width: 100%; }

/* Quiz progress dots */
.ob-progress { display: flex; gap: 8px; align-items: center; justify-content: center; margin: 4px 0 8px; }
.ob-progress__step { width: 30px; height: 30px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 700; background: var(--bg-surface-2); color: var(--text-secondary); border: 1px solid var(--border); }
.ob-progress__step.is-done { background: var(--t-50); color: white; border-color: transparent; }
.ob-progress__step.is-current { background: var(--accent-strong); color: var(--on-accent); border-color: transparent; transform: scale(1.08); }

/* Question card */
.ob-question { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
.ob-question__num { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); }
.ob-question__title { font-size: 17px; font-weight: 700; line-height: 1.3; color: var(--text-primary); margin: 0; letter-spacing: -0.01em; }

/* PGSI 0–3 scale */
.ob-scale { display: grid; grid-template-columns: repeat(2, 1fr); gap: 7px; }
.ob-scale__opt { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; padding: 12px 8px; background: var(--bg-base); border: 1px solid var(--border); border-radius: 11px; cursor: pointer; font-family: inherit; color: var(--text-primary); transition: background 140ms ease; }
.ob-scale__opt:hover { background: rgba(127,127,127,0.06); }
.ob-scale__opt.is-on { background: var(--accent-strong); color: var(--on-accent); border-color: var(--accent-strong); }
.ob-scale__num { font-family: 'JetBrains Mono', monospace; font-size: 18px; font-weight: 700; }
.ob-scale__label { font-size: 11px; font-weight: 500; text-align: center; }

/* Single-choice list */
.ob-choices { display: flex; flex-direction: column; gap: 7px; }
.ob-choice { padding: 12px 14px; background: var(--bg-base); border: 1px solid var(--border); border-radius: 11px; font-family: inherit; font-size: 14px; font-weight: 500; color: var(--text-primary); text-align: left; cursor: pointer; transition: background 140ms ease; }
.ob-choice:hover { background: rgba(127,127,127,0.06); }
.ob-choice.is-on { background: var(--accent-strong); color: var(--on-accent); border-color: var(--accent-strong); font-weight: 600; }

/* Multi-checkbox list */
.ob-checks { display: flex; flex-direction: column; gap: 7px; }
.ob-check { display: flex; align-items: center; gap: 11px; padding: 11px 14px; background: var(--bg-base); border: 1px solid var(--border); border-radius: 11px; font-size: 14px; color: var(--text-primary); cursor: pointer; transition: background 140ms ease; }
.ob-check:hover { background: rgba(127,127,127,0.06); }
.ob-check.is-on { background: var(--accent-strong); color: var(--on-accent); border-color: var(--accent-strong); }
.gc-checkbox { width: 18px; height: 18px; border-radius: 5px; border: 1.5px solid currentColor; flex-shrink: 0; display: inline-flex; align-items: center; justify-content: center; }
.ob-check.is-on.gc-checkbox { background: white; border-color: white; color: var(--accent-strong); }
.ob-check.is-on.gc-checkbox::after { content: '✓'; font-size: 12px; font-weight: 700; }

/* Text input */
.phone__field { display: flex; flex-direction: column; gap: 6px; }
.phone__label { font-size: 11.5px; font-weight: 600; color: var(--text-secondary); letter-spacing: 0.02em; }
.phone__input { padding: 12px 14px; background: var(--bg-base); border: 1px solid var(--border); border-radius: 11px; font-family: inherit; font-size: 15px; color: var(--text-primary); width: 100%; }
.phone__input:focus { outline: none; border-color: var(--accent-strong); }
.phone__hint { font-size: 11.5px; color: var(--text-secondary); line-height: 1.4; }

/* Profile hero (ON7) */
.profile-hero { background: linear-gradient(135deg, var(--s-40), var(--p-50)); color: white; padding: 18px 20px; border-radius: 16px; display: flex; flex-direction: column; gap: 6px; position: relative; overflow: hidden; }
.profile-hero__kicker { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; opacity: 0.8; }
.profile-hero__name { font-size: 26px; font-weight: 800; letter-spacing: -0.02em; margin: 0; }
.profile-hero__sub { font-size: 13px; line-height: 1.5; margin: 2px 0 0; opacity: 0.92; }
.profile-hero__chips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
.profile-hero__chip { background: rgba(0,0,0,0.22); padding: 4px 10px; border-radius: 999px; font-size: 11px; font-weight: 600; }

.ob-result-list { display: flex; flex-direction: column; gap: 7px; }
.ob-result-item { display: grid; grid-template-columns: 30px 1fr; gap: 11px; align-items: center; padding: 11px 13px; background: var(--bg-surface); border: 1px solid var(--border); border-radius: 11px; }
.ob-result-item__icon { width: 30px; height: 30px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; }
.ob-result-item__t { font-weight: 600; font-size: 13.5px; color: var(--text-primary); line-height: 1.25; }
.ob-result-item__s { font-size: 11.5px; color: var(--text-secondary); margin-top: 1px; }

/* KYC camera */
.kyc-camera { background: var(--bg-surface-2); border-radius: 14px; padding: 18px; display: flex; flex-direction: column; align-items: center; gap: 12px; }
.kyc-camera__frame { width: 100%; aspect-ratio: 1.6; border: 2.5px dashed var(--t-60); border-radius: 14px; background: linear-gradient(135deg, #1a3052, #0e1f3a); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; color: rgba(255,255,255,0.92); }
.kyc-camera__caption { display: inline-flex; align-items: center; gap: 7px; font-size: 12px; color: var(--text-secondary); }
.kyc-camera__caption::before { content: ''; width: 7px; height: 7px; border-radius: 50%; background: var(--t-50); }

/* Liveness oval */
.kyc-liveness { display: flex; flex-direction: column; align-items: center; gap: 14px; padding: 14px 0; }
.kyc-liveness__oval { width: 180px; height: 230px; border-radius: 50%/55%; border: 3px solid var(--s-50); background: linear-gradient(135deg, var(--p-20), var(--s-20)); display: flex; align-items: center; justify-content: center; position: relative; }
.kyc-liveness__face { position: relative; width: 80%; height: 80%; }
.kyc-liveness__eye { position: absolute; top: 35%; width: 8px; height: 8px; border-radius: 50%; background: white; }
.kyc-liveness__mouth { position: absolute; top: 60%; left: 50%; transform: translateX(-50%); width: 30%; height: 6px; border-radius: 0 0 14px 14px; background: rgba(255,255,255,0.6); }
.kyc-liveness__steps { display: flex; flex-direction: column; gap: 5px; align-items: center; }
.kyc-liveness__step { padding: 6px 12px; border-radius: 999px; font-size: 12px; font-family: 'JetBrains Mono', monospace; color: var(--text-secondary); background: var(--bg-surface-2); }
.kyc-liveness__step.is-done { background: var(--t-20); color: var(--t-80); }
.kyc-liveness__step.is-current { background: var(--accent-strong); color: var(--on-accent); }

/* Suit list (KYC result, suitability result) */
.ob-suit-list { display: flex; flex-direction: column; gap: 7px; }
.ob-suit-item { display: grid; grid-template-columns: 30px 1fr; gap: 11px; align-items: center; padding: 11px 13px; background: var(--bg-surface); border: 1px solid var(--border); border-radius: 11px; }
.ob-suit-icon { width: 30px; height: 30px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; flex-shrink: 0; }
.ob-suit-icon--ok { background: var(--t-90); color: var(--t-30); }
[data-theme="dark"].ob-suit-icon--ok { background: var(--t-20); color: var(--t-80); }
.ob-suit-icon--warn { background: var(--w-90); color: var(--w-30); }
[data-theme="dark"].ob-suit-icon--warn { background: var(--w-30); color: var(--w-80); }
.ob-suit-t { font-weight: 600; font-size: 13.5px; color: var(--text-primary); line-height: 1.25; }
.ob-suit-s { font-size: 11.5px; color: var(--text-secondary); margin-top: 1px; }

/* Bank explain */
.ob-explain { display: grid; grid-template-columns: 38px 1fr; gap: 12px; align-items: center; padding: 12px 14px; background: var(--bg-surface); border: 1px solid var(--border); border-radius: 12px; }
.ob-explain__icon { width: 38px; height: 38px; border-radius: 11px; display: inline-flex; align-items: center; justify-content: center; }
.ob-explain__icon--t { background: var(--t-90); color: var(--t-30); }
[data-theme="dark"].ob-explain__icon--t { background: var(--t-20); color: var(--t-80); }
.ob-explain__icon--p { background: var(--p-90); color: var(--p-30); }
[data-theme="dark"].ob-explain__icon--p { background: var(--p-40); color: var(--p-95); }
.ob-explain__icon--s { background: var(--s-90); color: var(--s-10); }
[data-theme="dark"].ob-explain__icon--s { background: var(--s-20); color: var(--s-80); }

.bank-row:hover { background: rgba(127,127,127,0.06); }
.bank-row.is-on { background: var(--accent-strong); color: var(--on-accent); border-color: var(--accent-strong); }

.bank-row__name { font-weight: 600; font-size: 14px; color: inherit; }

.vendor-badge { display: inline-flex; align-items: center; gap: 6px; font-size: 11.5px; color: var(--text-secondary); padding: 8px 11px; background: var(--bg-base); border-radius: 8px; border: 1px solid var(--border); }
.vendor-badge svg { width: 13px; height: 13px; flex-shrink: 0; }

.connect-progress { display: flex; flex-direction: column; gap: 6px; width: 100%; max-width: 280px; }

.connect-progress__step.is-done { background: var(--t-20); color: var(--t-80); border-color: transparent; }

.ob-bank-summary__head { display: flex; align-items: center; justify-content: space-between; }

.ob-bank-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

.ob-signpost strong { font-size: 13.5px; color: var(--text-primary); display: block; }
.ob-signpost__s { font-size: 11.5px; color: var(--text-secondary); margin-top: 1px; }

.suit-status--ok { background: var(--t-20); color: var(--t-80); }
.suit-status--ok::before { background: var(--t-50); opacity: 1; }
.suit-status--warn { background: var(--w-30); color: var(--w-80); }
.suit-status--warn::before { background: var(--w-60); opacity: 1; }
.suit-status--err { background: var(--e-30); color: var(--e-90); }

[data-theme="light"].suit-status--warn { background: var(--w-90); color: var(--w-30); }
[data-theme="light"].suit-status--err { background: var(--e-90); color: var(--e-30); }

.screen { display: none; height: 100%; flex-direction: column; }

.screen { animation: fade-in 220ms ease; }

function buildQuiz(q) {
 let dots = [];
 for (let i = 1; i < q.section; i++) dots.push(i);
 const progress = PROGRESS_DOTS(q.section, 5, dots);

 let answerHtml = '';
 if (q.kind === 'text') {
 answerHtml = `
 <div class="phone__field">
 <input class="phone__input" type="text" placeholder="${q.placeholder || ''}" value="${q.value || ''}">
 <span class="phone__hint">${q.hint || ''}</span>
 </div>`;
 } else if (q.kind === 'choice') {
 answerHtml = '<div class="ob-choices">';
 q.options.forEach((opt, i) => {
 const on = i === q.on ? ' is-on' : '';
 answerHtml += `<button class="ob-choice${on}" onclick="pickOne(this)">${opt}</button>`;
 });
 answerHtml += '</div>';
 } else if (q.kind === 'scale') {
 answerHtml = '<div class="ob-scale">';
 q.options.forEach((opt, i) => {
 const on = i === q.on ? ' is-on' : '';
 answerHtml += `<button class="ob-scale__opt${on}" onclick="pickOne(this)"><span class="ob-scale__num">${i}</span><span class="ob-scale__label">${opt}</span></button>`;
 });
 answerHtml += '</div>';
 } else if (q.kind === 'checks') {
 answerHtml = '<div class="ob-checks">';
 q.options.forEach((opt, i) => {
 const on = (Array.isArray(q.on) && q.on.includes(i)) ? ' is-on' : '';
 const cb = on ? '<span class="gc-checkbox"></span>' : '<span class="gc-checkbox"></span>';
 answerHtml += `<label class="ob-check${on}" onclick="toggleCheck(this)">${cb}${opt}</label>`;
 });
 answerHtml += '</div>';
 }

 return {
 title: q.title, statusbar: '100%',
 body: `
 ${progress}
 ${ANNA_BUBBLE(q.anna)}
 <div class="ob-question">
 <span class="ob-question__num">Question ${q.q} of ${q.of}</span>
 <h3 class="ob-question__title">${q.qText}</h3>
 ${answerHtml}
 </div>`,
 cta: `
 <div style="display:flex;gap:8px;align-items:center">
 <button class="gc-btn gc-btn--ghost" onclick="prev()" style="flex:0 0 auto">← Back</button>
 <button class="gc-btn gc-btn--primary" style="flex:1" onclick="next()">${q.nextLabel || 'Next →'}</button>
 </div>`
 };
}

/* ----- STATE + NAV ----- */
let idx = 0;

function render() {
 const screen = SCREENS[idx];
 let payload;
 if (screen.kind === 'quiz') payload = buildQuiz(screen.data);
 else payload = builders[screen.kind]();

 document.getElementById('phoneTitle').textContent = payload.title;
 document.getElementById('statusbarRight').innerHTML = `<span style="display:inline-flex;gap:3px"><span style="width:4px;height:4px;border-radius:50%;background:currentColor"></span><span style="width:4px;height:5px;border-radius:1px;background:currentColor"></span><span style="width:4px;height:6px;border-radius:1px;background:currentColor"></span><span style="width:4px;height:7px;border-radius:1px;background:currentColor"></span></span><span>${payload.statusbar}</span>`;
 document.getElementById('stage').innerHTML = `
 <div class="screen is-active">
 <div class="ob-body">${payload.body}</div>
 <div class="ob-cta">${payload.cta}</div>
 </div>`;

 // Mode bar
 document.getElementById('screenId').textContent = screen.id;
 document.getElementById('screenName').textContent = screen.name;
 document.getElementById('progressFill').style.width = ((idx + 1) / SCREENS.length * 100) + '%';
 document.getElementById('navPrev').disabled = idx === 0;
 document.getElementById('navNext').disabled = idx === SCREENS.length - 1;

 // Scrubber active state
 document.querySelectorAll('.proto-scrubber__item').forEach((el, i) => {
 el.classList.toggle('is-active', i === idx);
 if (i === idx) el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
 });

 // Context panel
 const ctxKey = screen.kind === 'quiz' ? null : screen.kind;
 let ctxHtml;
 if (ctxKey === 'on1') ctxHtml = CTX.ON1;
 else if (ctxKey === 'sponsor') ctxHtml = CTX.sponsor;
 else if (ctxKey === 'on7') ctxHtml = CTX.ON7;
 else if (ctxKey === 'on8' || ctxKey === 'on9' || ctxKey === 'on10' || ctxKey === 'on11') ctxHtml = CTX.ON8;
 else if (ctxKey === 'on12') ctxHtml = CTX.ON12;
 else if (ctxKey === 'on13') ctxHtml = CTX.ON13;
 else if (ctxKey === 'on14' || ctxKey === 'on15') ctxHtml = '<strong>Bank link · TrueLayer.</strong> Read-only consent, 90-day window, auto-refresh weekly. Yapily is the backup AISP if TrueLayer fails.';
 else if (ctxKey === 'on16') ctxHtml = CTX.ON16;
 else ctxHtml = `<strong>${screen.name}</strong>. single quiz screen, one question, Back / Next controls at the bottom. All copy and answer options pulled verbatim from app-ui/05.`;
 document.getElementById('contextBody').innerHTML = ctxHtml;
}

function next() { if (idx < SCREENS.length - 1) { idx++; render(); } }
function prev() { if (idx > 0) { idx--; render(); } }
function go(i) { idx = i; render(); }
function restart() { idx = 0; render(); }

function pickOne(el) {
 const parent = el.parentElement;
 parent.querySelectorAll('.is-on').forEach(s => s.classList.remove('is-on'));
 el.classList.add('is-on');
}
function toggleCheck(el) {
 el.classList.toggle('is-on');
}
function pickBank(el, name) {
 pickOne(el);
 const btn = document.querySelector('#stage.gc-btn--primary.gc-btn--full');
 if (btn) btn.textContent = `Connect ${name} →`;
}

function buildScrubber() {
 const nav = document.getElementById('scrubber');
 SCREENS.forEach((s, i) => {
 const btn = document.createElement('button');
 btn.className = 'proto-scrubber__item';
 btn.innerHTML = `<span class="proto-scrubber__id">${s.id}</span><span class="proto-scrubber__name">${s.name}</span>`;
 btn.addEventListener('click', () => go(i));
 nav.appendChild(btn);
 });
}

/* ----- THEME ----- */
function initTheme() {
 const root = document.documentElement;
 const stored = localStorage.getItem('gc-proto-theme');
 const initial = stored || 'dark';
 root.setAttribute('data-theme', initial);
 document.querySelector('.theme-label').textContent = initial === 'dark' ? 'Dark' : 'Light';
 document.querySelector('.proto-theme-toggle').addEventListener('click', () => {
 const next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
 root.setAttribute('data-theme', next);
 document.querySelector('.theme-label').textContent = next === 'dark' ? 'Dark' : 'Light';
 try { localStorage.setItem('gc-proto-theme', next); } catch(e) {}
 });
}

/* ----- KEYBOARD ----- */
document.getElementById('navPrev').addEventListener('click', prev);
document.getElementById('navNext').addEventListener('click', next);
document.addEventListener('keydown', (e) => {
 if (e.key === 'ArrowRight') next();
 if (e.key === 'ArrowLeft') prev();
});

buildScrubber();
initTheme();
render();
</script>

</body>
</html>
