<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Holdwell · Web · §05 Onboarding</title>
<link rel="icon" href="../assets/gc-favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
 --p-10:#0B0F1C;--p-20:#161B2D;--p-30:#20273C;--p-40:#354872;--p-50:#4D608C;--p-60:#6B7DA6;--p-70:#8E9DC0;--p-80:#B5BFD9;--p-90:#DCE2F0;--p-95:#ECF0F9;--p-99:#FAFBFE;--p-100:#FFF;
 --s-10:#28215A;--s-20:#3E3478;--s-30:#534792;--s-40:#6B5DAC;--s-50:#8576C2;--s-60:#9D90D2;--s-70:#B5ACDF;--s-80:#CFC8EA;--s-90:#E8E4F4;
 --t-10:#0E4A35;--t-20:#1A6047;--t-30:#1F7058;--t-40:#2A8060;--t-50:#399971;--t-60:#5BB088;--t-70:#82C7A4;--t-80:#ADDCC2;--t-90:#D5EDDF;
 --w-30:#6B4500;--w-40:#8C5A00;--w-50:#A36A00;--w-60:#C28200;--w-70:#E09900;--w-80:#FAB44A;--w-90:#FFDFA8;
 --e-30:#7A1F1F;--e-50:#C73838;--e-90:#FBD9D9;
 --n-50:#76798A;--n-60:#9094A3;--n-95:#F1F2F5;--nv-80:#C5C9DD;
}
[data-theme="dark"] {
 --bg-base: var(--p-30); --bg-surface: var(--p-20); --bg-surface-2: var(--p-10);
 --border: rgba(255,255,255,0.08);
 --text-primary: var(--n-95); --text-secondary: var(--nv-80); --text-muted: rgba(255,255,255,0.4);
 --accent: var(--s-70); --accent-strong: var(--s-50); --on-accent: #fff;
 --page-bg: #0a0e1a; --page-fg: var(--n-95); --page-fg-muted: var(--nv-80);
 --page-card-bg: var(--p-20); --page-divider: rgba(255,255,255,0.06);
}
[data-theme="light"] {
 --bg-base: var(--p-99); --bg-surface: #fff; --bg-surface-2: var(--p-95);
 --border: rgba(22,27,45,0.08);
 --text-primary: var(--p-20); --text-secondary: var(--n-50); --text-muted: var(--n-50);
 --accent: var(--p-40); --accent-strong: var(--s-40); --on-accent: #fff;
 --page-bg: var(--p-95); --page-fg: var(--p-20); --page-fg-muted: var(--n-50);
 --page-card-bg: #fff; --page-divider: rgba(22,27,45,0.08);
}

* { box-sizing: border-box; }
html, body { background: var(--page-bg); color: var(--page-fg); margin: 0; transition: background-color 220ms ease, color 220ms ease; }
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; min-height: 100vh; }

/* ============= PROTOTYPE CHROME ============= */
.proto-shell { display: grid; grid-template-columns: 280px 1fr; gap: 0; min-height: 100vh; }
@media (max-width: 1100px) {.proto-shell { grid-template-columns: 1fr; } }

.proto-sidebar { background: var(--page-card-bg); border-right: 1px solid var(--page-divider); padding: 28px 22px; position: sticky; top: 0; height: 100vh; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }
@media (max-width: 1100px) {.proto-sidebar { position: static; height: auto; max-height: 50vh; border-right: none; border-bottom: 1px solid var(--page-divider); } }
.proto-sidebar__brand { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
.proto-sidebar__mark { width: 36px; height: 36px; border-radius: 10px; background: var(--p-30); display: inline-flex; align-items: center; justify-content: center; }
.proto-sidebar__mark img { width: 70%; height: 70%; }
.proto-sidebar__name { font-weight: 700; font-size: 17px; letter-spacing: -0.01em; }
.proto-sidebar__pill { display: inline-flex; padding: 3px 9px; border-radius: 999px; background: linear-gradient(120deg, var(--s-50), var(--p-50), var(--t-50)); color: white; font-weight: 700; font-size: 9.5px; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.06em; text-transform: uppercase; }
.proto-sidebar__back { display: inline-flex; align-items: center; gap: 6px; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--page-fg-muted); text-decoration: none; margin-bottom: 4px; }
.proto-sidebar__back:hover { color: var(--page-accent, var(--s-70)); }

.proto-section-title { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--page-fg-muted); margin: 12px 0 6px; }

.proto-scrubber { display: flex; flex-direction: column; gap: 2px; }
.proto-scrubber__item { display: grid; grid-template-columns: 44px 1fr; gap: 8px; align-items: center; padding: 7px 10px; border-radius: 8px; cursor: pointer; transition: background 140ms ease; border: none; background: transparent; color: inherit; font-family: inherit; text-align: left; }
.proto-scrubber__item:hover { background: rgba(127,127,127,0.08); }
.proto-scrubber__item.is-active { background: var(--accent-strong); color: var(--on-accent); }
.proto-scrubber__item.is-active.proto-scrubber__id { color: rgba(255,255,255,0.85); }
.proto-scrubber__id { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 600; color: var(--page-fg-muted); letter-spacing: 0.06em; }
.proto-scrubber__name { font-size: 12.5px; font-weight: 500; }

.proto-sidebar__footer { margin-top: auto; padding-top: 16px; border-top: 1px solid var(--page-divider); font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--page-fg-muted); }
.proto-sidebar__footer a { color: var(--page-fg-muted); text-decoration: none; border-bottom: 1px dotted currentColor; }
.proto-sidebar__footer a:hover { color: var(--page-accent, var(--s-70)); }

.proto-theme-toggle { display: inline-flex; align-items: center; gap: 8px; padding: 7px 12px; border-radius: 8px; background: var(--bg-surface-2); border: 1px solid var(--border); color: var(--page-fg-muted); cursor: pointer; font-family: 'JetBrains Mono', monospace; font-size: 11px; align-self: flex-start; }
.proto-theme-toggle svg { width: 12px; height: 12px; }
[data-theme="dark"].proto-theme-toggle.icon-moon { display: none; }
[data-theme="light"].proto-theme-toggle.icon-sun { display: none; }

/* ============= STAGE ============= */
.proto-stage { display: flex; flex-direction: column; align-items: center; padding: 32px 24px 64px; gap: 18px; }

.proto-modebar { display: flex; align-items: center; gap: 10px; padding: 10px 16px; background: var(--page-card-bg); border: 1px solid var(--page-divider); border-radius: 12px; font-family: 'JetBrains Mono', monospace; font-size: 11.5px; color: var(--page-fg-muted); flex-wrap: wrap; justify-content: center; }
.proto-modebar__pill { display: inline-flex; padding: 3px 9px; border-radius: 999px; background: var(--bg-surface-2); color: var(--page-fg-muted); }
.proto-modebar__id { color: var(--page-fg); font-weight: 700; letter-spacing: 0.06em; }
.proto-modebar__bar { width: 100px; height: 4px; border-radius: 4px; background: var(--bg-surface-2); position: relative; overflow: hidden; }
.proto-modebar__bar__fill { position: absolute; left: 0; top: 0; bottom: 0; background: linear-gradient(90deg, var(--s-50), var(--t-50)); transition: width 240ms ease; }
.proto-arrows { display: flex; align-items: center; gap: 8px; }
.proto-arrow { width: 36px; height: 36px; border-radius: 10px; background: var(--page-card-bg); border: 1px solid var(--page-divider); color: var(--page-fg-muted); display: inline-flex; align-items: center; justify-content: center; cursor: pointer; }
.proto-arrow:hover { background: var(--bg-surface-2); color: var(--page-fg); }
.proto-arrow:disabled { opacity: 0.3; cursor: not-allowed; }
.proto-arrow svg { width: 18px; height: 18px; }

/* ============= BROWSER FRAME ============= */
.browser {
 width: 100%; max-width: 1280px;
 background: var(--bg-base);
 border-radius: 18px;
 overflow: hidden;
 border: 1px solid var(--border);
 box-shadow: 0 24px 60px -20px rgba(0,0,0,0.45), 0 8px 24px -12px rgba(0,0,0,0.25);
}
[data-theme="light"].browser { box-shadow: 0 24px 60px -20px rgba(22,27,45,0.18), 0 8px 24px -12px rgba(22,27,45,0.08); }

.browser__chrome {
 display: flex; align-items: center; gap: 14px;
 padding: 12px 16px;
 background: var(--p-20);
 border-bottom: 1px solid var(--border);
}
[data-theme="light"].browser__chrome { background: var(--n-95); }
.browser__dots { display: inline-flex; gap: 7px; flex-shrink: 0; }
.browser__dot { width: 11px; height: 11px; border-radius: 50%; }
.browser__dot:nth-child(1) { background: #FF5F57; }.browser__dot:nth-child(2) { background: #FEBC2E; }.browser__dot:nth-child(3) { background: #28C840; }
.browser__url {
 flex: 1; background: var(--bg-base); border: 1px solid var(--border); border-radius: 7px;
 padding: 6px 14px; font-family: 'JetBrains Mono', monospace; font-size: 12px;
 color: var(--text-secondary); text-align: center;
 display: flex; align-items: center; justify-content: center; gap: 8px;
}
.browser__url svg { width: 12px; height: 12px; opacity: 0.7; flex-shrink: 0; }

.browser__viewport {
 background: var(--bg-base); min-height: 760px; position: relative; color: var(--text-primary);
}

/* ============= ONBOARDING-STAGE (inner page chrome) ============= */
.ob-stage {
 display: flex; flex-direction: column; min-height: 760px;
}
.ob-stage__nav {
 display: flex; align-items: center; justify-content: space-between;
 padding: 20px 40px; border-bottom: 1px solid var(--border);
}
.ob-stage__brand { display: inline-flex; align-items: center; gap: 10px; font-weight: 700; font-size: 15px; letter-spacing: -0.01em; color: var(--text-primary); }
.ob-stage__brand img { width: 22px; height: 22px; }
[data-theme="light"].ob-stage__brand img { filter: invert(1) brightness(0.3); }
.ob-stage__nav-right { display: flex; align-items: center; gap: 14px; }
.ob-stage__progress-tag {
 padding: 6px 12px; border-radius: 999px;
 background: var(--bg-surface); border: 1px solid var(--border);
 font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-secondary);
 letter-spacing: 0.04em;
}
.gc-crisis-pill {
 display: inline-flex; align-items: center; gap: 6px;
 padding: 8px 14px; border-radius: 999px;
 background: var(--e-50); color: white;
 border: none; font-family: inherit; font-size: 12.5px; font-weight: 600; cursor: pointer;
}
.gc-crisis-pill svg { width: 13px; height: 13px; flex-shrink: 0; }

.ob-stage__body {
 flex: 1; padding: 48px 40px;
 display: flex; flex-direction: column; align-items: center;
 gap: 28px;
}

/* ============= ON1 WELCOME (2-col split) ============= */
.welcome-split {
 display: grid; grid-template-columns: 1fr 1.3fr; gap: 56px;
 max-width: 1040px; width: 100%; align-items: center;
}
.welcome-anna { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 14px; }
.welcome-anna-stage {
 position: relative; width: 280px; height: 280px;
 display: flex; align-items: center; justify-content: center;
}
.welcome-anna-orb {
 position: absolute; border-radius: 50%;
 background: radial-gradient(circle at 30% 30%, var(--s-50), transparent 70%);
 opacity: 0.18; animation: orb-drift 8s ease-in-out infinite;
}
.welcome-anna-orb--1 { width: 220px; height: 220px; top: 10px; left: 10px; }
.welcome-anna-orb--2 { width: 180px; height: 180px; top: 50px; right: 0; animation-delay: -2s; background: radial-gradient(circle at 30% 30%, var(--t-50), transparent 70%); }
.welcome-anna-orb--3 { width: 150px; height: 150px; bottom: 20px; left: 30px; animation-delay: -4s; background: radial-gradient(circle at 30% 30%, var(--p-50), transparent 70%); }
@keyframes orb-drift { 0%,100% { transform: translate(0,0); } 50% { transform: translate(10px, -10px); } }
.welcome-anna-avatar {
 position: relative;
 width: 128px; height: 128px;
 border-radius: 36px;
 background: linear-gradient(135deg, var(--s-30), var(--p-20));
 display: inline-flex; align-items: center; justify-content: center;
 z-index: 2;
}
.welcome-anna-avatar img { width: 56%; height: 56%; }
.welcome-anna-avatar__pulse { position: absolute; inset: -10px; border-radius: 44px; border: 2px solid var(--s-50); opacity: 0.5; animation: ob-pulse 2.6s ease-in-out infinite; }
.welcome-anna-avatar__pulse--2 { animation-delay: -1.3s; opacity: 0.3; inset: -20px; border-radius: 52px; }
@keyframes ob-pulse { 0%,100% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.06); opacity: 0.15; } }
.welcome-anna-chip {
 position: absolute; padding: 5px 12px; border-radius: 999px;
 background: var(--bg-surface); border: 1px solid var(--border); color: var(--text-primary);
 font-size: 12px; font-weight: 500; box-shadow: 0 6px 16px -8px rgba(0,0,0,0.3);
 animation: chip-bob 4s ease-in-out infinite; z-index: 3;
}
.welcome-anna-chip--1 { top: 30px; right: -10px; animation-delay: 0s; }
.welcome-anna-chip--2 { bottom: 70px; left: -20px; animation-delay: -1.5s; }
.welcome-anna-chip--3 { bottom: 30px; right: 10px; animation-delay: -3s; font-family: 'JetBrains Mono', monospace; }
@keyframes chip-bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
.welcome-anna-name { font-weight: 700; font-size: 16px; }
.welcome-anna-sub { font-size: 12.5px; color: var(--text-secondary); }

.welcome-form { display: flex; flex-direction: column; gap: 16px; }
.welcome-heading { font-size: 32px; font-weight: 800; letter-spacing: -0.02em; line-height: 1.15; margin: 4px 0 0; }
.welcome-sub { font-size: 14px; color: var(--text-secondary); margin: 0; }
.welcome-list { list-style: none; padding: 0; margin: 4px 0; display: flex; flex-direction: column; gap: 8px; }
.welcome-list li { display: grid; grid-template-columns: 32px 1fr; gap: 14px; align-items: center; padding: 12px 16px; background: var(--bg-surface); border: 1px solid var(--border); border-radius: 12px; }
.welcome-list__num { width: 32px; height: 32px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 13px; background: var(--accent-strong); color: var(--on-accent); }
.welcome-list__title { font-weight: 600; font-size: 14.5px; color: var(--text-primary); }
.welcome-list__desc { font-size: 12.5px; color: var(--text-secondary); margin-top: 1px; }

/* ============= QUIZ PROGRESS STRIP ============= */
.quiz-progress {
 display: flex; align-items: center; gap: 6px;
 padding: 0; margin: 0 auto; max-width: 720px;
}
.quiz-progress__step {
 flex: 1; display: inline-flex; align-items: center; gap: 8px;
 padding: 9px 14px; border-radius: 10px;
 background: var(--bg-surface); border: 1px solid var(--border);
 font-size: 12px; font-weight: 500; color: var(--text-secondary);
 white-space: nowrap;
}
.quiz-progress__step.is-done { background: var(--t-20); border-color: transparent; color: var(--t-80); }
[data-theme="light"].quiz-progress__step.is-done { background: var(--t-90); color: var(--t-30); }
.quiz-progress__step.is-current { background: var(--accent-strong); border-color: transparent; color: var(--on-accent); font-weight: 600; }
.quiz-progress__num { width: 22px; height: 22px; border-radius: 50%; background: rgba(0,0,0,0.18); display: inline-flex; align-items: center; justify-content: center; font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 700; flex-shrink: 0; }
.quiz-progress__step.is-current.quiz-progress__num { background: rgba(255,255,255,0.22); color: white; }
.quiz-progress__step.is-done.quiz-progress__num { background: rgba(57,153,113,0.25); color: var(--t-50); }

/* ============= QUIZ Q CARD ============= */
.quiz-stage {
 display: flex; flex-direction: column; gap: 18px;
 max-width: 720px; width: 100%; margin: 0 auto;
}
.gc-card { padding: 18px 20px; background: var(--bg-surface); border: 1px solid var(--border); border-radius: 14px; display: flex; gap: 12px; }
.gc-card--anna { background: linear-gradient(135deg, rgba(133,118,194,0.12), rgba(83,71,146,0.06)); border-color: rgba(133,118,194,0.25); flex-direction: row; align-items: flex-start; }
.gc-card--anna.gc-avatar--anna { width: 36px; height: 36px; border-radius: 50%; background: var(--p-30); display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
.gc-card--anna.gc-avatar--anna img { width: 60%; height: 60%; }
.gc-card--anna.anna-name { font-weight: 700; font-size: 14px; letter-spacing: -0.01em; margin-bottom: 2px; }
.gc-card--anna p { font-size: 14px; line-height: 1.55; margin: 0; color: var(--text-primary); }

.quiz-question { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 14px; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
.quiz-question__num { font-family: 'JetBrains Mono', monospace; font-size: 11.5px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); }
.quiz-question__title { font-size: 22px; font-weight: 700; line-height: 1.3; letter-spacing: -0.015em; margin: 0; color: var(--text-primary); }

.quiz-scale { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
.quiz-scale__opt { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; padding: 16px 12px; background: var(--bg-base); border: 1px solid var(--border); border-radius: 12px; cursor: pointer; font-family: inherit; color: var(--text-primary); transition: all 140ms ease; }
.quiz-scale__opt:hover { border-color: var(--accent); background: rgba(127,127,127,0.04); }
.quiz-scale__opt.is-on { background: var(--accent-strong); color: var(--on-accent); border-color: var(--accent-strong); }
.quiz-scale__num { font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 700; }
.quiz-scale__label { font-size: 12px; font-weight: 500; text-align: center; }

.quiz-choices { display: flex; flex-direction: column; gap: 8px; }
.quiz-choice { padding: 14px 18px; background: var(--bg-base); border: 1px solid var(--border); border-radius: 12px; font-family: inherit; font-size: 15px; font-weight: 500; color: var(--text-primary); text-align: left; cursor: pointer; transition: background 140ms ease; }
.quiz-choice:hover { background: rgba(127,127,127,0.04); border-color: var(--accent); }
.quiz-choice.is-on { background: var(--accent-strong); color: var(--on-accent); border-color: var(--accent-strong); font-weight: 600; }

.quiz-checks { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
@media (max-width: 800px) {.quiz-checks { grid-template-columns: 1fr; } }
.quiz-check { display: flex; align-items: center; gap: 11px; padding: 12px 16px; background: var(--bg-base); border: 1px solid var(--border); border-radius: 12px; font-size: 14px; color: var(--text-primary); cursor: pointer; transition: background 140ms ease; }
.quiz-check:hover { background: rgba(127,127,127,0.04); border-color: var(--accent); }
.quiz-check.is-on { background: var(--accent-strong); color: var(--on-accent); border-color: var(--accent-strong); }
.gc-checkbox { width: 18px; height: 18px; border-radius: 5px; border: 1.5px solid currentColor; flex-shrink: 0; display: inline-flex; align-items: center; justify-content: center; }
.quiz-check.is-on.gc-checkbox { background: white; border-color: white; color: var(--accent-strong); }
.quiz-check.is-on.gc-checkbox::after { content: '✓'; font-size: 12px; font-weight: 700; }

.quiz-text { display: flex; flex-direction: column; gap: 6px; }
.quiz-text input { padding: 14px 16px; background: var(--bg-base); border: 1px solid var(--border); border-radius: 12px; font-family: inherit; font-size: 16px; color: var(--text-primary); }
.quiz-text input:focus { outline: none; border-color: var(--accent-strong); }
.quiz-text.hint { font-size: 12.5px; color: var(--text-secondary); }

.quiz-actions { display: flex; gap: 10px; align-items: center; justify-content: flex-end; padding-top: 8px; }

/* ============= BUTTONS ============= */
.gc-btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 12px 22px; border-radius: 12px; font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer; border: 1px solid transparent; transition: transform 120ms ease, background-color 160ms ease, border-color 160ms ease; }
.gc-btn:active { transform: scale(0.98); }
.gc-btn--primary { background: var(--accent-strong); color: var(--on-accent); }
.gc-btn--primary:hover { background: var(--s-40); }
[data-theme="light"].gc-btn--primary:hover { background: var(--s-30); }
.gc-btn--ghost { background: transparent; color: var(--text-primary); border-color: var(--border); }
.gc-btn--ghost:hover { background: rgba(127,127,127,0.06); border-color: rgba(127,127,127,0.18); }
.gc-btn--ghost:disabled { opacity: 0.35; cursor: not-allowed; }
.gc-btn--lg { padding: 14px 28px; font-size: 15px; border-radius: 14px; }
.gc-btn--full { width: 100%; }

/* ============= PROFILE HERO (ON7) ============= */
.profile-hero { background: linear-gradient(135deg, var(--s-40), var(--p-50)); color: white; padding: 32px 36px; border-radius: 18px; display: flex; flex-direction: column; gap: 8px; position: relative; overflow: hidden; max-width: 720px; margin: 0 auto; width: 100%; }
.profile-hero__kicker { font-family: 'JetBrains Mono', monospace; font-size: 11.5px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; opacity: 0.85; }
.profile-hero__name { font-size: 44px; font-weight: 800; letter-spacing: -0.025em; margin: 0; line-height: 1; }
.profile-hero__sub { font-size: 15px; line-height: 1.55; margin: 4px 0 0; opacity: 0.92; }
.profile-hero__chips { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
.profile-hero__chip { background: rgba(0,0,0,0.22); padding: 5px 13px; border-radius: 999px; font-size: 12px; font-weight: 600; }

.result-item__t { font-weight: 600; font-size: 14px; color: var(--text-primary); }
.result-item__s { font-size: 12.5px; color: var(--text-secondary); margin-top: 2px; }

/* ============= KYC ============= */
.kyc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; max-width: 880px; margin: 0 auto; width: 100%; align-items: start; }

.kyc-field input { padding: 12px 14px; background: var(--bg-base); border: 1px solid var(--border); border-radius: 11px; font-family: inherit; font-size: 14.5px; color: var(--text-primary); }
.vendor-badge { display: inline-flex; align-items: center; gap: 7px; font-size: 12px; color: var(--text-secondary); padding: 8px 12px; background: var(--bg-base); border-radius: 8px; border: 1px solid var(--border); align-self: flex-start; }

.kyc-camera-stage {

 display: flex; flex-direction: column; align-items: center; gap: 18px;
 max-width: 520px; margin: 0 auto; width: 100%;
}
.kyc-camera-frame {
 width: 100%; aspect-ratio: 1.55; border: 3px dashed var(--t-60); border-radius: 16px;
 background: linear-gradient(135deg, #1a3052, #0e1f3a);

}
.kyc-camera-caption { display: inline-flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-secondary); }
.kyc-camera-caption::before { content: ''; width: 8px; height: 8px; border-radius: 50%; background: var(--t-50); }

.kyc-liveness-stage { display: flex; flex-direction: column; align-items: center; gap: 22px; max-width: 520px; margin: 0 auto; width: 100%; }
.kyc-oval { width: 220px; height: 280px; border-radius: 50%/55%; border: 4px solid var(--s-50); background: linear-gradient(135deg, var(--p-20), var(--s-20)); display: flex; align-items: center; justify-content: center; position: relative; }
.kyc-oval__face { position: relative; width: 80%; height: 80%; }
.kyc-oval__eye { position: absolute; top: 35%; width: 10px; height: 10px; border-radius: 50%; background: white; }
.kyc-oval__mouth { position: absolute; top: 60%; left: 50%; transform: translateX(-50%); width: 30%; height: 7px; border-radius: 0 0 16px 16px; background: rgba(255,255,255,0.6); }
.kyc-liveness-steps { display: flex; gap: 8px; }
.kyc-liveness-step { padding: 8px 14px; border-radius: 999px; font-size: 12.5px; font-family: 'JetBrains Mono', monospace; color: var(--text-secondary); background: var(--bg-surface); border: 1px solid var(--border); }
.kyc-liveness-step.is-done { background: var(--t-20); color: var(--t-80); border-color: transparent; }

.bank-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; max-width: 920px; margin: 0 auto; width: 100%; align-items: start; }

.bank-explain-list { display: flex; flex-direction: column; gap: 10px; }
.bank-explain { display: grid; grid-template-columns: 44px 1fr; gap: 14px; align-items: center; padding: 14px 16px; background: var(--bg-surface); border: 1px solid var(--border); border-radius: 12px; }

.bank-explain__t { font-weight: 600; font-size: 14.5px; color: var(--text-primary); }
.bank-explain__s { font-size: 12.5px; color: var(--text-secondary); margin-top: 1px; }

.bank-list { display: flex; flex-direction: column; gap: 8px; }

.bank-row__name { font-weight: 600; font-size: 15px; color: inherit; }

 display: flex; flex-direction: column; align-items: center; gap: 18px;
 padding: 40px 24px; max-width: 520px; margin: 0 auto; width: 100%;
 border-radius: 18px; cursor: pointer; transition: transform 160ms ease, border-color 160ms ease;
 background: var(--bg-surface); border: 1px solid var(--border);
}

.connecting-logo-wrap { position: relative; width: 96px; height: 96px; display: inline-flex; align-items: center; justify-content: center; }

.bank-summary__stat-l { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

.suit-status { display: inline-flex; align-items: center; gap: 8px; padding: 6px 16px 6px 8px; border-radius: 999px; font-size: 12px; font-weight: 700; }

/* ============= DECISION CALLOUT ============= */
.decision-callout { padding: 14px 18px; background: rgba(133,118,194,0.10); border: 1px solid rgba(133,118,194,0.28); border-radius: 12px; font-size: 13px; color: var(--text-secondary); line-height: 1.55; max-width: 720px; margin: 0 auto; width: 100%; }

/* ============= SPONSOR ============= */

/* ============= CONTEXT PANEL ============= */
.proto-context { width: 100%; max-width: 1280px; padding: 16px 20px; background: var(--page-card-bg); border: 1px solid var(--page-divider); border-radius: 12px; font-size: 13px; color: var(--page-fg-muted); line-height: 1.55; }

.screen { animation: fade-in 220ms ease; }
@keyframes fade-in { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

/* ----- PROGRESS STRIP (5 sections) ----- */
const PROGRESS_STRIP = (currentSection, done = []) => {
 const names = ['Demographics', 'Severity', 'Situation', 'Patterns', 'Help'];
 let html = '<div class="quiz-progress">';
 for (let i = 1; i <= 5; i++) {

 html += `<span class="quiz-progress__step${cls}"><span class="quiz-progress__num">${done.includes(i) ? '✓' : i}</span><span>${names[i-1]}</span></span>`;
 }
 html += '</div>';
 return html;
};

function buildQuiz(q, step) {
 const done = [];
 for (let i = 1; i < q.section; i++) done.push(i);
 const progress = PROGRESS_STRIP(q.section, done);

 let answer = '';
 if (q.kind === 'text') {
 answer = `<div class="quiz-text"><input type="text" placeholder="${q.placeholder || ''}" value="${q.value || ''}"><span class="hint">${q.hint || ''}</span></div>`;
 } else if (q.kind === 'choice') {
 answer = '<div class="quiz-choices">';
 q.options.forEach((opt, i) => {
 answer += `<button class="quiz-choice${i === q.on ? ' is-on' : ''}" onclick="pickOne(this)">${opt}</button>`;
 });
 answer += '</div>';
 } else if (q.kind === 'scale') {
 answer = '<div class="quiz-scale">';
 q.options.forEach((opt, i) => {
 answer += `<button class="quiz-scale__opt${i === q.on ? ' is-on' : ''}" onclick="pickOne(this)"><span class="quiz-scale__num">${i}</span><span class="quiz-scale__label">${opt}</span></button>`;
 });
 answer += '</div>';
 } else if (q.kind === 'checks') {
 answer = '<div class="quiz-checks">';
 q.options.forEach((opt, i) => {
 const on = (Array.isArray(q.on) && q.on.includes(i)) ? ' is-on' : '';
 answer += `<label class="quiz-check${on}" onclick="toggleCheck(this)"><span class="gc-checkbox"></span>${opt}</label>`;
 });
 answer += '</div>';
 }

 return `
 ${shellNav(step)}
 <div class="ob-stage__body">
 ${progress}
 <div class="quiz-stage">
 ${ANNA(q.anna)}
 <div class="quiz-question">
 <div>
 <span class="quiz-question__num">Question ${q.q} of ${q.of}</span>
 <h4 class="quiz-question__title" style="margin-top:6px">${q.qText}</h4>
 </div>
 ${answer}
 <div class="quiz-actions">
 <button class="gc-btn gc-btn--ghost" onclick="prev()">← Back</button>
 <button class="gc-btn gc-btn--primary" onclick="next()">${q.nextLabel || 'Next →'}</button>
 </div>
 </div>
 </div>
 </div>`;
}

const builders = { on1: buildON1, sponsor: buildSponsor, on7: buildON7, on8: buildON8, on9: buildON9, on10: buildON10, on11: buildON11, on12: buildON12, on13: buildON13, on14: buildON14, on15: buildON15, on16: buildON16 };

/* ----- STATE + NAV ----- */
let idx = 0;

function render() {
 const screen = SCREENS[idx];
 let html;
 if (screen.kind === 'quiz') html = buildQuiz(screen.data, screen.step);
 else html = builders[screen.kind](screen.step);

 document.getElementById('viewport').innerHTML = `<div class="ob-stage screen">${html}</div>`;
 document.getElementById('browserUrl').textContent = 'app.gaimcontrol.com' + (screen.url || (screen.kind === 'quiz' ? screen.data.url : '/onboarding/welcome'));
 document.getElementById('screenId').textContent = screen.id;
 document.getElementById('screenName').textContent = screen.name;
 document.getElementById('progressFill').style.width = ((idx + 1) / SCREENS.length * 100) + '%';
 document.getElementById('navPrev').disabled = idx === 0;
 document.getElementById('navNext').disabled = idx === SCREENS.length - 1;

 document.querySelectorAll('.proto-scrubber__item').forEach((el, i) => {
 el.classList.toggle('is-active', i === idx);
 if (i === idx) el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
 });

 const k = screen.kind === 'quiz' ? null : screen.kind;
 let ctxHtml;
 if (k && CTX[k]) ctxHtml = CTX[k];
 else if (k === 'on9' || k === 'on10' || k === 'on11') ctxHtml = CTX.on8;
 else if (k === 'on14' || k === 'on15') ctxHtml = '<strong>Bank link · TrueLayer.</strong> Read-only consent, 90-day window, auto-refresh weekly. Yapily is the backup AISP if TrueLayer fails.';
 else ctxHtml = `<strong>${screen.name}</strong>. one question per screen, 4-col PGSI scale on desktop, Back / Next at bottom. All content pulled verbatim from web-ui/05.`;
 document.getElementById('contextBody').innerHTML = ctxHtml;
}

function next() { if (idx < SCREENS.length - 1) { idx++; render(); } }
function prev() { if (idx > 0) { idx--; render(); } }
function go(i) { idx = i; render(); }
function restart() { idx = 0; render(); }

function pickOne(el) {
 const parent = el.parentElement;
 parent.querySelectorAll('.is-on').forEach(s => s.classList.remove('is-on'));
 el.classList.add('is-on');
}
function toggleCheck(el) {
 el.classList.toggle('is-on');
}
function pickBank(el, name) {
 pickOne(el);
 const cta = document.getElementById('connectCta');
 if (cta) cta.textContent = `Connect ${name} →`;
}

function buildScrubber() {
 const nav = document.getElementById('scrubber');
 SCREENS.forEach((s, i) => {
 const btn = document.createElement('button');
 btn.className = 'proto-scrubber__item';
 btn.innerHTML = `<span class="proto-scrubber__id">${s.id}</span><span class="proto-scrubber__name">${s.name}</span>`;
 btn.addEventListener('click', () => go(i));
 nav.appendChild(btn);
 });
}

function initTheme() {
 const root = document.documentElement;
 const stored = localStorage.getItem('gc-proto-theme');
 const initial = stored || 'dark';
 root.setAttribute('data-theme', initial);
 document.querySelector('.theme-label').textContent = initial === 'dark' ? 'Dark' : 'Light';
 document.querySelector('.proto-theme-toggle').addEventListener('click', () => {
 const next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
 root.setAttribute('data-theme', next);
 document.querySelector('.theme-label').textContent = next === 'dark' ? 'Dark' : 'Light';
 try { localStorage.setItem('gc-proto-theme', next); } catch(e) {}
 });
}

document.getElementById('navPrev').addEventListener('click', prev);
document.getElementById('navNext').addEventListener('click', next);
document.addEventListener('keydown', (e) => {
 if (e.key === 'ArrowRight') next();
 if (e.key === 'ArrowLeft') prev();
});

buildScrubber();
initTheme();
render();
</script>
