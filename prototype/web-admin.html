<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Holdwell · Web · §13 Admin console</title>
<link rel="icon" href="../assets/gc-favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
 --p-10:#0B0F1C;--p-20:#161B2D;--p-30:#20273C;--p-40:#354872;--p-50:#4D608C;--p-60:#6B7DA6;--p-90:#DCE2F0;--p-95:#ECF0F9;--p-99:#FAFBFE;--p-100:#FFF;
 --s-10:#28215A;--s-20:#3E3478;--s-30:#534792;--s-40:#6B5DAC;--s-50:#8576C2;--s-70:#B5ACDF;--s-80:#CFC8EA;--s-90:#E8E4F4;
 --t-20:#1A6047;--t-30:#1F7058;--t-50:#399971;--t-60:#5BB088;--t-80:#ADDCC2;--t-90:#D5EDDF;
 --w-30:#6B4500;--w-60:#C28200;--w-80:#FAB44A;--w-90:#FFDFA8;
 --e-30:#7A1F1F;--e-50:#C73838;--e-80:#F4A4A4;--e-90:#FBD9D9;
 --n-50:#76798A;--n-80:#C5C8D2;--n-95:#F1F2F5;--nv-80:#C5C9DD;
}
[data-theme="dark"] { --bg-base: var(--p-30); --bg-surface: var(--p-20); --bg-surface-2: var(--p-10); --border: rgba(255,255,255,0.08); --border-strong: rgba(255,255,255,0.14); --text-primary: var(--n-95); --text-secondary: var(--nv-80); --text-muted: rgba(255,255,255,0.4); --accent: var(--s-70); --accent-strong: var(--s-50); --on-accent: #fff; --page-bg: #0a0e1a; --page-fg: var(--n-95); --page-fg-muted: var(--nv-80); --page-card-bg: var(--p-20); --page-divider: rgba(255,255,255,0.06); }
[data-theme="light"] { --bg-base: var(--p-99); --bg-surface: #fff; --bg-surface-2: var(--p-95); --border: rgba(22,27,45,0.08); --border-strong: rgba(22,27,45,0.16); --text-primary: var(--p-20); --text-secondary: var(--n-50); --text-muted: var(--n-50); --accent: var(--p-40); --accent-strong: var(--s-40); --on-accent: #fff; --page-bg: var(--p-95); --page-fg: var(--p-20); --page-fg-muted: var(--n-50); --page-card-bg: #fff; --page-divider: rgba(22,27,45,0.08); }
* { box-sizing: border-box; }
html, body { background: var(--page-bg); color: var(--page-fg); margin: 0; transition: background-color 220ms ease, color 220ms ease; }
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; min-height: 100vh; }

.proto-shell { display: grid; grid-template-columns: 280px 1fr; gap: 0; min-height: 100vh; }
@media (max-width: 1100px) {.proto-shell { grid-template-columns: 1fr; } }
.proto-sidebar { background: var(--page-card-bg); border-right: 1px solid var(--page-divider); padding: 28px 22px; position: sticky; top: 0; height: 100vh; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }
@media (max-width: 1100px) {.proto-sidebar { position: static; height: auto; max-height: 50vh; border-right: none; border-bottom: 1px solid var(--page-divider); } }
.proto-sidebar__brand { display: flex; align-items: center; gap: 10px; }
.proto-sidebar__mark { width: 36px; height: 36px; border-radius: 10px; background: var(--p-30); display: inline-flex; align-items: center; justify-content: center; }
.proto-sidebar__mark img { width: 70%; height: 70%; }
.proto-sidebar__name { font-weight: 700; font-size: 17px; letter-spacing: -0.01em; }
.proto-sidebar__pill { display: inline-flex; padding: 3px 9px; border-radius: 999px; background: linear-gradient(120deg, var(--s-50), var(--p-50), var(--t-50)); color: white; font-weight: 700; font-size: 9.5px; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.06em; text-transform: uppercase; }
.proto-sidebar__back { display: inline-flex; align-items: center; gap: 6px; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--page-fg-muted); text-decoration: none; }
.proto-section-title { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--page-fg-muted); margin: 12px 0 6px; }
.proto-scrubber { display: flex; flex-direction: column; gap: 2px; }
.proto-scrubber__item { display: grid; grid-template-columns: 44px 1fr; gap: 8px; align-items: center; padding: 7px 10px; border-radius: 8px; cursor: pointer; border: none; background: transparent; color: inherit; font-family: inherit; text-align: left; }
.proto-scrubber__item:hover { background: rgba(127,127,127,0.08); }
.proto-scrubber__item.is-active { background: var(--accent-strong); color: var(--on-accent); }
.proto-scrubber__item.is-active.proto-scrubber__id { color: rgba(255,255,255,0.85); }
.proto-scrubber__id { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 600; color: var(--page-fg-muted); letter-spacing: 0.06em; }
.proto-scrubber__name { font-size: 12.5px; font-weight: 500; }
.proto-sidebar__footer { margin-top: auto; padding-top: 16px; border-top: 1px solid var(--page-divider); font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--page-fg-muted); }
.proto-sidebar__footer a { color: var(--page-fg-muted); text-decoration: none; border-bottom: 1px dotted currentColor; }
.proto-theme-toggle { display: inline-flex; align-items: center; gap: 8px; padding: 7px 12px; border-radius: 8px; background: var(--bg-surface-2); border: 1px solid var(--border); color: var(--page-fg-muted); cursor: pointer; font-family: 'JetBrains Mono', monospace; font-size: 11px; align-self: flex-start; }
.proto-theme-toggle svg { width: 12px; height: 12px; }
[data-theme="dark"].proto-theme-toggle.icon-moon { display: none; }
[data-theme="light"].proto-theme-toggle.icon-sun { display: none; }

.proto-stage { display: flex; flex-direction: column; align-items: center; padding: 32px 24px 64px; gap: 18px; }
.proto-modebar { display: flex; align-items: center; gap: 10px; padding: 10px 16px; background: var(--page-card-bg); border: 1px solid var(--page-divider); border-radius: 12px; font-family: 'JetBrains Mono', monospace; font-size: 11.5px; color: var(--page-fg-muted); flex-wrap: wrap; justify-content: center; }
.proto-modebar__pill { display: inline-flex; padding: 3px 9px; border-radius: 999px; background: var(--bg-surface-2); }
.proto-modebar__id { color: var(--page-fg); font-weight: 700; letter-spacing: 0.06em; }
.proto-modebar__bar { width: 100px; height: 4px; border-radius: 4px; background: var(--bg-surface-2); position: relative; overflow: hidden; }
.proto-modebar__bar__fill { position: absolute; left: 0; top: 0; bottom: 0; background: linear-gradient(90deg, var(--s-50), var(--t-50)); transition: width 240ms ease; }
.proto-arrows { display: flex; align-items: center; gap: 8px; }
.proto-arrow { width: 36px; height: 36px; border-radius: 10px; background: var(--page-card-bg); border: 1px solid var(--page-divider); color: var(--page-fg-muted); display: inline-flex; align-items: center; justify-content: center; cursor: pointer; }
.proto-arrow:hover { background: var(--bg-surface-2); color: var(--page-fg); }
.proto-arrow:disabled { opacity: 0.3; cursor: not-allowed; }
.proto-arrow svg { width: 18px; height: 18px; }

/* Admin browser frame */
.browser { width: 100%; max-width: 1380px; background: var(--bg-base); border-radius: 18px; overflow: hidden; border: 1px solid var(--border); box-shadow: 0 24px 60px -20px rgba(0,0,0,0.45), 0 8px 24px -12px rgba(0,0,0,0.25); }
[data-theme="light"].browser { box-shadow: 0 24px 60px -20px rgba(22,27,45,0.18), 0 8px 24px -12px rgba(22,27,45,0.08); }
.browser__chrome { display: flex; align-items: center; gap: 14px; padding: 12px 16px; background: var(--p-20); border-bottom: 1px solid var(--border); }
[data-theme="light"].browser__chrome { background: var(--n-95); }
.browser__dots { display: inline-flex; gap: 7px; flex-shrink: 0; }
.browser__dot { width: 11px; height: 11px; border-radius: 50%; }
.browser__dot:nth-child(1) { background: #FF5F57; }.browser__dot:nth-child(2) { background: #FEBC2E; }.browser__dot:nth-child(3) { background: #28C840; }
.browser__url { flex: 1; background: var(--bg-base); border: 1px solid var(--border); border-radius: 7px; padding: 6px 14px; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--w-80); text-align: center; display: flex; align-items: center; justify-content: center; gap: 8px; }
.browser__url svg { width: 12px; height: 12px; opacity: 0.7; flex-shrink: 0; }
.browser__viewport { background: var(--bg-base); min-height: 820px; max-height: 820px; position: relative; color: var(--text-primary); display: grid; grid-template-columns: 240px 1fr; }

/* Admin sidebar / nav */
.ad-nav { background: var(--bg-surface); border-right: 1px solid var(--border); padding: 16px 12px; display: flex; flex-direction: column; gap: 8px; }
[data-theme="light"].ad-nav { background: var(--bg-surface-2); border-right: 1px solid rgba(22,27,45,0.12); }
.ad-nav__brand { display: flex; align-items: center; gap: 10px; padding: 4px 8px 14px; border-bottom: 1px solid var(--border); margin-bottom: 4px; }
.ad-nav__mark { width: 30px; height: 30px; border-radius: 7px; background: var(--w-60); display: inline-flex; align-items: center; justify-content: center; color: white; font-family: 'JetBrains Mono', monospace; font-weight: 800; font-size: 14px; }
.ad-nav__name { font-weight: 700; font-size: 14px; letter-spacing: -0.01em; line-height: 1.1; }
.ad-nav__sub { font-family: 'JetBrains Mono', monospace; font-size: 9.5px; color: var(--text-muted); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 2px; display: block; }
.ad-nav__user { display: flex; align-items: center; gap: 9px; padding: 8px 10px; border-radius: 8px; background: var(--bg-base); }
.ad-nav__avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--p-40); color: white; display: inline-flex; align-items: center; justify-content: center; font-weight: 700; font-size: 11px; }
.ad-nav__user-name { font-size: 12px; font-weight: 600; }
.ad-nav__user-role { font-family: 'JetBrains Mono', monospace; font-size: 9.5px; color: var(--w-80); padding: 1px 6px; border-radius: 4px; background: var(--w-30); display: inline-block; margin-top: 2px; letter-spacing: 0.05em; font-weight: 700; }
[data-theme="light"].ad-nav__user-role { background: var(--w-90); color: var(--w-30); }
.ad-nav__section { font-family: 'JetBrains Mono', monospace; font-size: 9.5px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); padding: 8px 10px 4px; }
.ad-nav__item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 7px; cursor: pointer; color: var(--text-secondary); text-decoration: none; font-size: 13px; font-weight: 500; }
.ad-nav__item:hover { background: var(--bg-base); color: var(--text-primary); }
.ad-nav__item.is-on { background: var(--w-30); color: var(--w-80); font-weight: 600; }
[data-theme="light"].ad-nav__item.is-on { background: var(--w-90); color: var(--w-30); }
.ad-nav__item svg { width: 15px; height: 15px; flex-shrink: 0; }
.ad-nav__item__count { margin-left: auto; font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 999px; background: var(--bg-surface-2); }
.ad-nav__item.is-on.ad-nav__item__count { background: rgba(255,255,255,0.18); color: white; }
.ad-nav__item__count--danger { background: var(--e-50); color: white; }
.ad-nav__cmd-k { margin-top: auto; padding: 8px 10px; background: var(--bg-base); border: 1px solid var(--border); border-radius: 7px; display: flex; align-items: center; gap: 8px; cursor: pointer; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-muted); }
.ad-nav__cmd-k svg { width: 12px; height: 12px; }
.ad-nav__cmd-k kbd { margin-left: auto; padding: 1px 6px; border-radius: 4px; background: var(--bg-surface-2); font-family: inherit; font-size: 10px; }

/* Main content */
.ad-main { padding: 0; overflow-y: auto; max-height: 820px; display: flex; flex-direction: column; }
.ad-main::-webkit-scrollbar { width: 6px; }
.ad-main::-webkit-scrollbar-thumb { background: rgba(127,127,127,0.2); border-radius: 6px; }
.ad-topbar { display: flex; align-items: center; gap: 14px; padding: 12px 22px; border-bottom: 1px solid var(--border); background: var(--bg-base); position: sticky; top: 0; z-index: 10; }
.ad-topbar__path { font-family: 'JetBrains Mono', monospace; font-size: 11.5px; color: var(--text-muted); letter-spacing: 0.04em; }
.ad-topbar__path b { color: var(--text-primary); font-weight: 700; }
.ad-topbar__actions { margin-left: auto; display: flex; gap: 6px; }
.ad-topbar__btn { padding: 6px 12px; font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 600; border: 1px solid var(--border); background: var(--bg-base); color: var(--text-secondary); border-radius: 5px; cursor: pointer; letter-spacing: 0.04em; text-transform: uppercase; display: inline-flex; align-items: center; gap: 5px; }
.ad-topbar__btn:hover { border-color: var(--accent); color: var(--text-primary); }
.ad-topbar__btn--primary { background: var(--w-60); color: white; border-color: transparent; }
.ad-topbar__btn--danger { background: var(--e-50); color: white; border-color: transparent; }

.ad-body { padding: 22px; display: flex; flex-direction: column; gap: 18px; }
.ad-head { display: flex; justify-content: space-between; align-items: flex-end; gap: 14px; padding-bottom: 12px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
.ad-head h2 { font-size: 22px; font-weight: 800; letter-spacing: -0.02em; margin: 0; }
.ad-head__sub { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-muted); margin-top: 4px; }

/* Dense table */
.ad-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.ad-table thead { background: var(--bg-surface-2); }
.ad-table th { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-muted); text-align: left; padding: 9px 12px; border-bottom: 1px solid var(--border); }
.ad-table td { padding: 11px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.ad-table tr:hover td { background: var(--bg-surface); cursor: pointer; }
.ad-table__cust { font-weight: 600; }
.ad-table__id { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-muted); margin-top: 1px; }
.ad-table__time { font-family: 'JetBrains Mono', monospace; font-size: 11.5px; color: var(--text-secondary); }

/* Pills */
.ad-pill { display: inline-flex; align-items: center; gap: 5px; padding: 3px 9px; border-radius: 4px; font-family: 'JetBrains Mono', monospace; font-size: 10.5px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; }
.ad-pill--ok { background: var(--t-20); color: var(--t-80); }
[data-theme="light"].ad-pill--ok { background: var(--t-90); color: var(--t-30); }
.ad-pill--warn { background: var(--w-30); color: var(--w-80); }
[data-theme="light"].ad-pill--warn { background: var(--w-90); color: var(--w-30); }
.ad-pill--danger { background: var(--e-30); color: var(--e-90); }
[data-theme="light"].ad-pill--danger { background: var(--e-90); color: var(--e-30); }
.ad-pill--info { background: var(--p-40); color: var(--p-95); }
[data-theme="light"].ad-pill--info { background: var(--p-90); color: var(--p-30); }
.ad-pill--purple { background: var(--s-20); color: var(--s-80); }
[data-theme="light"].ad-pill--purple { background: var(--s-90); color: var(--s-20); }

.ad-card { padding: 18px 20px; background: var(--bg-surface); border: 1px solid var(--border); border-radius: 10px; display: flex; flex-direction: column; gap: 10px; }
.ad-card__h { display: flex; align-items: center; gap: 10px; padding-bottom: 8px; border-bottom: 1px solid var(--border); margin-bottom: 2px; }
.ad-card__t { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-secondary); }

/* Stat tiles */
.ad-stat-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
@media (max-width: 1100px) {.ad-stat-grid { grid-template-columns: repeat(3, 1fr); } }
.ad-stat { padding: 14px 16px; background: var(--bg-surface); border: 1px solid var(--border); border-radius: 8px; }
.ad-stat__l { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-muted); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 5px; }
.ad-stat__n { font-family: 'JetBrains Mono', monospace; font-size: 26px; font-weight: 700; letter-spacing: -0.01em; line-height: 1; }
.ad-stat__d { font-size: 11px; color: var(--text-secondary); margin-top: 3px; }
.ad-stat__d--ok { color: var(--t-60); }
.ad-stat__d--warn { color: var(--w-80); }
.ad-stat__d--danger { color: var(--e-50); }
[data-theme="light"].ad-stat__d--ok { color: var(--t-30); }
[data-theme="light"].ad-stat__d--warn { color: var(--w-30); }

/* Definition list */
.ad-defs { display: grid; grid-template-columns: 130px 1fr; gap: 6px 14px; font-size: 12.5px; }
.ad-defs dt { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; color: var(--text-muted); padding-top: 2px; }
.ad-defs dd { margin: 0; }

/* Tabs */
.ad-tabs { display: flex; gap: 2px; border-bottom: 1px solid var(--border); margin-bottom: 14px; flex-wrap: wrap; }
.ad-tab { padding: 9px 14px; font-family: inherit; font-size: 13px; font-weight: 500; background: transparent; border: none; color: var(--text-secondary); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; }
.ad-tab:hover { color: var(--text-primary); }
.ad-tab.is-on { color: var(--w-80); border-bottom-color: var(--w-60); font-weight: 700; }
[data-theme="light"].ad-tab.is-on { color: var(--w-30); }

/* Customer header */
.ad-cust-head { display: grid; grid-template-columns: 56px 1fr auto; gap: 16px; align-items: center; padding: 16px 20px; background: var(--bg-surface); border: 1px solid var(--border); border-radius: 10px; }
.ad-cust-head__av { width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(135deg,var(--s-50),var(--p-40)); color: white; display: inline-flex; align-items: center; justify-content: center; font-weight: 800; font-size: 22px; }
.ad-cust-head__name { font-size: 19px; font-weight: 800; letter-spacing: -0.01em; }
.ad-cust-head__sub { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-muted); margin-top: 2px; letter-spacing: 0.04em; }
.ad-cust-head__pills { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 6px; }
.ad-cust-head__actions { display: flex; flex-direction: column; gap: 6px; }

/* Override form */
.ad-form-row { display: grid; grid-template-columns: 200px 1fr; gap: 14px; align-items: flex-start; padding: 14px 0; border-top: 1px solid var(--border); }
.ad-form-row:first-of-type { border-top: none; padding-top: 0; }
.ad-form-row__label { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; color: var(--text-secondary); padding-top: 6px; }
.ad-form-row__hint { font-size: 11.5px; color: var(--text-muted); margin-top: 4px; line-height: 1.45; }
.ad-input,.ad-select { padding: 9px 12px; font-family: inherit; font-size: 13px; background: var(--bg-base); border: 1px solid var(--border); border-radius: 6px; color: var(--text-primary); width: 100%; outline: none; }
.ad-input:focus,.ad-select:focus { border-color: var(--accent); }
.ad-textarea { padding: 10px 12px; font-family: inherit; font-size: 13px; background: var(--bg-base); border: 1px solid var(--border); border-radius: 6px; color: var(--text-primary); width: 100%; outline: none; resize: vertical; min-height: 70px; line-height: 1.55; }

/* Approve four-eyes checklist */
.ad-check { display: grid; grid-template-columns: 22px 1fr; gap: 10px; align-items: flex-start; padding: 9px 0; border-top: 1px solid var(--border); }
.ad-check:first-of-type { border-top: none; padding-top: 0; }
.ad-check__icon { width: 20px; height: 20px; border-radius: 4px; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
.ad-check__icon svg { width: 11px; height: 11px; }
.ad-check--ok.ad-check__icon { background: var(--t-50); color: white; }
.ad-check--warn.ad-check__icon { background: var(--w-60); color: white; }
.ad-check--info.ad-check__icon { background: var(--p-40); color: white; font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 11px; }
.ad-check__t { font-size: 12.5px; font-weight: 600; }
.ad-check__s { font-size: 11.5px; color: var(--text-secondary); margin-top: 1px; line-height: 1.45; }

/* Audit log */
.ad-audit-row { display: grid; grid-template-columns: 110px 100px 1fr 120px; gap: 12px; align-items: center; padding: 9px 12px; border-bottom: 1px solid var(--border); font-size: 12px; }
.ad-audit-row:hover { background: var(--bg-surface); }
.ad-audit-row__when { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-muted); }
.ad-audit-row__actor { font-family: 'JetBrains Mono', monospace; font-size: 11px; }
.ad-audit-row__what { font-size: 12.5px; }
.ad-audit-row__what code { font-family: 'JetBrains Mono', monospace; font-size: 11px; padding: 1px 6px; background: var(--bg-surface-2); border-radius: 4px; color: var(--text-secondary); }

let idx = 0;

function render() {
 const screen = SCREENS[idx];
 document.getElementById('viewport').innerHTML = builders[screen.kind]();
 document.getElementById('browserUrl').textContent = 'admin.gaimcontrol.com' + screen.url;
 document.getElementById('screenId').textContent = screen.id;
 document.getElementById('screenName').textContent = screen.name;
 document.getElementById('progressFill').style.width = ((idx + 1) / SCREENS.length * 100) + '%';
 document.getElementById('navPrev').disabled = idx === 0;
 document.getElementById('navNext').disabled = idx === SCREENS.length - 1;
 document.querySelectorAll('.proto-scrubber__item').forEach((el, i) => {
 el.classList.toggle('is-active', i === idx);
 if (i === idx) el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
 });
 document.getElementById('contextBody').innerHTML = CTX[screen.kind] || screen.name;
}

function next() { if (idx < SCREENS.length - 1) { idx++; render(); } }
function prev() { if (idx > 0) { idx--; render(); } }
function go(i) { idx = i; render(); }

function buildScrubber() {
 const nav = document.getElementById('scrubber');
 SCREENS.forEach((s, i) => {
 const btn = document.createElement('button');
 btn.className = 'proto-scrubber__item';
 btn.innerHTML = `<span class="proto-scrubber__id">${s.id}</span><span class="proto-scrubber__name">${s.name}</span>`;
 btn.addEventListener('click', () => go(i));
 nav.appendChild(btn);
 });
}

function initTheme() {
 const root = document.documentElement;
 const stored = localStorage.getItem('gc-proto-theme');
 const initial = stored || 'dark';
 root.setAttribute('data-theme', initial);
 document.querySelector('.theme-label').textContent = initial === 'dark' ? 'Dark' : 'Light';
 document.querySelector('.proto-theme-toggle').addEventListener('click', () => {
 const next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
 root.setAttribute('data-theme', next);
 document.querySelector('.theme-label').textContent = next === 'dark' ? 'Dark' : 'Light';
 try { localStorage.setItem('gc-proto-theme', next); } catch(e) {}
 });
}

document.getElementById('navPrev').addEventListener('click', prev);
document.getElementById('navNext').addEventListener('click', next);
document.addEventListener('keydown', (e) => { if (e.key === 'ArrowRight') next(); if (e.key === 'ArrowLeft') prev(); });
buildScrubber();
initTheme();
render();
</script>
