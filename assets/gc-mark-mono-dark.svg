<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!--
  Holdwell mark — monochrome navy, transparent background.
  For light backgrounds where the white plate isn't wanted. Uses currentColor;
  defaults to brand navy #20273C.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 150" role="img" aria-label="Holdwell" style="color:#20273C">
  <path d="M 22 36 L 50 130" stroke="currentColor" stroke-width="22" stroke-linecap="round" fill="none"/>
  <path d="M 50 130 L 70 60" stroke="currentColor" stroke-width="16" stroke-linecap="round" fill="none" opacity="0.92"/>
  <path d="M 70 60 L 88 130" stroke="currentColor" stroke-width="12" stroke-linecap="round" fill="none" opacity="0.78"/>
  <path d="M 88 130 L 108 78" stroke="currentColor" stroke-width="8" stroke-linecap="round" fill="none" opacity="0.6"/>
  <path d="M 108 78 L 124 124" stroke="currentColor" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.45"/>
</svg>
