<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!--
  Holdwell Android adaptive icon — foreground layer.
  432×432 viewport, Android renders the inner 264×264 (61%) as the visible safe zone.
  Mark sized comfortably inside that safe zone (scale 1.55, ~232 units tall) so it
  survives Android's various mask shapes (squircle, circle, teardrop).
  Pair with gc-app-icon-android-bg.svg as the background layer.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 432 432" role="img" aria-label="Holdwell">
  <defs>
    <linearGradient id="hw-and" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8576C2"/>
      <stop offset="0.55" stop-color="#4D608C"/>
      <stop offset="1" stop-color="#5BB088"/>
    </linearGradient>
  </defs>
  <!-- Mark centred: source 150 units → target 232 units → scale 1.547; offset = (432 - 232) / 2 = 100 -->
  <g transform="translate(100 100) scale(1.547)">
    <path d="M 22 36 L 50 130" stroke="url(#hw-and)" stroke-width="22" stroke-linecap="round" fill="none"/>
    <path d="M 50 130 L 70 60" stroke="url(#hw-and)" stroke-width="16" stroke-linecap="round" fill="none" opacity="0.92"/>
    <path d="M 70 60 L 88 130" stroke="url(#hw-and)" stroke-width="12" stroke-linecap="round" fill="none" opacity="0.78"/>
    <path d="M 88 130 L 108 78" stroke="url(#hw-and)" stroke-width="8" stroke-linecap="round" fill="none" opacity="0.6"/>
    <path d="M 108 78 L 124 124" stroke="url(#hw-and)" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.45"/>
  </g>
</svg>
