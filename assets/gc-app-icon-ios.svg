<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!--
  Holdwell iOS app icon — 1024×1024 master.
  Full bleed (no rounded corners — iOS rounds the icon itself). Mark sits at ~70%
  visual weight inside the canvas. Export as 1024.png for App Store Connect; iOS
  scales down to all derivative sizes.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="Holdwell">
  <rect width="1024" height="1024" fill="#20273C"/>
  <defs>
    <linearGradient id="hw-ios" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8576C2"/>
      <stop offset="0.55" stop-color="#4D608C"/>
      <stop offset="1" stop-color="#5BB088"/>
    </linearGradient>
  </defs>
  <!-- Mark geometry from 150-unit viewBox, scaled to 1024 with ~22% padding (scale ~4.8, translate 152 152) -->
  <g transform="translate(152 152) scale(4.8)">
    <path d="M 22 36 L 50 130" stroke="url(#hw-ios)" stroke-width="22" stroke-linecap="round" fill="none"/>
    <path d="M 50 130 L 70 60" stroke="url(#hw-ios)" stroke-width="16" stroke-linecap="round" fill="none" opacity="0.92"/>
    <path d="M 70 60 L 88 130" stroke="url(#hw-ios)" stroke-width="12" stroke-linecap="round" fill="none" opacity="0.78"/>
    <path d="M 88 130 L 108 78" stroke="url(#hw-ios)" stroke-width="8" stroke-linecap="round" fill="none" opacity="0.6"/>
    <path d="M 108 78 L 124 124" stroke="url(#hw-ios)" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.45"/>
  </g>
</svg>
