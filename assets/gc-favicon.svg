<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!--
  Holdwell favicon — optimised for 16×16 / 32×32 browser-tab rendering.
  Square plate (no aspect compression) so the W silhouette reads at small sizes.
  Strokes are the same geometry as the master mark.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 150" role="img" aria-label="Holdwell">
  <rect width="150" height="150" fill="#20273C"/>
  <defs>
    <linearGradient id="hw-f" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8576C2"/>
      <stop offset="0.55" stop-color="#4D608C"/>
      <stop offset="1" stop-color="#399971"/>
    </linearGradient>
  </defs>
  <path d="M 22 36 L 50 130" stroke="url(#hw-f)" stroke-width="22" stroke-linecap="round" fill="none"/>
  <path d="M 50 130 L 70 60" stroke="url(#hw-f)" stroke-width="16" stroke-linecap="round" fill="none" opacity="0.92"/>
  <path d="M 70 60 L 88 130" stroke="url(#hw-f)" stroke-width="12" stroke-linecap="round" fill="none" opacity="0.78"/>
  <path d="M 88 130 L 108 78" stroke="url(#hw-f)" stroke-width="8" stroke-linecap="round" fill="none" opacity="0.6"/>
  <path d="M 108 78 L 124 124" stroke="url(#hw-f)" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.45"/>
</svg>
