<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!--
  Holdwell horizontal lockup — dark variant.
  Mark (gradient W) + "holdwell" wordmark on navy. Primary lockup for app headers,
  marketing, pitch decks. NOTE: text is set as <text> for prototype usage;
  for production print, convert to outlines.
  Font: Inter Bold (700), letter-spacing tightened to match the wordmark in the brand book.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" role="img" aria-label="holdwell">
  <rect width="320" height="80" fill="#20273C"/>
  <defs>
    <linearGradient id="hw-lk-d" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8576C2"/>
      <stop offset="0.55" stop-color="#4D608C"/>
      <stop offset="1" stop-color="#399971"/>
    </linearGradient>
  </defs>
  <!-- Mark: scale 150-unit source to 56 units, translate to leave 12px padding left -->
  <g transform="translate(12 12) scale(0.373)">
    <path d="M 22 36 L 50 130" stroke="url(#hw-lk-d)" stroke-width="22" stroke-linecap="round" fill="none"/>
    <path d="M 50 130 L 70 60" stroke="url(#hw-lk-d)" stroke-width="16" stroke-linecap="round" fill="none" opacity="0.92"/>
    <path d="M 70 60 L 88 130" stroke="url(#hw-lk-d)" stroke-width="12" stroke-linecap="round" fill="none" opacity="0.78"/>
    <path d="M 88 130 L 108 78" stroke="url(#hw-lk-d)" stroke-width="8" stroke-linecap="round" fill="none" opacity="0.6"/>
    <path d="M 108 78 L 124 124" stroke="url(#hw-lk-d)" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.45"/>
  </g>
  <!-- Wordmark -->
  <text x="80" y="51"
        font-family="Inter, -apple-system, BlinkMacSystemFont, system-ui, sans-serif"
        font-weight="700"
        font-size="32"
        letter-spacing="-1.2"
        fill="#FFFFFF">holdwell</text>
</svg>
