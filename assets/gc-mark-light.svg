<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!--
  Holdwell mark — light variant.
  Gradient W on white plate. Use on light backgrounds, print, document covers.
  Slightly darker gradient stops than the dark variant so the mark holds weight on white.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 150" role="img" aria-label="Holdwell">
  <rect width="150" height="150" fill="#FFFFFF"/>
  <defs>
    <linearGradient id="hw-l" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#534792"/>
      <stop offset="0.55" stop-color="#4D608C"/>
      <stop offset="1" stop-color="#1F7058"/>
    </linearGradient>
  </defs>
  <path d="M 22 36 L 50 130" stroke="url(#hw-l)" stroke-width="22" stroke-linecap="round" fill="none"/>
  <path d="M 50 130 L 70 60" stroke="url(#hw-l)" stroke-width="16" stroke-linecap="round" fill="none" opacity="0.92"/>
  <path d="M 70 60 L 88 130" stroke="url(#hw-l)" stroke-width="12" stroke-linecap="round" fill="none" opacity="0.78"/>
  <path d="M 88 130 L 108 78" stroke="url(#hw-l)" stroke-width="8" stroke-linecap="round" fill="none" opacity="0.6"/>
  <path d="M 108 78 L 124 124" stroke="url(#hw-l)" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.45"/>
</svg>
